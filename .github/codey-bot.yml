spam:
  enabled: true
  action: close
  notifyComment: true
  lockReason: spam
  keywords: []
  minAccountAgeDays: 1
  maxLinks: 10
  maxTemplateSimilarity: 90
  allowUsers: ["dependabot[bot]"]
  denyUsers: []

greetings:
  firstPRComment: >
    Thanks for opening this pull request! Please be sure to check out our contributing guidelines.
  firstPRMergeComment: >
    Awesome work, congrats on your first merged pull request!
  firstIssueComment: >
    Thanks for opening your first issue here! Be sure to follow the issue template, and welcome to the community!

labeler:
  labelOnPRUpdates: true
  paths:
    Images:
      - "docs/**/*.png"
      - "docs/**/*.svg"
      - "docs/**/*.jpg"
      - "docs/**/*.jpeg"
    Docs:
      - "docs/**/*.md*"
    Tools:
      - "docs/tools/**/*"
    CLI Docs:
      - "docs/tools/cli/**/*"
    SDK Docs:
      - "docs/tools/sdk/**/*"
    Rule Development Kit Docs:
      - "docs/tools/rule-development-kit/**/*"
    IdentityNow:
      - "docs/extensibility/**/*"
      - "docs/connectivity/**/*"
      - "docs/api/**/*"
      - "docs/guides/**/*"
      - "docs/reporting/**/*"
    NERM:
      - "docs/nerm/**/*"
    IdentityIQ:
      - "docs/iiq/**/*"
    Event Trigger Docs:
      - "docs/extensibility/event-triggers/**/*"
    SaaS Connectivity Docs:
      - "docs/connectivity/saas-connectivity/**/*"
    Secure Data Share (SDS):
      - "docs/reporting/secure-data-share/**/*"
    Access Intelligence Center (AIC):
      - "docs/reporting/access-intelligence-center/**/*"
    Transform Docs:
      - "docs/extensibility/transforms/**/*"
    Rules Docs:
      - "docs/extensibility/rules/**/*"
    SaaS Configuration Docs:
      - "docs/extensibility/configuration-management/saas-configuration.md*"
    Introduction Doc:
      - "docs/index.md*"
    Pages:
      - "src/pages/**/*"
    Static Files:
      - "src/static/**/*"
    Components:
      - "src/components/**/*"
    CSS:
      - "src/**/*.css"
    Swizzled Components:
      - "src/theme/**/*"
    Sidebar:
      - "sidebars.js"
      - "products/**/sidebar.js"
    Firebase:
      - "firebase.json"
    Prettier:
      - ".prettier*"
    Docusaurus Config:
      - "docusaurus.config.js"
    Footer:
      - "footer.js"
    Navbar:
      - "navbar.js"
    Plugins:
      - "plugins.js"

