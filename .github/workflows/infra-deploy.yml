name: Build/Deploy to AWS

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']
    paths-ignore:
      - 'README.md'
  pull_request:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Triggered by the api-specs repo when specs change on its main branch
  repository_dispatch:
    types: [api-specs-updated]

# Allow one concurrent deployment
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) ||  github.event_name == 'push' && 'main' }}
  cancel-in-progress: true

env:
  BASE_URL: '/'

permissions:
  id-token: write # This is required for requesting the JWT
  contents: write
  pull-requests: write
  pages: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  publish:
    runs-on: developer_site_runner
    steps:
      - name: Configure AWS credentials from Test account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::176038645705:role/github-action-role
          role-session-name: deploy-developer-site-infra-to-aws
          aws-region: us-east-1
          role-duration-seconds: 14400

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          clean: true

      # ---------------------------------------------------------------------------
      # SDK docs sync — check out each SDK and rsync reference docs + code examples
      # into the portal workspace before the Docusaurus build runs.
      # ---------------------------------------------------------------------------
      - name: Check out golang-sdk
        uses: actions/checkout@v6
        with:
          repository: sailpoint-oss/golang-sdk
          path: golang-sdk
          token: ${{ secrets.DEVREL_SERVICE_TOKEN }}
          ref: main

      - name: Check out python-sdk
        uses: actions/checkout@v6
        with:
          repository: sailpoint-oss/python-sdk
          path: python-sdk
          token: ${{ secrets.DEVREL_SERVICE_TOKEN }}
          ref: main

      - name: Check out powershell-sdk
        uses: actions/checkout@v6
        with:
          repository: sailpoint-oss/powershell-sdk
          path: powershell-sdk
          token: ${{ secrets.DEVREL_SERVICE_TOKEN }}
          ref: main

      - name: Check out typescript-sdk
        uses: actions/checkout@v6
        with:
          repository: sailpoint-oss/typescript-sdk
          path: typescript-sdk
          token: ${{ secrets.DEVREL_SERVICE_TOKEN }}
          ref: main

      # API specs are no longer committed to this repo — they are fetched here
      # and copied into static/api-specs by scripts/sync-sdk-docs-local.sh.
      - name: Check out api-specs
        uses: actions/checkout@v6
        with:
          repository: sailpoint-oss/api-specs
          path: api-specs
          token: ${{ secrets.DEVREL_SERVICE_TOKEN }}
          ref: main

      - name: Install rsync and Java
        run: sudo apt-get update -qq && sudo apt-get install -y rsync

      - name: Set up Java for openapi-generator-cli
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache SDK build outputs
        uses: actions/cache@v4
        with:
          path: |
            golang-sdk/**/docs
            python-sdk/sailpoint/**/docs
            powershell-sdk/PSSailpoint/**/docs
            typescript-sdk/sdk-output
          key: sdk-docs-${{ hashFiles('api-specs/idn/apis/**') }}
          restore-keys: sdk-docs-

      - name: Setup portal .npmrc
        run: echo ${{ secrets.NPM_FONTAWESOME_CONFIG }} | base64 -d >> .npmrc

      - name: Install portal node modules
        run: npm ci

      # ---------------------------------------------------------------------------
      # Build each SDK from the portal's own API specs, sync reference docs and
      # code-example overlays into the portal workspace, and write category files.
      # Uses the same script as `npm run sync-sdk-docs` for local development.
      # ---------------------------------------------------------------------------
      - name: Build and sync SDK docs
        run: SDK_ROOT=$GITHUB_WORKSPACE bash scripts/sync-sdk-docs-local.sh

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21

      - name: build backend
        run: |
          ls -la
          cd ./backend/src/mithrandir
          npm ci
          npm run build

      - name: setup SAM
        uses: aws-actions/setup-sam@v2
      - name: set env vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "STACK=developer-sailpoint-site" >> $GITHUB_ENV
          elif [[ ${{ github.ref }} == refs/pull/* ]]; then
            PR_NUMBER=$(echo ${{ github.ref }} | awk -F '/' '{print $3}')
            echo "STACK=developer-sailpoint-site-$PR_NUMBER" >> $GITHUB_ENV
          fi

      # push these files to AWS
      - name: run SAM build
        run: |
          sam build
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --stack-name $STACK --s3-prefix $STACK --parameter-overrides ParameterKey=AuthUsername,ParameterValue='${{ secrets.AUTH_USERNAME }}' ParameterKey=AuthPassword,ParameterValue='${{ secrets.AUTH_PASSWORD }}'
      - name: Get S3 bucket location, cloudfront url, and api gateway url
        run: |
          export S3_BUCKET=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?OutputKey=='DeveloperSailpointWebS3BucketName'].OutputValue" --output text)
          echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV
          export CLOUDFRONT_URL=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?OutputKey=='DeveloperSailpointCloudFrontDistributionDomainName'].OutputValue" --output text)
          echo "CLOUDFRONT_URL=$CLOUDFRONT_URL" >> $GITHUB_ENV
          export API_GATEWAY_URL=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?OutputKey=='DeveloperSailpointAPIGatewayEndpoint'].OutputValue" --output text)
          echo "API_GATEWAY_URL=$API_GATEWAY_URL" >> $GITHUB_ENV
          export API_GATEWAY_ID=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?OutputKey=='ApiGatewayRestApiId'].OutputValue" --output text)
          echo "API_GATEWAY_ID=$API_GATEWAY_ID" >> $GITHUB_ENV
      - name: set CORS policy on API Gateway
        run: |
          aws apigatewayv2 update-api --api-id $API_GATEWAY_ID --cors-configuration AllowOrigins='["https://${{ env.CLOUDFRONT_URL }}","https://developer.sailpoint.com"]',AllowMethods='["OPTIONS","GET","POST"]',AllowHeaders='["Content-Type","Authorization"]'

      # Install and build Developer Community site
      - name: Build Developer Community site
        run: |
          echo "CMS_APP_API_ENDPOINT=$API_GATEWAY_URL" >> .env
          echo "ALGOLIA_SEARCH_KEY=${{ secrets.ALGOLIA_SEARCH_KEY }}" >> .env
          echo "SECRET_MESSAGE=${{ secrets.SECRET_MESSAGE }}" >> .env
          export NODE_OPTIONS="--max_old_space_size=60000"
          export DOCUSAURUS_IGNORE_SSG_WARNINGS=true
          export DOCUSAURUS_SSG_WORKER_THREAD_COUNT=10
          export DOCUSAURUS_SSG_WORKER_THREAD_RECYCLER_MAX_MEMORY=1000000000

          npm run rebuild-docs
          npm run build
      # push these files to AWS
      - name: Copy files to the test website with the AWS CLI
        run: |
          aws configure set default.s3.max_concurrent_requests 64
          aws s3 sync ./build "s3://$S3_BUCKET" --only-show-errors
      - name: Find Comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: Visit the preview URL for this PR
        continue-on-error: true
      - name: add cloudfront url to PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v3
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            🌎🌎🌎 Visit the preview URL for this PR [HERE](https://${{ env.CLOUDFRONT_URL }})
            built from commit ${{ github.event.pull_request.head.sha }}
        continue-on-error: true
      - name: deploy to prod
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deploy_github_pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: gh-pages
          build_dir: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  publish-failure:
    runs-on: ubuntu-latest
    if: ${{ always() && (needs.publish.result == 'failure' || needs.publish.result == 'timed_out') }}
    needs:
      - publish
    steps:
      - name: Invoke GithubNotificationsFunction Lambda
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "workflowName": "${{ github.job }}",
              "repositoryName": "${{ github.event.repository.name }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "${{ secrets.NOTIFICATIONS_FUNCTION_URL }}"
