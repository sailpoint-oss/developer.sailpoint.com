name: Build/Deploy to AWS

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ['main']
    paths-ignore:
      - 'README.md'
  pull_request:
    branches:
      - main

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Allow one concurrent deployment
concurrency:
  group: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) ||  github.event_name == 'push' && 'main' }}
  cancel-in-progress: true

env:
  BASE_URL: '/'

permissions:
  id-token: write # This is required for requesting the JWT
  contents: write
  pull-requests: write
  pages: write

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  publish:
    runs-on: developer_site_runner
    steps:
      - name: Configure AWS credentials from Test account
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::176038645705:role/github-action-role
          role-session-name: deploy-developer-site-infra-to-aws
          aws-region: us-east-1
          role-duration-seconds: 14400

      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - name: Check out repo
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          clean: true

      # ---------------------------------------------------------------------------
      # SDK docs sync — check out each SDK and rsync reference docs + code examples
      # into the portal workspace before the Docusaurus build runs.
      # ---------------------------------------------------------------------------
      - name: Check out golang-sdk
        uses: actions/checkout@v6
        with:
          repository: sailpoint-oss/golang-sdk
          path: golang-sdk
          token: ${{ secrets.DEVREL_SERVICE_TOKEN }}
          ref: main

      - name: Check out python-sdk
        uses: actions/checkout@v6
        with:
          repository: sailpoint-oss/python-sdk
          path: python-sdk
          token: ${{ secrets.DEVREL_SERVICE_TOKEN }}
          ref: main

      - name: Check out powershell-sdk
        uses: actions/checkout@v6
        with:
          repository: sailpoint-oss/powershell-sdk
          path: powershell-sdk
          token: ${{ secrets.DEVREL_SERVICE_TOKEN }}
          ref: main

      - name: Check out typescript-sdk
        uses: actions/checkout@v6
        with:
          repository: sailpoint-oss/typescript-sdk
          path: typescript-sdk
          token: ${{ secrets.DEVREL_SERVICE_TOKEN }}
          ref: main

      - name: Install rsync and Java
        run: sudo apt-get update -qq && sudo apt-get install -y rsync

      - name: Set up Java for openapi-generator-cli
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Cache SDK build outputs
        uses: actions/cache@v4
        with:
          path: |
            golang-sdk/**/docs
            python-sdk/sailpoint/**/docs
            powershell-sdk/PSSailpoint/**/docs
            typescript-sdk/sdk-output
          key: sdk-docs-${{ hashFiles('static/api-specs/idn/apis/**') }}
          restore-keys: sdk-docs-

      - name: Build SDK docs from portal API specs
        run: |
          set -euo pipefail
          APIS_DIR="$GITHUB_WORKSPACE/static/api-specs/idn/apis"
          JAR_URL="https://repo1.maven.org/maven2/org/openapitools/openapi-generator-cli/7.12.0/openapi-generator-cli-7.12.0.jar"

          echo "=== Installing SDK build dependencies and JAR ==="
          for sdk in golang-sdk python-sdk powershell-sdk typescript-sdk; do
            npm ci --prefix "$sdk" --ignore-scripts
            [ -f "$sdk/openapi-generator-cli.jar" ] || curl -sSL "$JAR_URL" -o "$sdk/openapi-generator-cli.jar"
          done

          echo "=== Building Go SDK docs ==="
          (cd golang-sdk    && node sdk-resources/build-versioned-sdk.js "$APIS_DIR")

          echo "=== Building Python SDK docs ==="
          (cd python-sdk    && node sdk-resources/build-versioned-sdk.js "$APIS_DIR")

          echo "=== Building PowerShell SDK docs ==="
          (cd powershell-sdk && node sdk-resources/build-versioned-sdk.js "$APIS_DIR")

          echo "=== Building TypeScript SDK docs ==="
          (cd typescript-sdk && node sdk-resources/build-versioned-sdk.js "$APIS_DIR")

      - name: Sync built SDK docs and code examples into portal
        run: |
          set -euo pipefail

          # Helper: classify a partition as idn | nerm | skip
          classify() {
            local sdk="$1" resource="$2"
            case "$sdk:$resource" in
              go:nerm|go:nerm_v2025|go:generic)                        echo "skip" ;;
              python:nerm|python:intelligence_package)                  echo "skip" ;;
              powershell:nerm|powershell:nermV2025)                     echo "skip" ;;
              typescript:nerm|typescript:nerm_v2025|typescript:generic) echo "skip" ;;
              *)                                                        echo "idn"  ;;
            esac
          }

          sync_sdk() {
            local lang="$1" src="$2" ref_dest="$3" overlay_name="$4"
            local idn_overlays=""

            for partition_dir in "$src"/*/; do
              [ -d "$partition_dir/docs/Methods" ] || continue
              resource=$(basename "$partition_dir")
              [ "$(classify "$lang" "$resource")" = "idn" ] || continue

              rsync -cav --delete "$partition_dir/docs/Methods" "$ref_dest/$resource/"
              rsync -cav --delete "$partition_dir/docs/Models"  "$ref_dest/$resource/"

              overlay="$partition_dir/docs/Examples/${overlay_name}"
              [ -f "$overlay" ] && idn_overlays="$idn_overlays $overlay"
            done

            mkdir -p static/code-examples/v1
            [ -n "$idn_overlays" ] && cat $idn_overlays > "static/code-examples/v1/${overlay_name}"
          }

          sync_sdk go         golang-sdk                   docs/tools/sdk/go/Reference          go_code_examples_overlay.yaml
          sync_sdk python     python-sdk/sailpoint          docs/tools/sdk/python/Reference      python_code_examples_overlay.yaml
          sync_sdk powershell powershell-sdk/PSSailpoint    docs/tools/sdk/powershell/Reference  powershell_code_examples_overlay.yaml
          sync_sdk typescript typescript-sdk/sdk-output     docs/tools/sdk/typescript/Reference  typescript_code_examples_overlay.yaml

          # Write _category_.json files with unique keys to prevent Docusaurus
          # translation-key conflicts across SDKs that share the same category names.
          node -e "
          const fs = require('fs'), path = require('path');
          const sdkRoot = 'docs/tools/sdk';
          let n = 0;
          function w(dir, key, label, pos) {
            const o = { label, key }; if (pos != null) o.position = pos;
            fs.writeFileSync(path.join(dir, '_category_.json'), JSON.stringify(o, null, 2) + '\n'); n++;
          }
          const sdks = fs.readdirSync(sdkRoot).filter(d => fs.statSync(path.join(sdkRoot, d)).isDirectory());
          for (const sdk of sdks) {
            const ref = path.join(sdkRoot, sdk, 'Reference');
            if (!fs.existsSync(ref)) continue;
            w(ref, sdk+'-reference', 'Reference', 5);
            for (const e of fs.readdirSync(ref, {withFileTypes: true})) {
              if (!e.isDirectory()) continue;
              const p = path.join(ref, e.name); w(p, sdk+'-'+e.name, e.name, null);
              for (const s of ['Methods','Models']) { const sd = path.join(p,s); if (fs.existsSync(sd)) w(sd, sdk+'-'+e.name+'-'+s.toLowerCase(), s, null); }
            }
          }
          console.log('Wrote '+n+' _category_.json files');
          "

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: 1.21

      - name: build backend
        run: |
          ls -la
          cd ./backend/src/mithrandir
          npm ci
          npm run build

      - name: setup SAM
        uses: aws-actions/setup-sam@v2
      - name: set env vars
        run: |
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "STACK=developer-sailpoint-site" >> $GITHUB_ENV
          elif [[ ${{ github.ref }} == refs/pull/* ]]; then
            PR_NUMBER=$(echo ${{ github.ref }} | awk -F '/' '{print $3}')
            echo "STACK=developer-sailpoint-site-$PR_NUMBER" >> $GITHUB_ENV
          fi

      # push these files to AWS
      - name: run SAM build
        run: |
          sam build
          sam deploy --no-confirm-changeset --no-fail-on-empty-changeset --stack-name $STACK --s3-prefix $STACK --parameter-overrides ParameterKey=AuthUsername,ParameterValue='${{ secrets.AUTH_USERNAME }}' ParameterKey=AuthPassword,ParameterValue='${{ secrets.AUTH_PASSWORD }}'
      - name: Get S3 bucket location, cloudfront url, and api gateway url
        run: |
          export S3_BUCKET=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?OutputKey=='DeveloperSailpointWebS3BucketName'].OutputValue" --output text)
          echo "S3_BUCKET=$S3_BUCKET" >> $GITHUB_ENV
          export CLOUDFRONT_URL=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?OutputKey=='DeveloperSailpointCloudFrontDistributionDomainName'].OutputValue" --output text)
          echo "CLOUDFRONT_URL=$CLOUDFRONT_URL" >> $GITHUB_ENV
          export API_GATEWAY_URL=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?OutputKey=='DeveloperSailpointAPIGatewayEndpoint'].OutputValue" --output text)
          echo "API_GATEWAY_URL=$API_GATEWAY_URL" >> $GITHUB_ENV
          export API_GATEWAY_ID=$(aws cloudformation describe-stacks --stack-name $STACK --query "Stacks[0].Outputs[?OutputKey=='ApiGatewayRestApiId'].OutputValue" --output text)
          echo "API_GATEWAY_ID=$API_GATEWAY_ID" >> $GITHUB_ENV
      - name: set CORS policy on API Gateway
        run: |
          aws apigatewayv2 update-api --api-id $API_GATEWAY_ID --cors-configuration AllowOrigins='["https://${{ env.CLOUDFRONT_URL }}","https://developer.sailpoint.com"]',AllowMethods='["OPTIONS","GET","POST"]',AllowHeaders='["Content-Type","Authorization"]'

      # Install and build Developer Community site
      - name: Build Developer Community site
        run: |
          echo "CMS_APP_API_ENDPOINT=$API_GATEWAY_URL" >> .env
          echo "ALGOLIA_SEARCH_KEY=${{ secrets.ALGOLIA_SEARCH_KEY }}" >> .env
          echo "SECRET_MESSAGE=${{ secrets.SECRET_MESSAGE }}" >> .env
          echo ${{ secrets.NPM_FONTAWESOME_CONFIG }} | base64 -d >> .npmrc
          export NODE_OPTIONS="--max_old_space_size=60000"
          export DOCUSAURUS_IGNORE_SSG_WARNINGS=true
          export DOCUSAURUS_SSG_WORKER_THREAD_COUNT=10
          export DOCUSAURUS_SSG_WORKER_THREAD_RECYCLER_MAX_MEMORY=1000000000

          npm ci
          npm run merge-all-code-examples
          npm run gen-all-api-specs-code-examples
          npm run gen-api-docs-all
          npm run sentence-case-all
          npm run build
      # push these files to AWS
      - name: Copy files to the test website with the AWS CLI
        run: |
          aws configure set default.s3.max_concurrent_requests 64
          aws s3 sync ./build "s3://$S3_BUCKET" --only-show-errors
      - name: Find Comment
        uses: peter-evans/find-comment@v3
        id: find-comment
        with:
          issue-number: ${{ github.event.pull_request.number }}
          body-includes: Visit the preview URL for this PR
        continue-on-error: true
      - name: add cloudfront url to PR
        if: github.event_name == 'pull_request'
        uses: peter-evans/create-or-update-comment@v3
        with:
          comment-id: ${{ steps.find-comment.outputs.comment-id }}
          issue-number: ${{ github.event.pull_request.number }}
          edit-mode: replace
          body: |
            🌎🌎🌎 Visit the preview URL for this PR [HERE](https://${{ env.CLOUDFRONT_URL }})
            built from commit ${{ github.event.pull_request.head.sha }}
        continue-on-error: true
      - name: deploy to prod
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: deploy_github_pages
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: gh-pages
          build_dir: build
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  publish-failure:
    runs-on: ubuntu-latest
    if: ${{ always() && (needs.publish.result == 'failure' || needs.publish.result == 'timed_out') }}
    needs:
      - publish
    steps:
      - name: Invoke GithubNotificationsFunction Lambda
        run: |
          curl -X POST \
            -H "Content-Type: application/json" \
            -d '{
              "workflowName": "${{ github.job }}",
              "repositoryName": "${{ github.event.repository.name }}",
              "url": "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            }' \
            "${{ secrets.NOTIFICATIONS_FUNCTION_URL }}"
