name: Slinky - Crawl Docs for broken links

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:

# PR-specific concurrency: one active run per PR
concurrency:
  group: slinky-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write   # required for comment_pr
  
jobs:
  slinky:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
          
      - name: Run Slinky
        uses: sailpoint-oss/slinky@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          comment_pr: "true"
          fail_on_failures: "true"
        
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: slinky-results
          path: |
            results.json
            results.md
          
