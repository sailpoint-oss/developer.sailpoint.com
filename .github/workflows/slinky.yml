name: Slinky - Crawl Docs for broken links

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, ready_for_review]
  workflow_dispatch:
# PR-specific concurrency: one active run per PR
concurrency:
  group: slinky-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
  pull-requests: write   # required for comment_pr
  packages: read         # required if GHCR package is private/internal
jobs:
  slinky:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Run Slinky
        uses: sailpoint-oss/slinky@v1
        
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: slinky-results
          path: |
            results.json
            results.md
          
