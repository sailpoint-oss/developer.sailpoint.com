post:
  operationId: forwardAccessRequestV1
  summary: Forward access request approval
  tags:
  - Access Request Approvals
  description: >-
    Use this API to forward an access request approval to a new owner. Only the owner of the approval and ORG_ADMIN
    users are allowed to perform this action. Only the owner of the approval and ORG_ADMIN users are allowed to perform
    this action.
  parameters:
  - in: path
    name: approvalId
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listPendingApprovalsV1
    description: Approval ID.
    example: 2c91808b7294bea301729568c68c002e
  requestBody:
    description: Information about the forwarded approval.
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/forwardapprovaldto.yaml
  responses:
    '202':
      $ref: ../../shared/responses/202.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:access-request-approvals:manage
