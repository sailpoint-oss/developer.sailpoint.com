get:
  operationId: getProfileConfigListV1
  tags:
  - Auth Profile
  summary: Get list of auth profiles
  description: This API returns a list of auth profiles.
  security:
  - userAuth:
    - sp:auth-profile:read
  responses:
    '200':
      description: List of Auth Profiles
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/authprofilesummary.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  parameters:
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
