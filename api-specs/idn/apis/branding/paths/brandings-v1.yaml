get:
  operationId: getBrandingListV1
  tags:
  - Branding
  summary: List of branding items
  description: This API endpoint returns a list of branding items.
  security:
  - userAuth:
    - idn:branding:read
  - applicationAuth:
    - idn:branding:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  responses:
    '200':
      description: A list of branding items.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/brandingitem.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  operationId: createBrandingItemV1
  tags:
  - Branding
  summary: Create a branding item
  description: This API endpoint creates a branding item.
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          $ref: ../schemas/brandingitemcreate.yaml
  security:
  - userAuth:
    - idn:branding:manage
  - applicationAuth:
    - idn:branding:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  responses:
    '201':
      description: Branding item created
      content:
        application/json:
          schema:
            $ref: ../schemas/brandingitem.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
