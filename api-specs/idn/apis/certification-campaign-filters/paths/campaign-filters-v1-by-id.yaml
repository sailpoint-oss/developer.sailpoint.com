get:
  operationId: getCampaignFilterByIdV1
  tags:
  - Certification Campaign Filters
  summary: Get campaign filter by id
  description: Retrieves information for an existing campaign filter using the filter's ID.
  security:
  - userAuth:
    - idn:campaign-filter:read
  parameters:
  - in: path
    name: id
    schema:
      type: string
      example: e9f9a1397b842fd5a65842087040d3ac
    required: true
    x-sailpoint-resource-operation-id: listCampaignFiltersV1
    description: The ID of the campaign filter to be retrieved.
  responses:
    '200':
      description: A campaign filter object.
      content:
        application/json:
          schema:
            $ref: ../schemas/campaignfilterdetails.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  operationId: updateCampaignFilterV1
  tags:
  - Certification Campaign Filters
  summary: Updates a campaign filter
  description: Updates an existing campaign filter using the filter's ID.
  security:
  - userAuth:
    - idn:campaign-filter:manage
  parameters:
  - in: path
    name: id
    schema:
      type: string
      example: e9f9a1397b842fd5a65842087040d3ac
    required: true
    x-sailpoint-resource-operation-id: listCampaignFiltersV1
    description: The ID of the campaign filter being modified.
  requestBody:
    required: true
    description: A campaign filter details with updated field values.
    content:
      application/json:
        schema:
          $ref: ../schemas/campaignfilterdetails.yaml
  responses:
    '200':
      description: Created successfully.
      content:
        application/json:
          schema:
            $ref: ../schemas/campaignfilterdetails.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
