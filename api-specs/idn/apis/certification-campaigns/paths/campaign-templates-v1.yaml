post:
  operationId: createCampaignTemplateV1
  tags:
  - Certification Campaigns
  summary: Create a campaign template
  description: |
    Use this API to create a certification campaign template based on campaign.
  security:
  - userAuth:
    - idn:campaign-template:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/campaigntemplate.yaml
        examples:
          Manager:
            $ref: ../examples/createcampaigntemplatemanager.yaml
          Search:
            $ref: ../examples/createcampaigntemplatesearch.yaml
          Source Owner:
            $ref: ../examples/createcampaigntemplatesourceowner.yaml
          RoleComposition:
            $ref: ../examples/createcampaigntemplaterolecomposition.yaml
  responses:
    '200':
      description: Created successfully.
      content:
        application/json:
          schema:
            $ref: ../schemas/campaigntemplate.yaml
          examples:
            Manager:
              $ref: ../examples/campaigntemplatemanager.yaml
            Search:
              $ref: ../examples/campaigntemplatesearch.yaml
            Source Owner:
              $ref: ../examples/campaigntemplatesourceowner.yaml
            RoleComposition:
              $ref: ../examples/campaigntemplaterolecomposition.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
get:
  operationId: getCampaignTemplatesV1
  tags:
  - Certification Campaigns
  summary: List campaign templates
  description: |
    Use this API to get a list of all campaign templates. Scope can be reduced through standard V3 query params.

    The API returns all campaign templates matching the query parameters. 
  security:
  - userAuth:
    - idn:campaign-template:read
    - idn:campaign-template:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  parameters:
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: sorters
    schema:
      type: string
      format: comma-separated
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **name, created, modified**
    example: name
  - in: query
    name: filters
    schema:
      type: string
      format: comma-separated
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **name**: *eq, ge, gt, in, le, lt, ne, sw*


      **id**: *eq, ge, gt, in, le, lt, ne, sw*
    example: name eq "manager template"
  responses:
    '200':
      description: List of campaign template objects.
      content:
        application/json:
