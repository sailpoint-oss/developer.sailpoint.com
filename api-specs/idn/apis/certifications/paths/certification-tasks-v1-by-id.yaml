get:
  operationId: getCertificationTaskV1
  tags:
  - Certifications
  summary: Certification task by id
  description: >-
    This API returns the certification task for the specified ID. Reviewers for the specified certification can also
    call this API.
  security:
  - userAuth:
    - idn:campaign:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: getPendingCertificationTasksV1
    description: The task ID
    example: 63b32151-26c0-42f4-9299-8898dc1c9daa
  responses:
    '200':
      description: A certification task
      content:
        application/json:
          schema:
            $ref: ../schemas/certificationtask.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
