openapi: 3.0.1
info:
  title: Identity Security Cloud API - Custom Password Instructions
  description: >-
    Use these APIs to interact with the Identity Security Cloud platform to achieve repeatable, automated processes with
    greater scalability. We encourage you to join the SailPoint Developer Community forum at
    https://developer.sailpoint.com/discuss to connect with other developers using our APIs.
  termsOfService: https://developer.sailpoint.com/discuss/tos
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: v1
servers:
  - url: https://{tenant}.api.identitynow.com
    description: This is the production API server.
    variables:
      tenant:
        default: sailpoint
        description: This is the name of your tenant, typically your company's name.
  - url: https://{apiUrl}
    description: This is the versioned API server.
    variables:
      apiUrl:
        default: sailpoint.api.identitynow.com
        description: This is the api url of your tenant
tags:
  - name: Custom Password Instructions
    description: >
      Use this API to implement custom password instruction functionality.

      With this functionality in place, administrators can create custom password instructions to help users reset their
      passwords, change them, unlock their accounts, or recover their usernames.

      This allows administrators to emphasize password policies or provide organization-specific instructions.


      Administrators must first use [Update Password Org
      Config](https://developer.sailpoint.com/docs/api/put-password-org-config-v-1) to set
      `customInstructionsEnabled` to `true`.


      Once they have enabled custom instructions, they can use [Create Custom Password
      Instructions](https://developer.sailpoint.com/docs/api/create-custom-password-instructions-v-1) to create
      custom page content for the specific pageId they select.


      For example, an administrator can use the pageId forget-username:user-email to set the custom text for the case
      when users forget their usernames and must enter their emails.


      Refer to [Creating Custom Instruction
      Text](https://documentation.sailpoint.com/saas/help/pwd/pwd_reset.html#creating-custom-instruction-text) for more
      information about creating custom password instructions.
paths:
  /custom-password-instructions/v1:
    $ref: ./paths/custom-password-instructions-v1.yaml
  /custom-password-instructions/v1/{pageId}:
    $ref: ./paths/custom-password-instructions-v1-by-pageid.yaml
security:
  - userAuth:
      - sp:scopes:all
