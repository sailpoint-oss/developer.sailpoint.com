get:
  summary: List identity collectors
  description: >-
    This endpoint lists the identity collectors in Data Access Security with optional filtering and pagination.


    Sorting is not supported for this endpoint; supplying the `sorters` query parameter results in a validation error.
  security:
  - userAuth:
    - das:identity-collectors:read
    - das:identity-collectors:manage
  - applicationAuth:
    - das:identity-collectors:read
    - das:identity-collectors:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  tags:
  - Data Access Security
  operationId: listIdentityCollectorsV1
  parameters:
  - name: filters
    in: query
    schema:
      type: string
    required: false
    example: sourceId eq "2c9180835d2e5168015d32f890ca1581"
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **sourceId**: *eq*


      **type**: *eq, in*


      **id**: *eq, in*


      Supported composite operators are *and, or*
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  responses:
    '200':
      description: A list of identity collectors matching the filter criteria.
      headers:
        X-Total-Count:
          description: The total number of results matching the filter criteria, regardless of paging limits.
          schema:
            type: integer
            format: int64
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/identitycollectorlistitem.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  summary: Create identity collector
  description: >-
    This endpoint creates a new identity collector in Data Access Security for the specified source. The identity
    collector type is derived from the source.
  security:
  - userAuth:
    - das:identity-collectors:manage
  - applicationAuth:
    - das:identity-collectors:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  tags:
  - Data Access Security
  operationId: createIdentityCollectorV1
  requestBody:
    description: Request body containing the details required to create a new identity collector.
    content:
      application/json:
        schema:
          $ref: ../schemas/createidentitycollectorrequest.yaml
    required: true
  responses:
    '200':
      description: The identity collector was created successfully.
      content:
        application/json:
          schema:
            type: object
            properties:
              id:
                type: integer
                format: int64
                description: The unique identifier of the created identity collector.
                example: 12345
              name:
                type: string
                description: The display name of the created identity collector.
                example: Active Directory Identity Collector
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
