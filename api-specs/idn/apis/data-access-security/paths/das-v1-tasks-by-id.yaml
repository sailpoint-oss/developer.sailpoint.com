get:
  security:
  - userAuth:
    - das:task:read
    - das:task:manage
  - applicationAuth:
    - das:task:read
    - das:task:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  tags:
  - Data Access Security
  summary: Get a DAS task.
  description: This end-point gets a task in Data Access Security.
  operationId: getTaskV1
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: integer
      format: int64
    description: The unique identifier of the task to retrieve.
    example: 1001
  responses:
    '200':
      description: A Task object.
      content:
        application/json:
          schema:
            $ref: ../schemas/taskinfo.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
delete:
  security:
  - userAuth:
    - das:task:manage
  - applicationAuth:
    - das:task:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  tags:
  - Data Access Security
  summary: Delete a DAS task.
  description: |
    This end-point sends a request to delete a task in Data Access Security.
  operationId: deleteTaskV1
  parameters:
  - name: id
    in: path
    required: true
    schema:
      type: integer
      format: int64
    description: The unique identifier of the task to delete.
    example: 1001
  responses:
    '204':
      description: No Content
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
