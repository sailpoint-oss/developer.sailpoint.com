post:
  operationId: createRoleMiningSessionsV1
  summary: Create a role mining session
  tags:
  - IAI Role Mining
  description: This submits a create role mining session request to the role mining application.
  requestBody:
    description: Role mining session parameters
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/roleminingsessiondto.yaml
  responses:
    '201':
      description: Submitted a role mining session request
      content:
        application/json:
          schema:
            $ref: ../schemas/roleminingsessionresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  parameters:
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  security:
  - userAuth:
    - iai:access-modeling:manage
  - applicationAuth:
    - iai:access-modeling:manage
get:
  operationId: getRoleMiningSessionsV1
  summary: Retrieves all role mining sessions
  tags:
  - IAI Role Mining
  description: Returns all role mining sessions that match the query parameters
  parameters:
  - in: query
    name: filters
    schema:
      type: string
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **saved**: *eq*


      **name**: *eq, sw*
    example: saved eq "true" and name sw "RM Session"
  - in: query
    name: sorters
    schema:
      type: string
      format: comma-separated
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **createdBy, createdDate**
    example: createdBy,createdDate
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/count.yaml
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  responses:
    '200':
      description: Succeeded. Returns all role mining sessions that match the query parameters.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/roleminingsessiondto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - iai:access-modeling:read
    - iai:access-modeling:manage
  - applicationAuth:
    - iai:access-modeling:read
    - iai:access-modeling:manage
