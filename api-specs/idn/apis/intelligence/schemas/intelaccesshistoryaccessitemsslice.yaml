type: object
required:
  - items
description: Access-item history slice embedded in the aggregate identity response.
properties:
  items:
    type: array
    description: First page of access-item history events for the identity.
    items:
      $ref: ./intelaccessitemhistoryevent.yaml
  next:
    type: string
    format: uri
    description: Absolute URL to the next access-items page; present only when more results exist.
    example: https://tenant.example.api.cloud.sailpoint.com/intelligence/identities/v1/ef38f94347e94562b5bb8424a56397d8/access-history/access-items?limit=10&offset=10
