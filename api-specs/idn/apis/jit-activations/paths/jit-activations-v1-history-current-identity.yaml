get:
  operationId: listJitActivationHistoryForCurrentIdentityV1
  tags:
  - JIT Activations
  summary: List JIT activation history (self)
  description: |
    Returns JIT activation history records for the authenticated identity only.

    This is the self-service view - results are automatically scoped to the calling identity.
    Requires `idn:jit-activation-history-self:read`.

    Returns HTTP 403 when the `PSPM_858_JIT_ACCESS_ACTIVATION_HISTORY_SEARCH` feature flag is disabled.
  security:
  - userAuth:
    - idn:jit-activation-history-self:read
  x-sailpoint-userLevels:
  - USER
  parameters:
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: sorters
    required: false
    schema:
      type: string
      format: comma-separated
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **activationInitiated, provisionCompleted, status**


      Default sort is **-activationInitiated** (newest first).
    example: -activationInitiated
  - in: query
    name: searchAfter
    required: false
    schema:
      type: string
      format: comma-separated
    style: form
    explode: true
    description: >-
      Used to begin the search window at the values specified. This parameter consists of the last
      values of the sorted fields in the current record set.


      searchAfter length must match the number of sorters. Used to paginate beyond the offset limit of 10,000.


      It is recommended to always include the ID of the object in addition to any other sort fields
      to ensure no duplicate results while paging.


      For example, if sorting by activationInitiated you will also want to include ID:
      searchAfter=2026-07-08T14:33:52.029Z,367fb802-1026-1835-a619-11a56e4c5be3&sorters=activationInitiated,id
    example: "2026-07-08T14:33:52.029Z,367fb802-1026-1835-a619-11a56e4c5be3"
  - in: query
    name: filters
    required: false
    schema:
      type: string
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **entitlementId**: *eq, in*


      **sourceId**: *eq*


      **connectionId**: *eq*


      **status**: *eq, in*


      **activationInitiated**: *gt, lt, ge, le*


      **policyFrictionOutcome**: *eq, in*
    example: status eq "PROVISIONED"
  responses:
    '200':
      description: List of JIT activation history records for the authenticated identity.
      headers:
        X-Total-Count:
          description: The total result count (returned when count=true is passed).
          schema:
            type: integer
            format: int32
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/jitactivationhistorydocument.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
