get:
  operationId: getMachineClassificationConfigV1
  tags:
  - Machine Classification Config
  summary: Machine classification config for source
  description: This API returns a Machine Classification Config for a Source using Source ID.
  security:
  - userAuth:
    - idn:sources:read
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:read
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  parameters:
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    description: Source ID
    example: ef38f94347e94562b5bb8424a56397d8
    x-sailpoint-resource-operation-id: listSourcesV1
  responses:
    '200':
      description: A Config Object
      content:
        application/json:
          schema:
            $ref: ../schemas/machineclassificationconfig.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
put:
  operationId: setMachineClassificationConfigV1
  tags:
  - Machine Classification Config
  summary: Update source's classification config
  description: >-
    Use this API to update Classification Config for a Source. A token with ORG_ADMIN, SOURCE_ADMIN, or SOURCE_SUBADMIN
    authority is required to call this API.
  security:
  - userAuth:
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  parameters:
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    description: Source ID.
    example: ef38f94347e94562b5bb8424a56397d8
    x-sailpoint-resource-operation-id: listSourcesV1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/machineclassificationconfig.yaml
  responses:
    '200':
      description: Updated Machine Classification Config Object.
      content:
        application/json:
          schema:
            $ref: ../schemas/machineclassificationconfig.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
delete:
  operationId: deleteMachineClassificationConfigV1
  tags:
  - Machine Classification Config
  summary: Delete source's classification config
  description: |-
    Use this API to remove Classification Config for a Source. 
    A token with ORG_ADMIN, SOURCE_ADMIN, or SOURCE_SUBADMIN authority is required to call this API.
  security:
  - userAuth:
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  parameters:
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    description: Source ID.
    example: ef38f94347e94562b5bb8424a56397d8
    x-sailpoint-resource-operation-id: listSourcesV1
  responses:
    '200':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
