get:
  operationId: listMachineIdentitiesV2
  tags:
    - Machine Identities
  summary: List machine identities
  description: This API returns a list of machine identities.
  security:
    - userAuth:
        - idn:mis-identity:read
        - idn:mis-identity:manage
    - applicationAuth:
        - idn:mis-identity:read
        - idn:mis-identity:manage
  x-sailpoint-userLevels:
    - ORG_ADMIN
    - SOURCE_ADMIN
    - SOURCE_SUBADMIN
    - HELPDESK
  parameters:
    - in: query
      name: filters
      required: false
      schema:
        type: string
      example: identityId eq "2c9180858082150f0180893dbaf44201"
      description: >-
        Filter results using the standard syntax described in [V3 API Standard Collection
        Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


        Filtering is supported for the following fields and operators:


        **id**: *eq, in, sw*


        **displayName**: *eq, in, sw*


        **nativeIdentity**: *eq, in, sw*


        **attributes**: *eq*


        **manuallyEdited**: *eq*


        **subtype**: *eq, in*


        **owners.primaryIdentity.id**: *eq, in, sw*


        **owners.primaryIdentity.name**: *eq, in, isnull, pr*


        **owners.secondaryIdentity.id**: *eq, in, sw*


        **owners.secondaryIdentity.name**: *eq, in, isnull, pr*


        **owners.secondaryGovernanceGroup.id**: *eq, in*


        **owners.secondaryGovernanceGroup.name**: *eq, in, isnull, pr*


        **source.id**: *eq, in*


        **source.name**: *eq, in, sw*


        **entitlement.id**: *eq, in*


        **entitlement.name**: *eq, in, sw*


        **risk.severity**: *eq, in*
    - in: query
      name: sorters
      schema:
        type: string
        format: comma-separated
      required: false
      description: >-
        Sort results using the standard syntax described in [V3 API Standard Collection
        Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


        Sorting is supported for the following fields: **nativeIdentity, name, owners.primaryIdentity.name, source.name,
        created, modified**
      example: nativeIdentity
    - $ref: ../../shared/parameters/count.yaml
    - $ref: ../../shared/parameters/limit.yaml
    - $ref: ../../shared/parameters/offset.yaml
  responses:
    '200':
      description: List of machine identities.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/machineidentityv2.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  operationId: createMachineIdentityV2
  tags:
    - Machine Identities
  summary: Create machine identity
  description: >-
    Use this API to create a machine identity. Additional owners may be either up to ten human (IDENTITY)
    references or exactly one GOVERNANCE_GROUP reference - not both. The maximum supported length for the
    description field is 2000 characters.
  security:
    - userAuth:
        - idn:mis-identity:manage
    - applicationAuth:
        - idn:mis-identity:manage
  x-sailpoint-userLevels:
    - ORG_ADMIN
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/machineidentityv2.yaml
  responses:
    '201':
      description: Machine identity created (same schema family as v2 GET/PATCH).
      content:
        application/json:
          schema:
            $ref: ../schemas/machineidentityv2.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
