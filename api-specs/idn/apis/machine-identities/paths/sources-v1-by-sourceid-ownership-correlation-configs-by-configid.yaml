  tags:
    - Machine Identities
  summary: Delete ownership correlation config
  description: Deletes the ownership correlation config with the specified ID for the given source resource.
  security:
    - userAuth:
        - idn:sources:update
    - applicationAuth:
        - idn:sources:update
  x-sailpoint-userLevels:
    - ORG_ADMIN
  parameters:
    - in: path
      name: sourceId
      required: true
      schema:
        type: string
      x-sailpoint-resource-operation-id: listSourcesV1
