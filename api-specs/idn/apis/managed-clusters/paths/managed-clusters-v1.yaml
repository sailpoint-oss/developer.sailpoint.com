get:
  tags:
  - Managed Clusters
  summary: Get managed clusters
  description: List current organization's managed clusters, based on request context.
  operationId: getManagedClustersV1
  parameters:
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: filters
    schema:
      type: string
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **operational**: *eq*


      **name**: *eq*


      **type**: *eq*


      **status**: *eq*
    required: false
    example: operational eq "operation"
  responses:
    '200':
      description: Response with a list of managed clusters.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/managedcluster.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:remote-client:read
    - idn:remote-client:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
post:
  tags:
  - Managed Clusters
  summary: Create create managed cluster
  description: |-
    Create a new Managed Cluster.
    The API returns a result that includes the managed cluster ID.
  operationId: createManagedClusterV1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/managedclusterrequest.yaml
  responses:
    '200':
      description: Created managed cluster.
      content:
        application/json:
          schema:
            $ref: ../schemas/managedcluster.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:remote-client:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
