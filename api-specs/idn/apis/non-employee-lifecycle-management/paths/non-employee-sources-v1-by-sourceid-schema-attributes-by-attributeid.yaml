get:
  operationId: getNonEmployeeSchemaAttributeV1
  security:
  - userAuth:
    - idn:nelm:read
  - applicationAuth:
    - idn:nelm:read
  tags:
  - Non-Employee Lifecycle Management
  summary: Get schema attribute non-employee source
  description: >-
    This API gets a schema attribute by Id for the specified Non-Employee SourceId. Requires role context of
    `idn:nesr:read` or the user must be an account manager of the source.
  parameters:
  - in: path
    name: attributeId
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: getNonEmployeeSourceSchemaAttributesV1
    example: ef38f94347e94562b5bb8424a56397d8
    description: The Schema Attribute Id (UUID)
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listNonEmployeeSourcesV1
    example: ef38f94347e94562b5bb8424a56397d8
    description: The Source id
  responses:
    '200':
      description: The Schema Attribute
      content:
        application/json:
          schema:
            $ref: ../schemas/nonemployeeschemaattribute.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
patch:
  operationId: patchNonEmployeeSchemaAttributeV1
  tags:
  - Non-Employee Lifecycle Management
  summary: Patch a schema attribute for non-employee source
  description: |
    This end-point patches a specific schema attribute for a non-employee SourceId.
    Requires role context of `idn:nesr:update`
  parameters:
  - in: path
    name: attributeId
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: getNonEmployeeSourceSchemaAttributesV1
    description: The Schema Attribute Id (UUID)
    example: ef38f94347e94562b5bb8424a56397d8
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listNonEmployeeSourcesV1
    description: The Source id
    example: ef38f94347e94562b5bb8424a56397d8
  requestBody:
    description: >-
      A list of schema attribute update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902)
      standard. The following properties are allowed for update ':' 'label', 'helpText', 'placeholder', 'required'.
    content:
      application/json-patch+json:
        schema:
          type: array
          items:
            $ref: ../../shared/schemas/jsonpatchoperation.yaml
        example:
        - op: replace
          path: /label
          value:
            new attribute label:
    required: true
  responses:
    '200':
      description: The Schema Attribute was successfully patched.
      content:
        application/json:
          schema:
            $ref: ../schemas/nonemployeeschemaattribute.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:nelm:manage
  - applicationAuth:
    - idn:nelm:manage
delete:
  operationId: deleteNonEmployeeSchemaAttributeV1
  tags:
  - Non-Employee Lifecycle Management
  summary: Delete a schema attribute for non-employee source
  description: |
    This end-point deletes a specific schema attribute for a non-employee source.
    Requires role context of `idn:nesr:delete`
  parameters:
  - in: path
    name: attributeId
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: getNonEmployeeSourceSchemaAttributesV1
    description: The Schema Attribute Id (UUID)
    example: ef38f94347e94562b5bb8424a56397d8
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listNonEmployeeSourcesV1
    description: The Source id
    example: ef38f94347e94562b5bb8424a56397d8
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
      description: The Schema Attribute was successfully deleted.
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:nelm:manage
  - applicationAuth:
    - idn:nelm:manage
