post:
  operationId: createNonEmployeeSourceV1
  security:
  - userAuth:
    - idn:nelm:manage
  - applicationAuth:
    - idn:nelm:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  tags:
  - Non-Employee Lifecycle Management
  summary: Create non-employee source
  description: 'Create a non-employee source. '
  requestBody:
    description: Non-Employee source creation request body.
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/nonemployeesourcerequestbody.yaml
  responses:
    '200':
      description: Created non-employee source.
      content:
        application/json:
          schema:
            $ref: ../schemas/nonemployeesourcewithcloudexternalid.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
get:
  operationId: listNonEmployeeSourcesV1
  security:
  - userAuth:
    - idn:nelm:read
  - applicationAuth:
    - idn:nelm:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  tags:
  - Non-Employee Lifecycle Management
  summary: List non-employee sources
  description: |-
    Get a list of non-employee sources. There are two contextual uses for the `requested-for` path parameter: 
      1. If the user has the role context of `idn:nesr:read`, he or she may request a list sources assigned to a particular account manager by passing in that manager's `id`.
      2. If the current user is an account manager, the user should provide 'me' as the `requested-for` value. Doing so provide the user with a list of the sources he or she owns.
  parameters:
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: requested-for
    required: false
    schema:
      type: string
    example: me
    description: Identity the request was made for. Use 'me' to indicate the current user.
  - in: query
    name: non-employee-count
    required: false
    example: true
    schema:
      type: boolean
      default: false
    description: Flag that determines whether the API will return a non-employee count associated with the source.
  - in: query
    name: sorters
    required: false
    schema:
      type: string
      format: comma-separated
    example: name,created
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **name, created, sourceId**
  responses:
    '200':
      description: List of non-employee sources objects.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/nonemployeesourcewithnecount.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
