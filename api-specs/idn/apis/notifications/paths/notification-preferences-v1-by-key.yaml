get:
  operationId: getNotificationPreferencesV1
  tags:
  - Notifications
  summary: List notification preferences for tenant.
  description: Returns a list of notification preferences for tenant.
  security:
  - userAuth:
    - idn:notification-preferences:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  responses:
    '200':
      description: Return preference for the given notification key.
      content:
        application/json:
          schema:
            $ref: ../schemas/preferencesdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  parameters:
  - in: path
    name: key
    schema:
      type: string
    required: true
    description: The key.
