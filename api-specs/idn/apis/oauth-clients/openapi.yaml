openapi: 3.0.1
info:
  title: Identity Security Cloud API - OAuth Clients
  description: >-
    Use these APIs to interact with the Identity Security Cloud platform to achieve repeatable, automated processes with
    greater scalability. We encourage you to join the SailPoint Developer Community forum at
    https://developer.sailpoint.com/discuss to connect with other developers using our APIs.
  termsOfService: https://developer.sailpoint.com/discuss/tos
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: v1
servers:
  - url: https://{tenant}.api.identitynow.com
    description: This is the production API server.
    variables:
      tenant:
        default: sailpoint
        description: This is the name of your tenant, typically your company's name.
  - url: https://{apiUrl}
    description: This is the versioned API server.
    variables:
      apiUrl:
        default: sailpoint.api.identitynow.com
        description: This is the api url of your tenant
tags:
  - name: OAuth Clients
    description: >
      Use this API to implement OAuth client functionality.   

      With this functionality in place, users with the appropriate security scopes can create and configure OAuth
      clients to use as a way to obtain authorization to use the Identity Security Cloud REST API.

      Refer to [Authentication](https://developer.sailpoint.com/docs/api/authentication/) for more information about
      OAuth and how it works with the Identity Security Cloud REST API.
paths:
  /oauth-clients/v1:
    $ref: ./paths/oauth-clients-v1.yaml
  /oauth-clients/v1/{id}:
    $ref: ./paths/oauth-clients-v1-by-id.yaml
security:
  - userAuth:
      - sp:scopes:all
