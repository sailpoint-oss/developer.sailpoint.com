get:
  operationId: listOauthClientsV1
  security:
  - userAuth:
    - sp:oauth-client:read
    - sp:oauth-client:manage
  tags:
  - OAuth Clients
  summary: List oauth clients
  description: This gets a list of OAuth clients.
  parameters:
  - in: query
    name: filters
    required: false
    schema:
      type: string
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **lastUsed**: *le, isnull*
    example: lastUsed le 2023-02-05T10:59:27.214Z
  responses:
    '200':
      description: List of OAuth clients.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/getoauthclientresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  operationId: createOauthClientV1
  security:
  - userAuth:
    - sp:oauth-client:manage
  tags:
  - OAuth Clients
  summary: Create oauth client
  description: This creates an OAuth client.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/createoauthclientrequest.yaml
  responses:
    '200':
      description: Request succeeded.
      content:
        application/json:
          schema:
            $ref: ../schemas/createoauthclientresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
