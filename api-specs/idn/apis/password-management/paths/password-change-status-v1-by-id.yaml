get:
  operationId: getPasswordChangeStatusV1
  tags:
  - Password Management
  summary: Get password change request status
  security:
  - userAuth:
    - idn:password-change:read
  - applicationAuth:
    - idn:password-change:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  description: This API returns the status of a password change request.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: setPasswordV1
    example: 089899f13a8f4da7824996191587bab9
    description: Password change request ID
  responses:
    '200':
      description: Status of the password change request
      content:
        application/json:
          schema:
            $ref: ../schemas/passwordstatus.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
