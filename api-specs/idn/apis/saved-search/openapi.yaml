openapi: 3.0.1
info:
  title: Identity Security Cloud API - Saved Search
  description: >-
    Use these APIs to interact with the Identity Security Cloud platform to achieve repeatable, automated processes with
    greater scalability. We encourage you to join the SailPoint Developer Community forum at
    https://developer.sailpoint.com/discuss to connect with other developers using our APIs.
  termsOfService: https://developer.sailpoint.com/discuss/tos
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: v1
servers:
  - url: https://{tenant}.api.identitynow.com
    description: This is the production API server.
    variables:
      tenant:
        default: sailpoint
        description: This is the name of your tenant, typically your company's name.
  - url: https://{apiUrl}
    description: This is the versioned API server.
    variables:
      apiUrl:
        default: sailpoint.api.identitynow.com
        description: This is the api url of your tenant
tags:
  - name: Saved Search
    description: >
      Use this API to implement saved search functionality. 

      With saved search functionality in place, users can save search queries and then view those saved searches, as
      well as rerun them. 


      Search queries in Identity Security Cloud can grow very long and specific, which can make reconstructing them
      difficult or tedious, so it can be especially helpful to save search queries. 

      It also opens the possibility to configure Identity Security Cloud to run the saved queries on a schedule, which
      is essential to detecting user information and access changes throughout an organization's tenant and across all
      its sources. 

      Refer to [Scheduled Search](https://developer.sailpoint.com/docs/api/v2025/scheduled-search/) for more information
      about running saved searches on a schedule. 


      In Identity Security Cloud, users can save searches under a name, and then they can access that saved search and
      run it again when they want. 


      Refer to [Managing Saved Searches](https://documentation.sailpoint.com/saas/help/search/saved-searches.html) for
      more information about saving searches and using them.
paths:
  /saved-searches/v1:
    $ref: ./paths/saved-searches-v1.yaml
  /saved-searches/v1/{id}:
    $ref: ./paths/saved-searches-v1-by-id.yaml
  /saved-searches/v1/{id}/execute:
    $ref: ./paths/saved-searches-v1-by-id-execute.yaml
security:
  - userAuth:
      - sp:scopes:all
