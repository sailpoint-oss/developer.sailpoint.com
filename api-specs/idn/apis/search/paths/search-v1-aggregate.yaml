post:
  tags:
  - Search
  description: >-
    Performs a search query aggregation and returns the aggregation result. By default, you can page a maximum of 10,000
    search result records.  To page past 10,000 records, you can use searchAfter paging.  Refer to [Paginating Search
    Queries](https://developer.sailpoint.com/idn/api/standard-collection-parameters#paginating-search-queries) for more
    information about how to implement searchAfter paging. 
  operationId: searchAggregateV1
  security:
  - userAuth:
    - sp:search:read
  - applicationAuth:
    - sp:search:read
  summary: Perform a search query aggregation
  parameters:
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/count.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../shared/schemas/search.yaml
        examples:
          metricAggregation:
            $ref: ../examples/metricaggregation.yaml
          metricAggregation-dsl:
            $ref: ../examples/metricaggregation-dsl.yaml
          bucketAggregation:
            $ref: ../examples/bucketaggregation.yaml
          bucketAggregation-dsl:
            $ref: ../examples/bucketaggregation-dsl.yaml
          nestedAggregation-bucketAggregation:
            $ref: ../examples/nestedaggregation-bucketaggregation.yaml
          nestedAggregation-bucketAggregation-dsl:
            $ref: ../examples/nestedaggregation-bucketaggregation-dsl.yaml
          nestedAggregation-filterAggregation-bucketAggregation:
            $ref: ../examples/nestedaggregation-filteraggregation-bucketaggregation.yaml
          nestedAggregation-filterAggregation-bucketAggregation-dsl:
            $ref: ../examples/nestedaggregation-filteraggregation-bucketaggregation-dsl.yaml
          bucketAggregation-subAggregation:
            $ref: ../examples/bucketaggregation-subaggregation.yaml
          bucketAggregation-subAggregation-dsl:
            $ref: ../examples/bucketaggregation-subaggregation-dsl.yaml
    required: true
  responses:
    '200':
      description: Aggregation results.
      content:
        application/json:
          schema:
            $ref: ../schemas/aggregationresult.yaml
        text/csv:
          schema:
            $ref: ../schemas/aggregationresult-csv.yaml
      headers:
        X-Total-Count:
          description: The total result count (returned only if the *count* parameter is specified as *true*).
          schema:
            type: integer
          example: 5
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
