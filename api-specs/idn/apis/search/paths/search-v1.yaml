post:
  tags:
  - Search
  description: >-
    Perform a search with the provided query and return a matching result collection. To page past 10,000 records, you
    can use `searchAfter` paging.  Refer to [Paginating Search
    Queries](https://developer.sailpoint.com/idn/api/standard-collection-parameters#paginating-search-queries) for more
    information about how to implement `searchAfter` paging. The search query itself has a size limitation of
    approximately 800 objects when filtering by large lists of IDs or values (e.g., using `terms` filters with extensive
    lists).
  externalDocs:
    description: Learn more about search.
    url: https://documentation.sailpoint.com/saas/help/search/index.html
  operationId: searchPostV1
  security:
  - userAuth:
    - sp:search:read
  - applicationAuth:
    - sp:search:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  - REPORT_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  - ROLE_ADMIN
  - ROLE_SUBADMIN
  summary: Perform search
  parameters:
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../parameters/searchlimit.yaml
  - $ref: ../../shared/parameters/count.yaml
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../shared/schemas/search.yaml
        examples:
          accessProfiles:
            $ref: ../examples/query-accessprofiles.yaml
          accountActivities:
            $ref: ../examples/query-accountactivities.yaml
          entitlements:
            $ref: ../examples/query-entitlements.yaml
          events:
            $ref: ../examples/query-events.yaml
          identities:
            $ref: ../examples/query-identities.yaml
          roles:
            $ref: ../examples/query-roles.yaml
          query-fields:
            $ref: ../examples/query-fields.yaml
          query-timeZone:
            $ref: ../examples/query-timezone.yaml
          query-innerHit:
            $ref: ../examples/query-innerhit.yaml
          typeAheadQuery:
            $ref: ../examples/typeaheadquery.yaml
          typeAheadQuery-nestedType:
            $ref: ../examples/typeaheadquery-nestedtype.yaml
          filter-exists:
            $ref: ../examples/filter-exists.yaml
          filter-range:
            $ref: ../examples/filter-range.yaml
          filter-terms:
            $ref: ../examples/filter-terms.yaml
    required: true
  responses:
    '200':
      description: List of matching documents.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/searchdocuments.yaml
          examples:
            accessProfiles:
              $ref: ../examples/accessprofiles.yaml
            accountActivities:
              $ref: ../examples/accountactivities.yaml
            entitlements:
              $ref: ../examples/entitlements.yaml
            events:
              $ref: ../examples/events.yaml
            identities:
              $ref: ../examples/identities.yaml
            roles:
              $ref: ../examples/roles.yaml
            query-fields:
              $ref: ../examples/queryfields.yaml
            query-timeZone:
              $ref: ../examples/querytimezone.yaml
            query-innerHit:
              $ref: ../examples/queryinnerhit.yaml
            typeAheadQuery:
              $ref: ../examples/typeaheadquery-2.yaml
            typeAheadQuery-nestedType:
              $ref: ../examples/typeaheadquerynestedtype.yaml
            filter-exists:
              $ref: ../examples/filterexists.yaml
            filter-range:
              $ref: ../examples/filterrange.yaml
            filter-terms:
              $ref: ../examples/filterterms.yaml
      headers:
        X-Total-Count:
          schema:
            type: integer
          description: The total result count (returned only if the *count* parameter is specified as *true*).
          example: 30
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
