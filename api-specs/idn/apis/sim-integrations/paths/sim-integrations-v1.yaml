get:
  tags:
  - SIM Integrations
  summary: List the existing sim integrations.
  description: List the existing SIM integrations.
  operationId: getSIMIntegrationsV1
  responses:
    '200':
      description: The DTO containing the details of the SIM integration
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/servicedeskintegrationdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:service-desk-integration:read
    - idn:service-desk-integration:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
post:
  tags:
  - SIM Integrations
  summary: Create new sim integration
  description: Create a new SIM Integrations.
  operationId: createSIMIntegrationV1
  requestBody:
    description: DTO containing the details of the SIM integration
    content:
      application/json:
        schema:
          $ref: ../schemas/simintegrationdetails.yaml
    required: true
  responses:
    '200':
      description: details of the created integration
      content:
        application/json:
          schema:
            $ref: ../schemas/servicedeskintegrationdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:service-desk-integration:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
