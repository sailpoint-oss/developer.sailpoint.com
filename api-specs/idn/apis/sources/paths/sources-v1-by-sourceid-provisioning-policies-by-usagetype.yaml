get:
  operationId: getProvisioningPolicyV1
  tags:
  - Sources
  summary: Get provisioning policy by usagetype
  description: This end-point retrieves the ProvisioningPolicy with the specified usage on the specified Source in IdentityNow.
  security:
  - userAuth:
    - idn:provisioning-policy-source:read
    - idn:provisioning-policy:read
    - idn:provisioning-policy-source-admin-operations:manage
    - idn:provisioning-policy:manage
  - applicationAuth:
    - idn:provisioning-policy-source:read
    - idn:provisioning-policy:read
    - idn:provisioning-policy-source-admin-operations:manage
    - idn:provisioning-policy:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  parameters:
  - in: path
    name: sourceId
    required: true
    x-sailpoint-resource-operation-id: listSourcesV1
    schema:
      type: string
    description: The Source ID.
    example: 2c9180835d191a86015d28455b4a2329
  - in: path
    name: usageType
    required: true
    description: >-
      The type of provisioning policy usage. 

      In IdentityNow, a source can support various provisioning operations. For example, when a joiner is added to a
      source, this may trigger both CREATE and UPDATE provisioning operations.  Each usage type is considered a
      provisioning policy.  A source can have any number of these provisioning policies defined. 

      These are the common usage types: 

      CREATE - This usage type relates to 'Create Account Profile', the provisioning template for the account to be
      created. For example, this would be used for a joiner on a source.  

      UPDATE - This usage type relates to 'Update Account Profile', the provisioning template for the 'Update'
      connector operations. For example, this would be used for an attribute sync on a source.

      ENABLE - This usage type relates to 'Enable Account Profile', the provisioning template for the account to be
      enabled. For example, this could be used for a joiner on a source once the joiner's account is created. 

      DISABLE - This usage type relates to 'Disable Account Profile', the provisioning template for the account to be
      disabled. For example, this could be used when a leaver is removed temporarily from a source. 

      You can use these four usage types for all your provisioning policy needs.
    example: CREATE
    schema:
      $ref: ../schemas/usagetype.yaml
    x-sailpoint-resource-operation-id: listProvisioningPoliciesV1
  responses:
    '200':
      description: The requested ProvisioningPolicyDto was successfully retrieved.
      content:
        application/json:
          schema:
            $ref: ../schemas/provisioningpolicydto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
