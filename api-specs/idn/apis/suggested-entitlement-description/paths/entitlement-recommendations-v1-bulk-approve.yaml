post:
  tags:
  - Suggested Entitlement Description
  operationId: approveBulkEntitlementRecommendationsV1
  summary: Bulk approve entitlement recommendations
  description: >-
    Approve multiple entitlement recommendations in a single request. Each item in the request must include the
    recommendation ID and, depending on the record type, either an approved description (SED items) or an approved
    privilege level (privilege items). Returns a per-item result indicating success or failure.
  requestBody:
    description: The list of recommendation items to approve.
    content:
      application/json:
        schema:
          $ref: ../schemas/bulkapproveentitlementrecommendationrequest.yaml
    required: true
  responses:
    '200':
      description: Per-item approval results.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/bulkapproveentitlementrecommendationresult.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:sed:manage
  - applicationAuth:
    - idn:sed:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
