get:
  operationId: getTagByIdV1
  tags:
  - Tags
  summary: Get tag by id
  description: >-
    Returns a tag by its id.


    A token with API, ORG_ADMIN, CERT_ADMIN, REPORT_ADMIN, ROLE_ADMIN, ROLE_SUBADMIN, SOURCE_ADMIN, or SOURCE_SUBADMIN
    authority is required to call this API.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listTagsV1
    description: The ID of the object reference to retrieve.
    example: 329d96cf-3bdb-40a9-988a-b5037ab89022
  responses:
    '200':
      description: Tag
      content:
        application/json:
          schema:
            $ref: ../schemas/tag-2.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:tag:read
    - idn:tag:manage
  - applicationAuth:
    - idn:tag:read
    - idn:tag:manage
delete:
  operationId: deleteTagByIdV1
  tags:
  - Tags
  summary: Delete tag
  description: >-
    This API deletes a tag by specified id.


    A token with API, ORG_ADMIN, CERT_ADMIN, REPORT_ADMIN, ROLE_ADMIN, ROLE_SUBADMIN, SOURCE_ADMIN, or SOURCE_SUBADMIN
    authority is required to call this API.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listTagsV1
    description: The ID of the object reference to delete.
    example: 329d96cf-3bdb-40a9-988a-b5037ab89022
  responses:
    '204':
      description: No content.
    '400':
      description: Client Error - Returned if the request body is invalid.
      content:
        application/json:
          schema:
            $ref: ../../shared/schemas/errorresponsedto.yaml
          examples:
            400.1 Bad Request Content:
              description: Response for bad request content
              value:
                detailCode: 400.1 Bad Request Content
                trackingId: 1ea1adcb84da4dcb890145e05745774e
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The request was syntactically correct but its content is semantically invalid.
            400.2.1 Referential integrity violation:
              description: Response for reference violations
              value:
                detailCode: 400.2.1 Referential integrity violation
                trackingId: 33956b59f6d44081a11f91959dd8731d
                messages:
                - locale: en-US
                  localeOrigin: DEFAULT
                  text: The request cannot be fulfilled because doing so would violate referential integrity constraints.
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:tag:manage
  - applicationAuth:
    - idn:tag:manage
