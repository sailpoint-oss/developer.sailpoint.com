get:
  operationId: getTenantV1
  tags:
  - Tenant
  summary: Get tenant information.
  description: This rest endpoint can be used to retrieve tenant details.
  security:
  - userAuth:
    - sp:tenant:read
  x-sailpoint-userLevels:
  - Any
  responses:
    '200':
      description: Tenant Info
      content:
        application/json:
          schema:
            $ref: ../schemas/tenant.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
