get:
  operationId: getCountCompletedWorkItemsV1
  tags:
  - Work Items
  summary: Count completed work items
  description: >-
    This gets a count of completed work items belonging to either the specified user(admin required), or the current
    user.
  parameters:
  - in: query
    name: ownerId
    schema:
      type: string
    description: ID of the work item owner.
    required: false
  responses:
    '200':
      description: List of work items
      content:
        application/json:
          schema:
            $ref: ../schemas/workitemscount.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
