post:
  operationId: cancelWorkflowExecutionV1
  tags:
  - Workflows
  summary: Cancel workflow execution by id
  description: Use this API to cancel a running workflow execution.
  security:
  - userAuth:
    - sp:workflow-execute:external
  parameters:
  - name: id
    in: path
    description: The workflow execution ID
    required: true
    style: simple
    explode: false
    schema:
      type: string
      example: c17bea3a-574d-453c-9e04-4365fbf5af0b
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
