get:
  x-sailpoint-userLevels:
    - ORG_ADMIN
  tags:
    - Custom Forms
  summary: List form instances by tenant.
  description: No parameters required.
  operationId: searchFormInstancesByTenant
  parameters:
    - name: offset
      in: query
      description: |-
        Offset

        Integer specifying the offset of the first result from the beginning of the collection. The standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#paginating-results).
        The offset value is record-based, not page-based, and the index starts at 0.
      schema:
        type: integer
        format: int64
        default: 0
        x-go-name: Offset
      example: 0
      required: false
      x-go-name: Offset
    - name: limit
      in: query
      description: |-
        Limit

        Integer specifying the maximum number of records to return in a single API call. The standard syntax described in [V3 API Standard Collection Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#paginating-results).
        If it is not specified, a default limit is used.
      schema:
        type: integer
        format: int64
        maximum: 250
        minimum: 0
        default: 250
        x-go-name: Limit
      example: 100
      required: false
      x-go-name: Limit
  responses:
    '200':
      description: Returns a list of form instances by tenant
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/forms/FormInstanceResponse.yaml
    '400':
      description: An error with the request occurred
      content:
        application/json:
          schema:
            type: object
            properties:
              detailCode:
                type: string
                x-go-name: DetailCode
              messages:
                type: array
                items:
                  $ref: ../schemas/forms/ErrorMessage.yaml
                x-go-name: Messages
              statusCode:
                type: integer
                format: int64
                x-go-name: StatusCode
              trackingId:
                type: string
                x-go-name: TrackingID
    '401':
      description: An error with the authorization occurred
      content:
        application/json:
          schema:
            type: object
            properties:
              detailCode:
                type: string
                x-go-name: DetailCode
              messages:
                type: array
                items:
                  $ref: ../schemas/forms/ErrorMessage.yaml
                x-go-name: Messages
              statusCode:
                type: integer
                format: int64
                x-go-name: StatusCode
              trackingId:
                type: string
                x-go-name: TrackingID
    '403':
      description: An error with the user permissions occurred
      content:
        application/json:
          schema:
            type: object
            properties:
              detailCode:
                type: string
                x-go-name: DetailCode
              messages:
                type: array
                items:
                  $ref: ../schemas/forms/ErrorMessage.yaml
                x-go-name: Messages
              statusCode:
                type: integer
                format: int64
                x-go-name: StatusCode
              trackingId:
                type: string
                x-go-name: TrackingID
    '429':
      description: Too many requests. The list form instances operation is limited to 50 requests per 10 seconds per tenant; reduce call frequency or wait before retrying.
      content:
        application/json:
          schema:
            $ref: ../schemas/forms/Error.yaml
    '500':
      description: An internal server error occurred
      content:
        application/json:
          schema:
            type: object
            properties:
              detailCode:
                type: string
                x-go-name: DetailCode
              messages:
                type: array
                items:
                  $ref: ../schemas/forms/ErrorMessage.yaml
                x-go-name: Messages
              statusCode:
                type: integer
                format: int64
                x-go-name: StatusCode
              trackingId:
                type: string
                x-go-name: TrackingID
  security:
    - userAuth:
        - sp:forms:read
        - sp:forms:manage
