type: object
title: Template Bulk Delete Dto
properties:
  key:
    type: string
    example: "cloud_manual_work_item_summary"
    description: The template key to delete
  medium:
    type: string
    enum:
      - EMAIL
      - SLACK
      - TEAMS
    example: EMAIL
    description: The notification medium (EMAIL, SLACK, or TEAMS)
  locale:
    type: string
    description: The locale for the message text, a BCP 47 language tag.
    example: "en"
required:
  - key