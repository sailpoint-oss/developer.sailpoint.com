get:
  security:
  - userAuth:
    - sp:notification-dkim-attributes:read
  x-sailpoint-userLevels:
    - ORG_ADMIN
  operationId: getDkimAttributes
  tags:
  - Notifications
  summary: Get dkim attributes
  description: Retrieve DKIM (DomainKeys Identified Mail) attributes for all your
    tenants' AWS SES identities. Limits retrieval to 100 identities per call.
  parameters:
  - $ref: ../parameters/limit.yaml
  - $ref: ../parameters/offset.yaml
  responses:
    '200':
      description: List of DKIM Attributes
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/DkimAttributes.yaml
    '400':
      $ref: ../responses/400.yaml
    '401':
      $ref: ../responses/401.yaml
    '403':
      $ref: ../responses/403.yaml
    '429':
      $ref: ../responses/429.yaml
    '500':
      $ref: ../responses/500.yaml
post:
  security:
  - userAuth:
    - sp:notification-verify-domain-dkim:write
  x-sailpoint-userLevels:
    - ORG_ADMIN
  operationId: createDomainDkim
  tags:
  - Notifications
  summary: Verify domain address via dkim
  description: Create a domain to be verified via DKIM (DomainKeys Identified Mail)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/DomainAddress.yaml
  responses:
    '200':
      description: List of DKIM tokens required for the verification process.
      content:
        application/json:
          schema:
            $ref: ../schemas/DomainStatusDto.yaml
    '400':
      $ref: ../responses/400.yaml
    '401':
      $ref: ../responses/401.yaml
    '403':
      $ref: ../responses/403.yaml
    '405':
      $ref: ../responses/405.yaml
    '429':
      $ref: ../responses/429.yaml
    '500':
      $ref: ../responses/500.yaml
