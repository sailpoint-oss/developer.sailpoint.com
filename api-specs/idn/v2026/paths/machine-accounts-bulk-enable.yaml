post:
  operationId: enableMachineAccountsInBulk
  tags:
    - Machine Accounts
  summary: Bulk enable machine accounts
  description: |-
    Submits an asynchronous request to enable up to 100 machine accounts.

    The response returns HTTP 202 Accepted with an **accountRequestId** task identifier. Use the account request APIs to track completion.

    Callers without the **idn:mis-account:enable** right may still enable accounts they own. Non-owned IDs are excluded from the task.
  security:
    - userAuth:
        - idn:mis-account:enable
    - applicationAuth:
        - idn:mis-account:enable
  x-sailpoint-userLevels:
    - ORG_ADMIN
    - SOURCE_ADMIN
    - SOURCE_SUBADMIN
  parameters:
    - name: X-SailPoint-Experimental
      in: header
      description: Use this header to enable this experimental API.
      example: true
      schema:
        type: string
        default: true
      required: true
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/MisBulkRequest.yaml
  responses:
    '202':
      description: Bulk enable request accepted.
      content:
        application/json:
          schema:
            $ref: ../schemas/AccountRequestAsyncResult.yaml
          example:
            accountRequestId: 2d81808474683da6017468693c260196
    '400':
      $ref: ../responses/400.yaml
    '401':
      $ref: ../responses/401.yaml
    '403':
      $ref: ../responses/403.yaml
    '429':
      $ref: ../responses/429.yaml
    '500':
      $ref: ../responses/500.yaml
