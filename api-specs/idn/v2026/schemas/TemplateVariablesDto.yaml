type: object
title: Template Variables DTO
description: |
  Variables available for use in a notification template. Variables can be template-specific (from domain events)
  or global (available to all templates like __recipient, __global, __util).
properties:
  key:
    type: string
    description: The notification template key.
    example: "approval_request_notification"
  medium:
    $ref: ./TemplateMediumDto.yaml
    description: The notification template medium (e.g. EMAIL, SLACK, TEAMS).
  globalVariables:
    type: array
    description: |
      Global variables available to all templates for this tenant (e.g. __global.*, __recipient, __util.*, __dateTool.*, __esc.*).
      Includes both data variables and function-type helpers.
    items:
      $ref: ./TemplateVariable.yaml
    nullable: true
    example:
      - key: "__global.productName"
        type: "string"
        description: "The human-readable name of the product or application."
        example: "SailPoint Identity Security Cloud"
      - key: "__esc.html()"
        type: "function"
        description: "Escapes the characters in a string using HTML entities (e.g. &quot;, &amp;)."
        example: "$__esc.html($value)"
      - key: "__global.standardLogoURL"
        type: "string"
        description: "URL for the standard size logo displayed on various pages."
        example: null
  templateVariables:
    type: array
    description: Template-specific variables for the given key and medium (e.g. approverPath, requester, attributes).
    items:
      $ref: ./TemplateVariable.yaml
    nullable: true
    example:
      - key: "approvalName"
        type: "string"
        description: "Display name of the approval request"
        example: "Request for Access to Sales Application"
      - key: "requester"
        type: "object"
        description: "Identity who submitted the approval request"
        example:
          identityID: "4701645331ee4e578ca7884da99452fc"
          type: "IDENTITY"
          name: "Rebecca Requester"
          email: "rebecca@testmail.identitysoon.com"
