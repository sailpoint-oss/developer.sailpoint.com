type: object
required:
  - detailCode
properties:
  detailCode:
    type: string
    enum:
      - IDC_IDENTITY_NOT_FOUND
    description: Constant detail code indicating that no identity matched the supplied filter.
    example: IDC_IDENTITY_NOT_FOUND
  message:
    type: string
    description: Optional explanatory text describing why no identity was found.
    example: No identity matched the supplied SCIM filter expression.
