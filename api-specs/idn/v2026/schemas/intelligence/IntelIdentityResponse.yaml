type: object
description: |
  HUMAN responses include human, top-level subtype (NERM classification:
  Employee, Non Employee, or Cannot Determine), and _links (access and accessHistory only).
  MACHINE responses include machine and top-level subtype (connector subtype string);
  _links is omitted.
required:
  - id
  - type
  - timestamps
properties:
  id:
    type: string
    description: Identity Security Cloud identifier for this identity.
    example: ef38f94347e94562b5bb8424a56397d8
  type:
    type: string
    enum:
      - HUMAN
      - MACHINE
    description: Discriminator indicating whether this identity is human or machine backed.
    example: HUMAN
  displayName:
    type: string
    description: Preferred display name for the identity across administrative experiences.
    example: Jane Example
  description:
    type: string
    nullable: true
    description: Optional free-text description assigned to the identity profile when present.
    example: Contractor identity for example project work.
  subtype:
    type: string
    nullable: true
    description: |
      For HUMAN identities, NERM classification (Employee, Non Employee, or Cannot Determine).
      For MACHINE identities, connector subtype string from the authoritative source.
    example: Employee
  owners:
    type: string
    nullable: true
    description: Serialized owner reference information when populated by upstream identity services.
    example: governance-group-001
  attributes:
    type: object
    additionalProperties: true
    description: Arbitrary SCIM-style attribute bag returned for the identity context view.
    example:
      department: Engineering
      region: US
  timestamps:
    type: object
    description: Created and modified timestamps for the identity record in Identity Security Cloud.
    allOf:
      - $ref: ./IntelIdentityTimestamps.yaml
  human:
    type: object
    description: Human identity extension payload when type is HUMAN.
    nullable: true
    allOf:
      - $ref: ./IntelHuman.yaml
  machine:
    type: object
    description: Machine identity extension payload when type is MACHINE.
    nullable: true
    allOf:
      - $ref: ./IntelMachine.yaml
  _links:
    type: object
    description: Hyperlinks to related Intelligence Package sub-resources; present for HUMAN only.
    nullable: true
    allOf:
      - $ref: ./IntelIdentityLinks.yaml
