openapi: 3.0.3
info:
  title: SailPoint Authentication API
  description: API for secure authentication with SailPoint using asymmetric encryption
  version: 1.0.0
  contact:
    name: SailPoint Developer Relations
    url: https://developer.sailpoint.com
servers:
  - url: https://api.example.com/Prod
    description: Production server
paths:
  /sailapps/auth:
    post:
      summary: Initiate authentication
      description: >-
        Starts the authentication flow with tenant info and public key.
        Internally generates a PKCE code challenge (S256) and includes it in the authorization URL.
        The code verifier, public key, redirect URI, and pickup secret hash are stored server-side.
      operationId: initiateAuth
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AuthRequest'
      responses:
        '200':
          description: Authentication initiated successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '400':
          description: Bad request - missing or invalid parameters
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sailapps/auth/code:
    post:
      summary: Exchange authorization code for token
      description: >-
        Exchanges an OAuth authorization code for an access token.
        Automatically includes the PKCE code verifier (stored during auth initiation) in the token exchange request.
      operationId: exchangeCode
      tags:
        - Authentication
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - code
                - state
              properties:
                code:
                  type: string
                  description: The authorization code from the OAuth provider
                  example: "4/0AQlEd8yZgFjQXDhE..."
                state:
                  type: string
                  description: The state parameter returned from the OAuth provider
                  example: "eyJpZCI6IjEyMzQ1Njc4LTkwYWItY2RlZi0xMjM0LTU2Nzg5MGFiY2RlZiJ9"
      responses:
        '200':
          description: Token exchange successful
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Token added successfully
        '400':
          description: Bad request - missing code or state
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sailapps/auth/token/{uuid}:
    get:
      summary: Retrieve encrypted token
      description: Retrieves and consumes the encrypted token for a specific UUID. The pickup secret returned by initiateAuth must be sent as a bearer token.
      operationId: getToken
      tags:
        - Tokens
      security:
        - pickupSecret: []
      parameters:
        - name: uuid
          in: path
          description: The UUID of the stored token
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: Token retrieved successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        '400':
          description: Bad request - token not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          description: Missing pickup secret
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /sailapps/auth/refresh:
    post:
      summary: Refresh token
      description: Exchanges a refresh token for a new access token
      operationId: refreshToken
      tags:
        - Tokens
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenData'
        '400':
          description: Bad request - invalid refresh token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '500':
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    pickupSecret:
      type: http
      scheme: bearer
      description: Pickup secret returned by POST /sailapps/auth.

  schemas:

    AuthRequest:
      type: object
      required:
        - publicKey
      properties:
        tenant:
          type: string
          description: The SailPoint tenant name
          example: acme-corp
        apiBaseURL:
          type: string
          description: The base URL for the SailPoint API
          example: https://acme-corp.api.identitynow.com
        publicKey:
          type: string
          description: The Base64-encoded public key
          example: "LS0tLS1CRUdJTiBQVUJM..."
        dev:
          type: boolean
          description: Whether to use development mode
          default: false

    AuthResponse:
      type: object
      properties:
        authURL:
          type: string
          description: The URL to redirect the user to for authentication
          example: https://acme-corp.identitynow.com/oauth/authorize?client_id=...
        id:
          type: string
          format: uuid
          description: The UUID for retrieving the token later
          example: 12345678-90ab-cdef-1234-567890abcdef
        baseURL:
          type: string
          description: The base URL for the SailPoint API
          example: https://acme-corp.api.identitynow.com
        pickupSecret:
          type: string
          description: Secret required to retrieve the encrypted token. Store this only in the initiating application.
          example: "BvvfLP_1m4u5p7UTgVk3b1U_ZvR2tiixc-3S3eCXV78"
        ttl:
          type: integer
          description: Unix timestamp when the auth session expires
          example: 1717267200

    TokenResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: The UUID of the token
          example: 12345678-90ab-cdef-1234-567890abcdef
        tokenInfo:
          type: string
          description: The encrypted token data
          example: "{\"version\":\"1.0\",\"algorithm\":{\"symmetric\":\"AES-256-GCM\",\"asymmetric\":\"RSA-OAEP-SHA256\"},\"data\":{\"ciphertext\":\"...\",\"encryptedKey\":\"...\",\"iv\":\"...\",\"authTag\":\"...\"}}"
        ttl:
          type: integer
          description: Unix timestamp when the token pickup record expires
          example: 1717267200

    RefreshRequest:
      type: object
      required:
        - refreshToken
      properties:
        refreshToken:
          type: string
          description: The refresh token
          example: def502...
        tenant:
          type: string
          description: The SailPoint tenant name
          example: acme-corp
        apiBaseURL:
          type: string
          description: The base URL for the SailPoint API
          example: https://acme-corp.api.identitynow.com

    TokenData:
      type: object
      properties:
        access_token:
          type: string
          description: The OAuth access token
          example: eyJhbGciOiJIUzI1NiIs...
        token_type:
          type: string
          description: The token type
          example: Bearer
        refresh_token:
          type: string
          description: The refresh token
          example: def502...
        expires_in:
          type: integer
          description: Seconds until the token expires
          example: 3600
        scope:
          type: string
          description: The token scope
          example: read write

    Error:
      type: object
      properties:
        message:
          type: string
          description: Error message
          example: Invalid request parameters