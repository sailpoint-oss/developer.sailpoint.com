get:
  summary: List access model metadata attributes
  description: Get a list of Access Model Metadata Attributes
  tags:
  - Access Model Metadata
  operationId: listAccessModelMetadataAttributeV1
  security:
  - userAuth:
    - idn:access-model-metadata:read
    - idn:access-model-metadata:manage
  - applicationAuth:
    - idn:access-model-metadata:read
    - idn:access-model-metadata:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - in: query
    name: filters
    schema:
      type: string
    example: name eq "Privacy"
    required: false
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **key**: *eq*


      **name**: *eq*


      **type**: *eq*


      **status**: *eq*


      **objectTypes**: *eq*


      Supported composite operators are *and, or*
  - in: query
    name: sorters
    schema:
      type: string
      format: comma-separated
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **name, key**
    example: name,-key
    required: false
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/count.yaml
  responses:
    '200':
      description: OK
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../../shared/schemas/attributedto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  summary: Create access model metadata attribute
  description: |
    Create a new Access Model Metadata Attribute.
  operationId: createAccessModelMetadataAttributeV1
  tags:
  - Access Model Metadata
  security:
  - userAuth:
    - idn:access-model-metadata:create
  - applicationAuth:
    - idn:access-model-metadata:create
  x-sailpoint-userLevels:
  - ORG_ADMIN
  requestBody:
    required: true
    description: Attribute to create
    content:
      application/json:
        schema:
          $ref: ../../shared/schemas/attributedto.yaml
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../../shared/schemas/attributedto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
