get:
  operationId: getAccessRequestConfigV1
  deprecated: true
  x-deprecated-description: |
    This endpoint has been deprecated as of 2026-02-26. Please use the [v2 get-access-request-config](https://developer.sailpoint.com/docs/api/get-access-request-config-v-2) endpoint instead.
  security:
  - userAuth:
    - idn:access-request-config:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  - USER
  summary: Get access request configuration
  tags:
  - Access Requests
  description: This endpoint returns the current access-request configuration.
  responses:
    '200':
      description: Access Request Configuration Details.
      content:
        application/json:
          schema:
            $ref: ../schemas/accessrequestconfig.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
put:
  operationId: setAccessRequestConfigV1
  deprecated: true
  x-deprecated-description: |
    This endpoint has been deprecated as of 2026-02-26. Please use the [v2 set-access-request-config](https://developer.sailpoint.com/docs/api/set-access-request-config-v-2) endpoint instead.
  security:
  - userAuth:
    - idn:access-request-config:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  summary: Update access request configuration
  tags:
  - Access Requests
  description: This endpoint replaces the current access-request configuration.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/accessrequestconfig.yaml
  responses:
    '200':
      description: Access Request Configuration Details.
      content:
        application/json:
          schema:
            $ref: ../schemas/accessrequestconfig.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
