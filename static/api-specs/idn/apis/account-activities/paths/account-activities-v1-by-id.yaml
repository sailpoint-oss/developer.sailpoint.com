get:
  operationId: getAccountActivityV1
  tags:
  - Account Activities
  summary: Get an account activity
  description: This gets a single account activity by its id.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listAccountActivities
    description: The account activity id
    example: ef38f94347e94562b5bb8424a56397d8
  responses:
    '200':
      description: An account activity object
      content:
        application/json:
          schema:
            $ref: ../schemas/accountactivity.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
