get:
  tags:
  - Account Usages
  summary: Returns account usage insights
  description: This API returns a summary of account usage insights for past 12 months.
  operationId: getUsagesByAccountIdV1
  parameters:
  - name: accountId
    in: path
    description: ID of IDN account
    required: true
    x-sailpoint-resource-operation-id: listAccountsV1
    schema:
      type: string
    example: ef38f94347e94562b5bb8424a56397d8
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: sorters
    schema:
      type: string
      format: comma-separated
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **date**
    example: '-date'
  security:
  - userAuth:
    - idn:identity-history:manage
  - applicationAuth:
    - idn:identity-history:manage
  responses:
    '200':
      description: Summary of account usage insights for past 12 months.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/accountusage.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
