post:
  operationId: disableAccountV1
  tags:
  - Accounts
  summary: Disable account
  description: 'This API submits a task to disable the account and returns the task ID.      '
  security:
  - userAuth:
    - idn:accounts-state:manage
  - applicationAuth:
    - idn:accounts-state:manage
  x-sailpont-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  - HELPDESK
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listAccounts
    description: The account id
    example: ef38f94347e94562b5bb8424a56397d8
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/accounttogglerequest.yaml
  responses:
    '202':
      description: Async task details
      content:
        application/json:
          schema:
            $ref: ../schemas/accountsasyncresult.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
