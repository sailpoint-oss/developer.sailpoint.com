post:
  operationId: enableAccountForIdentityV1
  tags:
  - Accounts
  summary: Enable idn account for identity
  description: This API submits a task to enable IDN account for a single identity.
  externalDocs:
    description: Learn more about enabling identities here
    url: https://documentation.sailpoint.com/saas/help/accounts/identities.html?h=disabling+identities#enabling-identities
  security:
  - userAuth:
    - idn:accounts-state:manage
    - idn:accounts-provisioning:manage
  - applicationAuth:
    - idn:accounts-state:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listIdentitiesV1
    description: The identity id.
    example: 2c91808384203c2d018437e631158309
  responses:
    '202':
      $ref: ../../shared/responses/202.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
