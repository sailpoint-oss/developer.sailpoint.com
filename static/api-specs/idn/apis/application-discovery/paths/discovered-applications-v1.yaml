get:
  operationId: getDiscoveredApplicationsV1
  tags:
  - Application Discovery
  summary: Get discovered applications for tenant
  description: >
    Get a list of applications that have been identified within the environment. This includes details such as
    application names, discovery dates, potential correlated saas_vendors and related suggested connectors.
  security:
  - userAuth:
    - idn:application-discovery:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  parameters:
  - $ref: ../../shared/parameters/limit.yaml
    required: false
  - $ref: ../../shared/parameters/offset.yaml
    required: false
  - in: query
    name: detail
    schema:
      type: string
      enum:
      - SLIM
      - FULL
    description: >-
      Determines whether slim, or increased level of detail is provided for each discovered application in the
      returned list. SLIM is the default behavior.
    example: FULL
    required: false
  - in: query
    name: filter
    schema:
      type: string
    description: >
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **name**: *eq, sw, co*


      **description**: *eq, sw, co*


      **createdAtStart**: *eq, le, ge*


      **createdAtEnd**: *eq, le, ge*


      **discoveredAtStart**: *eq, le, ge*


      **discoveredAtEnd**: *eq, le, ge*


      **discoverySource**: *eq, in*


      **discoverySourceName**: *eq, in*


      **discoverySourceCategory**: *eq, in*
    example: name eq "Okta" and description co "Okta" and discoverySource in ("csv", "Okta Saas")
    x-sailpoint-resource-operation-id: getDiscoveredApplications
    required: false
    style: form
  - in: query
    name: sorters
    schema:
      type: string
      format: comma-separated
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **name, description, discoveredAt, discoverySource,
      discoverySourceName, discoverySourceCategory**
    example: name
    required: false
  responses:
    '200':
      description: List of discovered applications. By default, the API returns a list of SLIM discovered applications.
      content:
        application/json:
          schema:
            type: array
            items:
              oneOf:
              - $ref: ../schemas/slimdiscoveredapplications.yaml
              - $ref: ../schemas/fulldiscoveredapplications.yaml
          examples:
            Slim Discovered Application:
              $ref: ../examples/slimdiscoveredapplications.yaml
            Discovered Application:
              $ref: ../examples/fulldiscoveredapplications.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
