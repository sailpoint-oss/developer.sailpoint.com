post:
  security:
  - userAuth:
    - sp:approvals:write
  x-sailpoint-userLevels:
  - ORG_ADMIN
  operationId: rejectApprovalInBulkV1
  tags:
  - Approvals
  summary: Post Bulk Reject Approvals
  description: Bulk reject specified approval requests on behalf of the caller
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/bulkrejectrequestdto.yaml
  responses:
    '202':
      $ref: ../../shared/responses/202.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
