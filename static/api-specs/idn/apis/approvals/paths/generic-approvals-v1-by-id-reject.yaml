post:
  security:
  - userAuth:
    - idn:access-request-approvals:manage
  x-sailpoint-userLevels:
  - APPROVAL_OWNER
  operationId: rejectApprovalV1
  tags:
  - Approvals
  summary: Post Approvals Reject
  description: >-
    Rejects a specified approval request on behalf of the caller. This endpoint does not support access request IDs.

    If called by an admin and the admin is not listed as an approver, the approval request will be reassigned from a
    random approver to the admin user and approved.
  parameters:
  - in: path
    name: id
    required: true
    schema:
      type: string
    description: Approval ID that correlates to an existing approval request that a user wants to reject.
    example: 38453251-6be2-5f8f-df93-5ce19e295837
    x-sailpoint-resource-operation-id: getApprovalsV1
  requestBody:
    required: false
    content:
      application/json:
        schema:
          $ref: ../schemas/approvalrejectrequest.yaml
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
