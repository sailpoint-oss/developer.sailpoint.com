get:
  operationId: listAccessProfilesForSourceAppV1
  tags:
  - Apps
  summary: List access profiles for the specified source app
  security:
  - userAuth:
    - idn:app-roles:manage
  - applicationAuth:
    - idn:app-roles:manage
  description: This API returns the list of access profiles for the specified source app
  parameters:
  - name: id
    in: path
    description: ID of the source app
    required: true
    x-sailpoint-resource-operation-id: listAllSourceApp
    schema:
      type: string
      example: 2c91808a7813090a017814121e121518
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - in: query
    name: filters
    schema:
      type: string
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **id**: *eq, in*


      **name**: *eq, in*


      **created**: *gt, lt, ge, le*


      **modified**: *gt, lt, ge, le*
    example: name eq "developer access profile"
    required: false
    style: form
    explode: true
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  responses:
    '200':
      description: List of access profiles for the specified source app
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/accessprofiledetails.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
