get:
  operationId: listAvailableAccountsForUserAppV1
  tags:
  - Apps
  summary: List available accounts for user app
  security:
  - userAuth:
    - idn:app-roles:read
    - idn:app-roles:manage
  - applicationAuth:
    - idn:app-roles:read
    - idn:app-roles:manage
  description: >-
    This API returns the list of available accounts for the specified user app. The user app needs to belong lo logged
    in user.
  parameters:
  - name: id
    in: path
    description: ID of the user app
    required: true
    x-sailpoint-resource-operation-id: listAllUserAppsV1
    schema:
      type: string
      example: 2c91808a7813090a017814121e121518
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/count.yaml
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  responses:
    '200':
      description: List of available accounts for the specified user app
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/appaccountdetails.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
