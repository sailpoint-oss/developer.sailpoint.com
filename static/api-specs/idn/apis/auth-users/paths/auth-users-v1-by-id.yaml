get:
  operationId: getAuthUserV1
  tags:
  - Auth Users
  summary: Auth user details
  description: Return the specified user's authentication system details.
  parameters:
  - in: path
    name: id
    description: Identity ID
    required: true
    x-sailpoint-resource-operation-id: listIdentitiesV1
    schema:
      type: string
    example: ef38f94347e94562b5bb8424a56397d8
  security:
  - userAuth:
    - sp:auth-user:read
  responses:
    '200':
      description: The specified user's authentication system details.
      content:
        application/json:
          schema:
            $ref: ../schemas/authuser.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
patch:
  operationId: patchAuthUserV1
  tags:
  - Auth Users
  summary: Auth user update
  description: |-
    Use a PATCH request to update an existing user in the authentication system.
    Use this endpoint to modify these fields: 
      * `capabilities`

    A '400.1.1 Illegal update attempt' detail code indicates that you attempted to PATCH a field that is not allowed.
  security:
  - userAuth:
    - sp:auth-user:manage
  parameters:
  - in: path
    name: id
    description: Identity ID
    required: true
    x-sailpoint-resource-operation-id: listIdentitiesV1
    schema:
      type: string
    example: ef38f94347e94562b5bb8424a56397d8
  requestBody:
    required: true
    description: A list of auth user update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902) standard.
    content:
      application/json-patch+json:
        schema:
          type: array
          items:
            $ref: ../../shared/schemas/jsonpatchoperation.yaml
        example:
        - op: replace
          path: /capabilities
          value:
          - ORG_ADMIN
  responses:
    '200':
      description: Auth user updated.
      content:
        application/json:
          schema:
            $ref: ../schemas/authuser.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
