post:
  operationId: completeCampaignV1
  tags:
  - Certification Campaigns
  summary: Complete a campaign
  description: |
    :::caution

    This endpoint will run successfully for any campaigns that are **past due**.

    This endpoint will return a content error if the campaign is **not past due**.

    :::

    Use this API to complete a certification campaign. This functionality is provided to admins so that they
    can complete a certification even if all items have not been completed.
  security:
  - userAuth:
    - idn:campaign:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  requestBody:
    description: Optional. Default behavior is for the campaign to auto-approve upon completion, unless autoCompleteAction=REVOKE
    required: false
    content:
      application/json:
        schema:
          $ref: ../schemas/campaigncompleteoptions.yaml
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: getActiveCampaignsV1
    description: Campaign ID.
    example: ef38f94347e94562b5bb8424a56397d8
  responses:
    '202':
      $ref: ../../shared/responses/202.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
