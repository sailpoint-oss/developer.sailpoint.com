post:
  security:
  - userAuth:
    - idn:campaign:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  operationId: moveV1
  tags:
  - Certification Campaigns
  summary: Reassign certifications
  description: |
    This API reassigns the specified certifications from one identity to another.    
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: getActiveCampaigns
    description: The certification campaign ID
    example: ef38f94347e94562b5bb8424a56397d8
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/adminreviewreassign.yaml
  responses:
    '202':
      description: The reassign task that has been submitted.
      content:
        application/json:
          schema:
            $ref: ../schemas/certificationtask.yaml
          example:
            id: 2c918086719eec070171a7e3355a360a
            type: ADMIN_REASSIGN
            targetType: CAMPAIGN
            targetId: 2c918086719eec070171a7e3355a834c
            status: QUEUED
            errors: []
            created: '2020-09-24T18:10:47.693Z'
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
