post:
  operationId: startCampaignRemediationScanV1
  tags:
  - Certification Campaigns
  summary: Run campaign remediation scan
  description: |
    Use this API to run a remediation scan task for a certification campaign.
  security:
  - userAuth:
    - idn:campaign-report:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  - REPORT_ADMIN
  parameters:
  - in: path
    name: id
    schema:
      type: string
      example: 2c91808571bcfcf80171c23e4b4221fc
    required: true
    x-sailpoint-resource-operation-id: getActiveCampaignsV1
    description: ID of the campaign the remediation scan is being run for.
  responses:
    '202':
      $ref: ../../shared/responses/202.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
