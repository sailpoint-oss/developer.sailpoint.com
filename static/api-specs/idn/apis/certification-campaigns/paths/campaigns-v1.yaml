get:
  operationId: getActiveCampaignsV1
  tags:
  - Certification Campaigns
  summary: List campaigns
  description: >
    Use this API to get a list of campaigns. This API can provide increased level of detail for each campaign for the
    correct provided query.
  security:
  - userAuth:
    - idn:campaign:read
    - idn:campaign:manage
    - idn:campaign-report:read
    - idn:campaign-report:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  - REPORT_ADMIN
  parameters:
  - in: query
    name: detail
    schema:
      type: string
      enum:
      - SLIM
      - FULL
    required: false
    description: >-
      Determines whether slim, or increased level of detail is provided for each campaign in the returned list. Slim
      is the default behavior.
    example: FULL
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: filters
    schema:
      type: string
    required: false
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **id**: *eq, in*


      **name**: *eq, sw*


      **status**: *eq, in*
    example: name eq "Manager Campaign"
  - in: query
    name: sorters
    schema:
      type: string
      format: comma-separated
    required: false
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **name, created**
    example: name
  responses:
    '200':
      description: A list of campaign objects. By default list of SLIM campaigns is returned.
      content:
        application/json:
          schema:
            type: array
            items:
              anyOf:
              - $ref: ../schemas/campaign-2.yaml
              - $ref: ../schemas/slimcampaign.yaml
          examples:
            Slim Campaign:
              $ref: ../examples/slimcampaigns.yaml
            Full Campaign:
              $ref: ../examples/fullcampaigns.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  operationId: createCampaignV1
  tags:
  - Certification Campaigns
  summary: Create a campaign
  description: |
    Use this API to create a certification campaign with the information provided in the request body.    
  security:
  - userAuth:
    - idn:campaign:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/campaign-2.yaml
        examples:
          Manager:
            $ref: ../examples/createcampaignmanager.yaml
          Search:
            $ref: ../examples/createcampaignsearch.yaml
          Source Owner:
            $ref: ../examples/createcampaignsourceowner.yaml
          Role Composition:
            $ref: ../examples/createcampaignrolecomposition.yaml
          Machine Account:
            $ref: ../examples/createcampaignmachineaccount.yaml
  responses:
    '202':
      description: >-
        This response indicates that the requested campaign has been successfully accepted into the system, and its
        representation is returned by the API.
      content:
        application/json:
          schema:
            $ref: ../schemas/campaign-2.yaml
          examples:
            Manager:
              $ref: ../examples/fullcampaignmanager.yaml
            Search:
              $ref: ../examples/fullcampaignsearch.yaml
            Source Owner:
              $ref: ../examples/fullcampaignsourceowner.yaml
            Role Composition:
              $ref: ../examples/fullcampaignrolecomposition.yaml
            Machine Account Owner:
              $ref: ../examples/fullcampaignmachineaccount.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
