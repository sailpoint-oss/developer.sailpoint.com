  /certifications/v1/{id}/access-summaries/{type}:
    $ref: ./paths/certifications-v1-by-id-access-summaries-by-type.yaml
  /certifications/v1/{id}/identity-summaries/{identitySummaryId}:
    $ref: ./paths/certifications-v1-by-id-identity-summaries-by-identitysummaryid.yaml
