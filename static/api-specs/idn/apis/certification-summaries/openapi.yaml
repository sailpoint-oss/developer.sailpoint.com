  title: Identity Security Cloud API - Certification Summaries
  description: >-
    Use these APIs to interact with the Identity Security Cloud platform to achieve repeatable, automated processes with
    greater scalability. We encourage you to join the SailPoint Developer Community forum at
    https://developer.sailpoint.com/discuss to connect with other developers using our APIs.
  termsOfService: https://developer.sailpoint.com/discuss/tos
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: v1
servers:
  - url: https://{tenant}.api.identitynow.com
    description: This is the production API server.
    variables:
      tenant:
        default: sailpoint
        description: This is the name of your tenant, typically your company's name.
  - url: https://{apiUrl}
    description: This is the versioned API server.
    variables:
      apiUrl:
        default: sailpoint.api.identitynow.com
        description: This is the api url of your tenant
tags:
  - name: Certification Summaries
    description: >
      Use this API to implement certification summary functionality. 

      With this functionality in place, administrators and designated certification reviewers can review summaries of
      identity certification campaigns and draw conclusions about the campaigns' scope, security, and effectiveness. 

      Implementing certification summary functionality improves organizations' ability to review their
      [certifications](https://documentation.sailpoint.com/saas/user-help/certs/reviewing/index.html) and helps them
      satisfy audit and regulatory requirements by enabling them to trace access changes and the decisions made in their
      review processes. 


      A certification refers to Identity Security Cloud's mechanism for reviewing a user's access to entitlements (sets
      of permissions) and approving or removing that access. 

      These certifications serve as a way of showing that a user's access has been reviewed and approved. 

      Multiple certifications by different reviewers are often required to approve a user's access. 

      A set of multiple certifications is called a certification campaign. 


      For example, an organization may use a Manager Certification as a way of showing that a user's access has been
      reviewed and approved by their manager, or if the certification is part of a campaign, that the user's access has
      been reviewed and approved by multiple managers. 

      Once this certification has been completed, Identity Security Cloud  would provision all the access the user
      needs, nothing more. 


      Certification summaries provide information about identity certification campaigns such as the identities
      involved, the number of decisions made, and the access changed. 

      For example, an administrator or designated certification reviewer can examine the Manager Certification campaign
      to get an overview of how many entitlement decisions are made in that campaign as opposed to role decisions, which
      identities would be affected by changes to the campaign, and how those identities' access would be affected.
paths:
