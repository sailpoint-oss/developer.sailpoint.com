get:
  operationId: getIdentitySummariesV1
  tags:
  - Certification Summaries
  summary: Identity summaries for campaign certification
  security:
  - userAuth:
    - idn:campaign:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  description: >-
    This API returns a list of the identity summaries for a specific identity campaign certification. Reviewers for this
    certification can also call this API.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listIdentityCertifications
    description: The identity campaign certification ID
    example: ef38f94347e94562b5bb8424a56397d8
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: filters
    required: false
    schema:
      type: string
    example: id eq "ef38f94347e94562b5bb8424a56397d8"
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **id**: *eq, in*


      **completed**: *eq, ne*


      **name**: *eq, sw*
  - in: query
    name: sorters
    required: false
    schema:
      type: string
      format: comma-separated
    example: name
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **name**
  responses:
    '200':
      description: List of identity summaries
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/certificationidentitysummary.yaml
          example:
          - id: 2c91808772a504f50172a9540e501ba7
            name: Aaron Grey
            identityId: 2c9180857182306001719937379633e4
            completed: false
          - id: 2c91808772a504f50172a9540e501ba8
            name: Aglae Wilson
            identityId: 2c9180857182306001719937377a33de
            completed: true
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
