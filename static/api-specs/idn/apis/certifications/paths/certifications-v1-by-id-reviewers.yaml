get:
  operationId: listCertificationReviewersV1
  tags:
  - Certifications
  summary: List of reviewers for certification
  description: This API returns a list of reviewers for the certification. Reviewers for this certification can also call this API.
  security:
  - userAuth:
    - idn:campaign:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listIdentityCertificationsV1
    description: The certification ID
    example: ef38f94347e94562b5bb8424a56397d8
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: filters
    schema:
      type: string
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **id**: *eq, in*


      **name**: *eq, sw*


      **email**: *eq, sw*
    example: name eq "Bob"
  - in: query
    name: sorters
    schema:
      type: string
      format: comma-separated
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **name, email**
    example: name
  responses:
    '200':
      description: A list of reviewers
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../../shared/schemas/identityreferencewithnameandemail.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
