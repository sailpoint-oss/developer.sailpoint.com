post:
  operationId: signOffIdentityCertificationV1
  tags:
  - Certifications
  summary: Finalize identity certification decisions
  security:
  - userAuth:
    - idn:campaign:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  description: >-
    This API finalizes all decisions made on an identity campaign certification and initiates any remediations required.
    Reviewers for this certification can also call this API. This API does not support requests for certifications
    assigned to Governance Groups.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listIdentityCertificationsV1
    description: The identity campaign certification ID
    example: ef38f94347e94562b5bb8424a56397d8
  responses:
    '200':
      description: An identity campaign certification object
      content:
        application/json:
          schema:
            $ref: ../schemas/identitycertificationdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
