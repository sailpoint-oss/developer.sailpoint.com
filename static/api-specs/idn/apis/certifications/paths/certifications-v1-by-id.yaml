get:
  operationId: getIdentityCertificationV1
  tags:
  - Certifications
  summary: Identity certification by id
  security:
  - userAuth:
    - idn:campaign:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  description: >-
    This API returns a single identity campaign certification by its ID. Reviewers for this certification can also call
    this API.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listIdentityCertifications
    description: The certification id
    example: ef38f94347e94562b5bb8424a56397d8
  responses:
    '200':
      description: An identity campaign certification object
      content:
        application/json:
          schema:
            $ref: ../schemas/identitycertificationdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
