delete:
  operationId: deleteDraftV1
  security:
  - userAuth:
    - sp:config-draft:manage
  tags:
  - Configuration Hub
  summary: Delete a draft
  description: >-
    This API deletes an existing draft for the current tenant.


    On success, this endpoint will return an empty response.


    The draft id can be obtained from the response after a draft was successfully created, or from the list drafts
    endpoint.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    description: The id of the draft to delete.
    example: 07659d7d-2cce-47c0-9e49-185787ee565a
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
