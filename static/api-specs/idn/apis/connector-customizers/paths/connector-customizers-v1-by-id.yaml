get:
  tags:
  - Connector Customizers
  summary: Get connector customizer
  operationId: getConnectorCustomizerV1
  description: Gets connector customizer by ID.
  parameters:
  - name: id
    in: path
    description: ID of the connector customizer to get.
    required: true
    schema:
      type: string
      example: b07dc46a-1498-4de8-bfbb-259a68e70c8a
    x-sailpoint-resource-operation-id: listConnectorCustomizers
  responses:
    '200':
      description: Connector customizer with the given ID.
      content:
        application/json:
          schema:
            $ref: ../schemas/connectorcustomizersresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - sp:connector:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
put:
  tags:
  - Connector Customizers
  summary: Update connector customizer
  description: >-
    Update an existing connector customizer with the one provided in the request body. These fields are immutable: `id`,
    `name`, `type`.
  operationId: putConnectorCustomizerV1
  parameters:
  - name: id
    in: path
    description: ID of the connector customizer to update.
    required: true
    schema:
      type: string
      example: b07dc46a-1498-4de8-bfbb-259a68e70c8a
    x-sailpoint-resource-operation-id: listConnectorCustomizers
  requestBody:
    description: Connector rule with updated data.
    content:
      application/json:
        schema:
          $ref: ../schemas/connectorcustomizerupdaterequest.yaml
  responses:
    '200':
      description: Updated connector customizer.
      content:
        application/json:
          schema:
            $ref: ../schemas/connectorcustomizerupdateresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - sp:connector:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
delete:
  tags:
  - Connector Customizers
  summary: Delete connector customizer
  description: Delete the connector customizer for the given ID.
  operationId: deleteConnectorCustomizerV1
  parameters:
  - name: id
    in: path
    description: ID of the connector customizer to delete.
    required: true
    schema:
      type: string
      example: b07dc46a-1498-4de8-bfbb-259a68e70c8a
    x-sailpoint-resource-operation-id: listConnectorCustomizers
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - sp:connector:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
