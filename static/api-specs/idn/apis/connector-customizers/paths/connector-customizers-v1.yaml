get:
  tags:
  - Connector Customizers
  operationId: listConnectorCustomizersV1
  summary: List all connector customizers
  description: List all connector customizers.
  parameters:
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/limit.yaml
  responses:
    '200':
      description: List all connector customizers.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/connectorcustomizersresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - sp:connector:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
post:
  tags:
  - Connector Customizers
  operationId: createConnectorCustomizerV1
  summary: Create connector customizer
  description: Create a connector customizer.
  requestBody:
    required: true
    description: Connector customizer to create.
    content:
      application/json:
        schema:
          $ref: ../schemas/connectorcustomizercreaterequest.yaml
  responses:
    '201':
      description: Created connector customizer.
      content:
        application/json:
          schema:
            $ref: ../schemas/connectorcustomizercreateresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - sp:connector:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
