get:
  tags:
  - Connector Rule Management
  summary: Get connector rule
  operationId: getConnectorRuleV1
  description: Get a connector rule by ID.
  parameters:
  - name: id
    in: path
    description: ID of the connector rule to get.
    required: true
    x-sailpoint-resource-operation-id: getConnectorRuleListV1
    style: simple
    explode: false
    schema:
      type: string
    example: 8c190e6787aa4ed9a90bd9d5344523fb
  responses:
    '200':
      description: Connector rule with the given ID.
      content:
        application/json:
          schema:
            $ref: ../schemas/connectorruleresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:rule-management-connector:read
    - idn:rule-management-connector:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
put:
  tags:
  - Connector Rule Management
  summary: Update connector rule
  description: >-
    Update an existing connector rule with the one provided in the request body. These fields are immutable: `id`,
    `name`, `type`
  operationId: putConnectorRuleV1
  parameters:
  - name: id
    in: path
    description: ID of the connector rule to update.
    required: true
    x-sailpoint-resource-operation-id: getConnectorRuleListV1
    style: simple
    explode: false
    schema:
      type: string
    example: 8c190e6787aa4ed9a90bd9d5344523fb
  requestBody:
    description: Connector rule with updated data.
    content:
      application/json:
        schema:
          $ref: ../schemas/connectorruleupdaterequest.yaml
  responses:
    '200':
      description: Updated connector rule.
      content:
        application/json:
          schema:
            $ref: ../schemas/connectorruleresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:rule-management-connector:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
delete:
  tags:
  - Connector Rule Management
  summary: Delete connector rule
  description: Delete the connector rule for the given ID.
  operationId: deleteConnectorRuleV1
  parameters:
  - name: id
    in: path
    description: ID of the connector rule to delete.
    required: true
    x-sailpoint-resource-operation-id: getConnectorRuleListV1
    style: simple
    explode: false
    schema:
      type: string
    example: 8c190e6787aa4ed9a90bd9d5344523fb
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:rule-management-connector:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
