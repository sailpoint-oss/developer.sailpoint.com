get:
  tags:
  - Connectors
  operationId: getConnectorCorrelationConfigV1
  summary: Get connector correlation configuration
  description: 'Fetches a connector''s correlation config using its script name.    '
  parameters:
  - name: scriptName
    in: path
    description: The scriptName value of the connector. Scriptname is the unique id generated at connector creation.
    required: true
    x-sailpoint-resource-operation-id: getConnectorListV1
    style: simple
    explode: false
    schema:
      type: string
      example: aScriptName
  responses:
    '200':
      description: The connector's correlation config
      content:
        application/xml:
          schema:
            type: string
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:connector-config:read
    - idn:connector-config:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
put:
  tags:
  - Connectors
  operationId: putConnectorCorrelationConfigV1
  summary: Update connector correlation configuration
  description: 'Update a connector''s correlation config using its script name.    '
  parameters:
  - name: scriptName
    in: path
    description: The scriptName value of the connector. Scriptname is the unique id generated at connector creation.
    required: true
    x-sailpoint-resource-operation-id: getConnectorListV1
    style: simple
    explode: false
    schema:
      type: string
      example: aScriptName
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          required:
          - file
          properties:
            file:
              type: string
              description: connector correlation config xml file
              format: binary
  responses:
    '200':
      description: The connector's update detail
      content:
        application/json:
          schema:
            $ref: ../schemas/updatedetail.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:connector-config:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
