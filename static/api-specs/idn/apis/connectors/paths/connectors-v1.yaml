get:
  tags:
  - Connectors
  operationId: getConnectorListV1
  summary: Get connector list
  description: Fetches list of connectors that have 'RELEASED' status using filtering and pagination.
  parameters:
  - in: query
    name: filters
    required: false
    schema:
      type: string
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **name**: *sw, co*


      **type**: *sw, co, eq*


      **directConnect**: *eq*


      **category**: *eq*


      **features**: *ca*


      **labels**: *ca*
    example: directConnect eq "true"
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: locale
    required: false
    schema:
      type: string
      enum:
      - de
      - 'no'
      - fi
      - sv
      - ru
      - pt
      - ko
      - zh-TW
      - en
      - it
      - fr
      - zh-CN
      - hu
      - es
      - cs
      - ja
      - pl
      - da
      - nl
      example: de
    description: The locale to apply to the config. If no viable locale is given, it will default to "en"
  responses:
    '200':
      description: A Connector Dto object
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/v3connectordto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:connector-config:read
    - idn:connector-config:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
post:
  tags:
  - Connectors
  operationId: createCustomConnectorV1
  summary: Create custom connector
  description: 'Create custom connector.    '
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/v3createconnectordto.yaml
  responses:
    '200':
      description: A Connector Dto object
      content:
        application/json:
          schema:
            $ref: ../schemas/v3connectordto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:connector-config:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
