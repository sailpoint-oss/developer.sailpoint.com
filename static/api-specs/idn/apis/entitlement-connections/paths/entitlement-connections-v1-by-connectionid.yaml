patch:
  operationId: patchEntitlementConnectionByIdV1
  tags:
  - Entitlement Connections
  summary: Update entitlement connection
  description: |
    Applies JSON Patch operations to an entitlement connection selected by `connectionId`.
  security:
  - userAuth:
    - idn:entitlement-connections:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - in: path
    name: connectionId
    required: true
    schema:
      type: string
    x-sailpoint-resource-operation-id: listEntitlementConnectionsV1
    example: 6c692d9972f8400ca4560a68f62c4c5f
    description: Connection ID (UUID with or without hyphens).
  requestBody:
    required: true
    content:
      application/json-patch+json:
        schema:
          type: array
          items:
            $ref: ../../shared/schemas/jsonpatchoperation.yaml
  responses:
    '200':
      description: Updated entitlement connection.
      content:
        application/json:
          schema:
            $ref: ../schemas/entitlementconnection.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '412':
      $ref: ../responses/412.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
