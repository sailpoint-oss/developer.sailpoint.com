post:
  summary: Add metadata to an entitlement.
  description: Add single Access Model Metadata to an entitlement.
  tags:
  - Entitlements
  operationId: createAccessModelMetadataForEntitlementV1
  security:
  - userAuth:
    - idn:entitlement:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - name: id
    in: path
    required: true
    x-sailpoint-resource-operation-id: listEntitlements
    schema:
      type: string
    description: The entitlement id.
    example: 2c91808c74ff913f0175097daa9d59cd
  - name: attributeKey
    in: path
    required: true
    x-sailpoint-resource-operation-id: listAccessModelMetadataAttribute
    schema:
      type: string
    description: Technical name of the Attribute.
    example: iscPrivacy
  - name: attributeValue
    in: path
    required: true
    x-sailpoint-resource-operation-id: listAccessModelMetadataAttributeValue
    schema:
      type: string
    description: Technical name of the Attribute Value.
    example: public
  responses:
    '201':
      description: Created
      content:
        application/json:
          schema:
            $ref: ../../shared/schemas/entitlement.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
delete:
  summary: Remove metadata from an entitlement.
  description: Remove single Access Model Metadata from an entitlement.
  tags:
  - Entitlements
  operationId: deleteAccessModelMetadataFromEntitlementV1
  security:
  - userAuth:
    - idn:entitlement:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - name: id
    in: path
    required: true
    x-sailpoint-resource-operation-id: listEntitlements
    schema:
      type: string
    description: The entitlement id.
    example: 2c91808c74ff913f0175097daa9d59cd
  - name: attributeKey
    in: path
    required: true
    x-sailpoint-resource-operation-id: listAccessModelMetadataAttribute
    schema:
      type: string
    description: Technical name of the Attribute.
    example: iscPrivacy
  - name: attributeValue
    in: path
    required: true
    x-sailpoint-resource-operation-id: listAccessModelMetadataAttributeValue
    schema:
      type: string
    description: Technical name of the Attribute Value.
    example: public
  responses:
    '200':
      description: OK
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
