openapi: 3.0.1
info:
  title: Identity Security Cloud API - Global Tenant Security Settings
  description: >-
    Use these APIs to interact with the Identity Security Cloud platform to achieve repeatable, automated processes with
    greater scalability. We encourage you to join the SailPoint Developer Community forum at
    https://developer.sailpoint.com/discuss to connect with other developers using our APIs.
  termsOfService: https://developer.sailpoint.com/discuss/tos
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: v1
servers:
  - url: https://{tenant}.api.identitynow.com
    description: This is the production API server.
    variables:
      tenant:
        default: sailpoint
        description: This is the name of your tenant, typically your company's name.
  - url: https://{apiUrl}
    description: This is the versioned API server.
    variables:
      apiUrl:
        default: sailpoint.api.identitynow.com
        description: This is the api url of your tenant
tags:
  - name: Global Tenant Security Settings
    description: |
      Use this API to implement and customize global tenant security settings.
      With this functionality in place, administrators can manage the global security settings that a tenant/org has.
      This API can be used to configure the networks and Geographies allowed to access Identity Security Cloud URLs.
paths:
  /auth-org/v1/network-config:
    $ref: ./paths/auth-org-v1-network-config.yaml
  /auth-org/v1/lockout-config:
    $ref: ./paths/auth-org-v1-lockout-config.yaml
  /auth-org/v1/service-provider-config:
    $ref: ./paths/auth-org-v1-service-provider-config.yaml
  /auth-org/v1/session-config:
    $ref: ./paths/auth-org-v1-session-config.yaml
security:
  - userAuth:
      - sp:scopes:all
