get:
  security:
  - userAuth:
    - idn:workgroup:read
    - idn:workgroup:manage
  - applicationAuth:
    - idn:workgroup:read
    - idn:workgroup:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  operationId: listConnectionsV1
  tags:
  - Governance Groups
  summary: List connections for governance group
  description: This API returns list of connections associated with a Governance Group.
  parameters:
  - name: workgroupId
    in: path
    description: ID of the Governance Group.
    required: true
    x-sailpoint-resource-operation-id: listWorkgroupsV1
    schema:
      type: string
      example: 2c91808a7813090a017814121919ecca
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/limit50.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: sorters
    schema:
      type: string
      format: comma-separated
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **name, created, modified**
    example: name,-modified
    required: false
  responses:
    '200':
      description: List all connections associated with a Governance Group.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/workgroupconnectiondto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
