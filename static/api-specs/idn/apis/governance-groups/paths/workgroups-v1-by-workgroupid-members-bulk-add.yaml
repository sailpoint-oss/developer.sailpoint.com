post:
  security:
  - userAuth:
    - idn:workgroup:write
  - applicationAuth:
    - idn:workgroup:write
  x-sailpoint-userLevels:
  - ORG_ADMIN
  operationId: updateWorkgroupMembersV1
  tags:
  - Governance Groups
  summary: Add members to governance group
  description: >-
    This API adds one or more members to a Governance Group.  A token with API, ORG_ADMIN authority is required to call
    this API.


    >  **Following field of Identity is an optional field in the request.**


    >  **name**
  parameters:
  - name: workgroupId
    in: path
    description: ID of the Governance Group.
    required: true
    x-sailpoint-resource-operation-id: listWorkgroupsV1
    schema:
      type: string
      example: 2c91808a7813090a017814121919ecca
  requestBody:
    description: List of identities to be added to a Governance Group members list.
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/bulkworkgroupmembersrequest.yaml
  responses:
    '207':
      description: List of added and not added identities into  Governance Group members list.
      content:
        application/json:
          schema:
            $ref: ../schemas/workgroupmemberbulkaddresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
