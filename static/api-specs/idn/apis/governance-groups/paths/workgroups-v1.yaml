get:
  security:
  - userAuth:
    - idn:workgroup:read
    - idn:workgroup:manage
  - applicationAuth:
    - idn:workgroup:read
    - idn:workgroup:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  operationId: listWorkgroupsV1
  tags:
  - Governance Groups
  summary: List governance groups
  description: This API returns list of Governance Groups
  parameters:
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: filters
    schema:
      type: string
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **id**: *eq, in, sw*


      **name**: *eq, sw, in*


      **memberships.identityId**: *eq, in*
    example: name sw "Test"
    required: false
  - in: query
    name: sorters
    schema:
      type: string
      format: comma-separated
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **name, created, modified, id, description**
    example: name,-modified
    required: false
  responses:
    '200':
      description: List of Governance Groups
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/workgroupdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  security:
  - userAuth:
    - idn:workgroup:manage
  - applicationAuth:
    - idn:workgroup:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  operationId: createWorkgroupV1
  tags:
  - Governance Groups
  summary: Create a new governance group.
  description: This API creates a new Governance Group.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/workgroupdto.yaml
  responses:
    '200':
      description: Governance Group object created.
      content:
        application/json:
          schema:
            $ref: ../schemas/workgroupdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
