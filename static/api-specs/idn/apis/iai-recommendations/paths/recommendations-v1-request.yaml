post:
  operationId: getRecommendationsV1
  summary: Returns recommendation based on object
  tags:
  - IAI Recommendations
  description: >-
    The getRecommendations API returns recommendations based on the requested object. The recommendations are invoked by
    IdentityIQ and IdentityNow plug-ins that retrieve recommendations based on the performed calculations.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/recommendationrequestdto.yaml
  responses:
    '200':
      description: The recommendations for a customer
      content:
        application/json:
          schema:
            $ref: ../schemas/recommendationresponsedto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - iai:decisions:manage
  x-sailpoint-userLevels:
  - Any
  parameters:
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
