get:
  operationId: getSavedPotentialRolesV1
  summary: Retrieves all saved potential roles
  tags:
  - IAI Role Mining
  description: This method returns all saved potential roles (draft roles).
  security:
  - userAuth:
    - iai:access-modeling:read
    - iai:access-modeling:manage
  - applicationAuth:
    - iai:access-modeling:read
    - iai:access-modeling:manage
  parameters:
  - in: query
    name: sorters
    required: false
    style: form
    explode: true
    schema:
      type: string
      format: comma-separated
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters/) Sorting is supported for
      the following fields: **modified**
    example: modified
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/count.yaml
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  responses:
    '200':
      description: Succeeded. Returns a list of draft roles for a role mining session.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/roleminingsessiondraftroledto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
