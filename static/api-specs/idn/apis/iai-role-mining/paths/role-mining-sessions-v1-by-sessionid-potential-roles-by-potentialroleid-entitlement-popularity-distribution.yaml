get:
  operationId: getEntitlementDistributionPotentialRoleV1
  summary: Retrieves entitlement popularity distribution for a potential role in a role mining session
  tags:
  - IAI Role Mining
  description: This method returns entitlement popularity distribution for a potential role in a role mining session.
  parameters:
  - in: path
    name: sessionId
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: getRoleMiningSessionsV1
    description: The role mining session id
    example: 8c190e67-87aa-4ed9-a90b-d9d5344523fb
  - in: path
    name: potentialRoleId
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: getPotentialRoleSummariesV1
    description: A potential role id in a role mining session
    example: 8c190e67-87aa-4ed9-a90b-d9d5344523fb
  - in: query
    name: includeCommonAccess
    description: Boolean determining whether common access entitlements will be included or not
    required: false
    style: form
    explode: true
    schema:
      type: boolean
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  responses:
    '200':
      description: Succeeded. Returns a map containing entitlement popularity distribution for a potential role.
      content:
        application/json:
          schema:
            type: object
            additionalProperties:
              type: integer
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - iai:access-modeling:read
    - iai:access-modeling:manage
  - applicationAuth:
    - iai:access-modeling:read
    - iai:access-modeling:manage
