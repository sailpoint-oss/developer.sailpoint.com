delete:
  operationId: deleteIdentityAttributesInBulkV1
  tags:
  - Identity Attributes
  summary: Bulk delete identity attributes
  description: >-
    Use this API to bulk delete identity attributes for a given set of names. Attributes that are currently mapped in an
    identity profile cannot be deleted.  The `system` and `standard` properties must be set to 'false' before you can
    delete an identity attribute.
  security:
  - userAuth:
    - idn:identity-profile-attribute:manage
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/identityattributenames.yaml
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
