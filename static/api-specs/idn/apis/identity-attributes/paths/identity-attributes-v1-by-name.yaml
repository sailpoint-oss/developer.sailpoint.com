get:
  operationId: getIdentityAttributeV1
  tags:
  - Identity Attributes
  summary: Get identity attribute
  description: This gets an identity attribute for a given technical name.
  security:
  - userAuth:
    - idn:identity-profile-attribute:read
    - idn:identity-profile-attribute:manage
  - applicationAuth:
    - idn:identity-profile-attribute:read
    - idn:identity-profile-attribute:manage
  parameters:
  - in: path
    name: name
    schema:
      type: string
    description: The attribute's technical name.
    required: true
    x-sailpoint-resource-operation-id: listIdentityAttributes
    example: displayName
  responses:
    '200':
      description: The identity attribute with the given name
      content:
        application/json:
          schema:
            $ref: ../schemas/identityattribute-2.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
put:
  operationId: putIdentityAttributeV1
  tags:
  - Identity Attributes
  summary: Update identity attribute
  description: >-
    This updates an existing identity attribute.  Making an attribute searchable requires that the `system`, `standard`,
    and `multi` properties be set to false.
  security:
  - userAuth:
    - idn:identity-profile-attribute:manage
  parameters:
  - in: path
    name: name
    schema:
      type: string
    description: The attribute's technical name.
    required: true
    x-sailpoint-resource-operation-id: listIdentityAttributes
    example: displayName
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/identityattribute-2.yaml
  responses:
    '200':
      description: The identity attribute was updated successfully
      content:
        application/json:
          schema:
            $ref: ../schemas/identityattribute-2.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
delete:
  operationId: deleteIdentityAttributeV1
  tags:
  - Identity Attributes
  summary: Delete identity attribute
  description: >-
    This deletes an identity attribute with the given name.  The `system` and `standard` properties must be set to false
    before you can delete an identity attribute.
  security:
  - userAuth:
    - idn:identity-profile-attribute:manage
  parameters:
  - in: path
    name: name
    schema:
      type: string
    description: The attribute's technical name.
    required: true
    x-sailpoint-resource-operation-id: listIdentityAttributes
    example: displayName
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
