get:
  operationId: getIdentityStartDateV1
  tags:
  - Identity History
  summary: Gets the start date of the identity
  description: 'This method retrieves start date of the identity Requires authorization scope of ''idn:identity-history:read'' '
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listHistoricalIdentitiesV1
    description: The identity id
    example: 8c190e6787aa4ed9a90bd9d5344523fb
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  responses:
    '200':
      description: The start date of the identity
      content:
        application/json:
          schema:
            type: string
            example: '2017-03-01T13:00:00.000Z'
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:identity-history:read
    - idn:identity-history:manage
  - applicationAuth:
    - idn:identity-history:read
    - idn:identity-history:manage
