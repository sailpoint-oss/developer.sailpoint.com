get:
  operationId: getIdentityProfileV1
  tags:
  - Identity Profiles
  summary: Get identity profile
  description: Get a single identity profile by ID.
  parameters:
  - in: path
    name: identity-profile-id
    schema:
      type: string
      format: uuid
    required: true
    x-sailpoint-resource-operation-id: listIdentityProfilesV1
    description: Identity profile ID.
    example: 2b838de9-db9b-abcf-e646-d4f274ad4238
  responses:
    '200':
      description: Identity profile object.
      content:
        application/json:
          schema:
            $ref: ../schemas/identityprofile.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:identity-profile:read
  - applicationAuth:
    - idn:identity-profile:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
delete:
  operationId: deleteIdentityProfileV1
  tags:
  - Identity Profiles
  summary: Delete identity profile
  description: |-
    Delete an identity profile by ID.
    On success, this endpoint will return a reference to the bulk delete task result.
  parameters:
  - in: path
    name: identity-profile-id
    schema:
      type: string
      format: uuid
    required: true
    x-sailpoint-resource-operation-id: listIdentityProfilesV1
    description: Identity profile ID.
    example: ef38f94347e94562b5bb8424a56397d8
  responses:
    '202':
      description: Accepted - Returns a TaskResult object referencing the bulk delete job created.
      content:
        application/json:
          schema:
            $ref: ../schemas/taskresultsimplified.yaml
            description: An object with a TaskResult reference of the delete job.
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:identity-profile:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
patch:
  operationId: updateIdentityProfileV1
  tags:
  - Identity Profiles
  summary: Update identity profile
  description: |-
    Update a specified identity profile with this PATCH request.
      
    You cannot update these fields:
    * id
    * created
    * modified
    * identityCount
    * identityRefreshRequired
    * Authoritative Source and Identity Attribute Configuration cannot be modified at the same time.
  parameters:
  - in: path
    name: identity-profile-id
    schema:
      type: string
      format: uuid
    required: true
    x-sailpoint-resource-operation-id: listIdentityProfilesV1
    description: Identity profile ID.
    example: ef38f94347e94562b5bb8424a56397d8
  requestBody:
    required: true
    description: >-
      List of identity profile update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902)
      standard.
    content:
      application/json-patch+json:
        schema:
          type: array
          items:
            $ref: ../../shared/schemas/jsonpatchoperation.yaml
        examples:
          add-attribute-transform:
            summary: Add an attribute transform
            value:
            - op: add
              path: /identityAttributeConfig/attributeTransforms/0
              value:
                identityAttributeName: location
                transformDefinition:
                  type: accountAttribute
                  attributes:
                    sourceName: Employees
                    attributeName: location
                    sourceId: 2c91808878b7d63b0178c66ffcdc4ce4
  responses:
    '200':
      description: Updated identity profile.
      content:
        application/json:
          schema:
            $ref: ../schemas/identityprofile.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:identity-profile:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
