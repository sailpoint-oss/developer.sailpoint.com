type: object
required:
  - detailCode
  - candidates
properties:
  detailCode:
    type: string
    enum:
      - IDC_IDENTITY_AMBIGUOUS
    description: Constant detail code indicating that more than one identity matched the filter.
    example: IDC_IDENTITY_AMBIGUOUS
  message:
    type: string
    description: Optional explanatory text describing why the filter was considered ambiguous.
    example: Multiple identities matched the supplied SCIM filter expression.
  candidates:
    type: array
    description: Collection of identities that matched the ambiguous filter expression.
    items:
      $ref: ./intelidentityambiguouscandidate.yaml
    example:
      - id: ef38f94347e94562b5bb8424a56397d8
        displayName: Jane Example
      - id: ef38f94347e94562b5bb8424a56397d9
        displayName: J. Example
