type: object
required:
  - access
  - risk
  - accessHistory
properties:
  access:
    type: object
    description: Hyperlink to the Intelligence Package access document for this identity.
    allOf:
      - $ref: ./intelhref.yaml
    example:
      href: /v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/access
  risk:
    type: object
    description: Hyperlink to the Intelligence Package risk document for this identity.
    allOf:
      - $ref: ./intelhref.yaml
    example:
      href: /v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/risk
  accessHistory:
    type: object
    description: Hyperlink to the Intelligence Package access history document for this identity.
    allOf:
      - $ref: ./intelhref.yaml
    example:
      href: /v2026/intelligence/identities/ef38f94347e94562b5bb8424a56397d8/access-history
