type: object
required:
  - createdAt
  - modifiedAt
properties:
  createdAt:
    type: string
    format: date-time
    description: Timestamp when the identity record was first created in Identity Security Cloud.
    example: '2024-01-15T10:30:00Z'
  modifiedAt:
    type: string
    format: date-time
    description: Timestamp when the identity record was last modified in Identity Security Cloud.
    example: '2024-06-20T14:45:00Z'
