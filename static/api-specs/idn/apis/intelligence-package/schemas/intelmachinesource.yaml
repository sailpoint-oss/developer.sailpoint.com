type: object
properties:
  id:
    type: string
    description: Unique identifier of the correlated source in Identity Security Cloud.
    example: 2c9180835d2e5168015d32f890301e89
  name:
    type: string
    description: Display name of the source as configured in Identity Security Cloud.
    example: Active Directory
  type:
    type: string
    description: Connector or source type classification for the backing system.
    example: LDAP
