get:
  tags:
  - Launchers
  summary: Get launcher by id
  description: Get details for the given Launcher ID
  operationId: getLauncherV1
  parameters:
  - name: launcherID
    in: path
    description: ID of the Launcher to be retrieved
    required: true
    x-sailpoint-resource-operation-id: getLaunchersV1
    schema:
      type: string
      format: uuid
    example: e3012408-8b61-4564-ad41-c5ec131c325b
  responses:
    '200':
      description: Launcher retrieved successfully
      content:
        application/json:
          schema:
            $ref: ../schemas/launcher.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - sp:launcher-admin:read
    - sp:launcher-user:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
put:
  tags:
  - Launchers
  summary: Replace launcher
  description: Replace the given Launcher ID with given payload
  operationId: putLauncherV1
  parameters:
  - name: launcherID
    in: path
    description: ID of the Launcher to be replaced
    required: true
    x-sailpoint-resource-operation-id: getLaunchersV1
    schema:
      type: string
      format: uuid
    example: e3012408-8b61-4564-ad41-c5ec131c325b
  requestBody:
    description: Payload to replace Launcher
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/launcherrequest.yaml
  responses:
    '200':
      description: Launcher replaced successfully
      content:
        application/json:
          schema:
            $ref: ../schemas/launcher.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - sp:launcher-admin:write
  x-sailpoint-userLevels:
  - ORG_ADMIN
delete:
  tags:
  - Launchers
  summary: Delete launcher
  description: Delete the given Launcher ID
  operationId: deleteLauncherV1
  parameters:
  - name: launcherID
    in: path
    description: ID of the Launcher to be deleted
    required: true
    x-sailpoint-resource-operation-id: getLaunchersV1
    schema:
      type: string
      format: uuid
    example: e3012408-8b61-4564-ad41-c5ec131c325b
  responses:
    '204':
      description: Launcher deleted successfully
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - sp:launcher-admin:delete
  x-sailpoint-userLevels:
  - ORG_ADMIN
