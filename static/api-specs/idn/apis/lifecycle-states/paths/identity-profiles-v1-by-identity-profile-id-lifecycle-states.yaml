get:
  operationId: getLifecycleStatesV1
  tags:
  - Lifecycle States
  summary: Lists lifecyclestates
  description: 'Use this endpoint to list all lifecycle states by their associated identity profiles. '
  security:
  - userAuth:
    - idn:identity-profile-lifecycle-state:read
  - applicationAuth:
    - idn:identity-profile-lifecycle-state:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - in: path
    name: identity-profile-id
    description: Identity profile ID.
    required: true
    x-sailpoint-resource-operation-id: listIdentityProfiles
    schema:
      type: string
    example: 2b838de9-db9b-abcf-e646-d4f274ad4238
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: sorters
    required: false
    schema:
      type: string
      format: comma-separated
    example: created,modified
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **name, priority, created, modified**
  responses:
    '200':
      description: List of LifecycleState objects.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/lifecyclestate.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  operationId: createLifecycleStateV1
  tags:
  - Lifecycle States
  summary: Create lifecycle state
  description: Use this endpoint to create a lifecycle state.
  security:
  - userAuth:
    - idn:identity-profile-lifecycle-state:manage
  - applicationAuth:
    - idn:identity-profile-lifecycle-state:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - in: path
    name: identity-profile-id
    description: Identity profile ID.
    required: true
    x-sailpoint-resource-operation-id: listIdentityProfiles
    schema:
      type: string
    example: 2b838de9-db9b-abcf-e646-d4f274ad4238
  requestBody:
    description: Lifecycle state to be created.
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/lifecyclestate.yaml
  responses:
    '201':
      description: Created LifecycleState object.
      content:
        application/json:
          schema:
            $ref: ../schemas/lifecyclestate.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
