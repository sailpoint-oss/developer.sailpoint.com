post:
  operationId: createMachineAccountRequestV1
  tags:
  - Machine Account Creation Request
  summary: Submit Machine Account Creation Request
  security:
  - userAuth: []
  x-sailpoint-userLevels:
  - USER
  parameters:
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  description: >
    Initiates machine account creation request for the specified subtype.

    This method validates the input data, processes the machine account creation request,

    and generates an asynchronous result containing a tracking ID. 


    >**NOTE: You can only request a machine accounts on subtype for which you have a create machine account entitlement
    provisioned.**
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/machineaccountcreaterequestinput.yaml
  responses:
    '202':
      description: Machine account creation request result.
      content:
        application/json:
          schema:
            $ref: ../schemas/accountrequestasyncresult.yaml
          example:
            accountRequestId: 2d81808474683da6017468693c260196
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
