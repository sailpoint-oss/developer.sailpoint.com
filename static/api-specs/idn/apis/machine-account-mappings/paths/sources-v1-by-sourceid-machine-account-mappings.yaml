get:
  operationId: listMachineAccountMappingsV1
  tags:
  - Machine Account Mappings
  summary: Machine account mapping for source
  description: Retrieves Machine account mappings for a specified source using Source ID.
  security:
  - userAuth:
    - idn:sources:read
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:read
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  parameters:
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    description: Source ID
    example: ef38f94347e94562b5bb8424a56397d8
    x-sailpoint-resource-operation-id: listSourcesV1
  responses:
    '200':
      description: An array of Attribute Mapping Objects
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/attributemappings.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  operationId: createMachineAccountMappingsV1
  tags:
  - Machine Account Mappings
  summary: Create machine account mappings
  security:
  - userAuth:
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - ROLE_ADMIN
  - ROLE_SUBADMIN
  - SOURCE_SUBADMIN
  description: >-
    Creates Machine Account Mappings for both identities and accounts for a source.

    A token with API, ORG_ADMIN, ROLE_ADMIN, ROLE_SUBADMIN, SOURCE_ADMIN, or SOURCE_SUBADMIN authority is required to
    call this API.
  parameters:
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    description: Source ID.
    example: ef38f94347e94562b5bb8424a56397d8
    x-sailpoint-resource-operation-id: listSourcesV1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/attributemappings.yaml
  responses:
    '200':
      description: Newly created Attribute Mapping Object
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/attributemappings.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
delete:
  operationId: deleteMachineAccountMappingsV1
  tags:
  - Machine Account Mappings
  summary: Delete source's machine account mappings
  description: |-
    Use this API to remove machine account attribute mappings for a Source. 
    A token with ORG_ADMIN, SOURCE_ADMIN, or SOURCE_SUBADMIN authority is required to call this API.
  security:
  - userAuth:
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  parameters:
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    description: source ID.
    example: ef38f94347e94562b5bb8424a56397d8
    x-sailpoint-resource-operation-id: listSourcesV1
  responses:
    '200':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
