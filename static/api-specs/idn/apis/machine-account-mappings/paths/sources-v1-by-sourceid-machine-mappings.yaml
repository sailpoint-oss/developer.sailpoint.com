put:
  operationId: setMachineAccountMappingsV1
  tags:
  - Machine Account Mappings
  summary: Update source's machine account mappings
  description: >-
    Use this API to update Machine Account Attribute Mapping for a Source. A token with ORG_ADMIN, SOURCE_ADMIN, or
    SOURCE_SUBADMIN authority is required to call this API.
  security:
  - userAuth:
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  parameters:
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    description: Source ID.
    example: ef38f94347e94562b5bb8424a56397d8
    x-sailpoint-resource-operation-id: listSourcesV1
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/attributemappings.yaml
  responses:
    '200':
      description: Updated Machine Account Attributes for a Source.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/attributemappings.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
