post:
  operationId: disableMachineAccountsInBulkV1
  tags:
  - Machine Accounts
  summary: Bulk disable machine accounts
  description: >-
    Submits an asynchronous request to disable up to 100 machine accounts.


    The response returns HTTP 202 Accepted with an **accountRequestId** task identifier. Use the account request APIs to
    track completion.


    Callers without the **idn:mis-account:disable** right may still disable accounts they own. Non-owned IDs are
    excluded from the task.
  security:
  - userAuth:
    - idn:mis-account:disable
  - applicationAuth:
    - idn:mis-account:disable
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  parameters:
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/misbulkrequest.yaml
  responses:
    '202':
      description: Bulk disable request accepted.
      content:
        application/json:
          schema:
            $ref: ../../shared/schemas/accountrequestasyncresult.yaml
          example:
            accountRequestId: 2d81808474683da6017468693c260196
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
