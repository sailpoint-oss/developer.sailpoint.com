get:
  operationId: getMachineAccountV1
  tags:
  - Machine Accounts
  summary: Get machine account details
  description: 'Use this API to return the details for a single machine account by its ID.  '
  security:
  - userAuth:
    - idn:mis-account:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  - HELPDESK
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listMachineAccounts
    description: Machine Account ID.
    example: ef38f94347e94562b5bb8424a56397d8
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  responses:
    '200':
      description: Machine Account object.
      content:
        application/json:
          schema:
            $ref: ../schemas/machineaccount.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
patch:
  operationId: updateMachineAccountV1
  tags:
  - Machine Accounts
  summary: Update machine account details
  description: |
    Use this API to update machine accounts details. 
  security:
  - userAuth:
    - idn:mis-account:manage
  - applicationAuth:
    - idn:mis-account:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listMachineAccounts
    description: Machine Account ID.
    example: ef38f94347e94562b5bb8424a56397d8
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  requestBody:
    required: true
    description: >-
      A JSON of updated values [JSON Patch](https://tools.ietf.org/html/rfc6902) standard. The following fields are
      patchable:
                * description
                * ownerIdentity
                * subType
                * accessType
                * environment
                * attributes
                * classificationMethod
                * manuallyEdited
                * nativeIdentity
                * uuid
                * source
                * manuallyCorrelated
                * enabled
                * locked
                * hasEntitlements
                * connectorAttributes
    content:
      application/json-patch+json:
        schema:
          type: array
          items:
            type: object
        examples:
          Add machine identity attribute:
            value:
            - op: add
              path: /environment
              value: test
          Replace machine identity attribute:
            value:
            - op: replace
              path: /environment
              value: test
          Remove machine identity attribute:
            value:
            - op: remove
              path: /environment
  responses:
    '200':
      description: Updated Machine Account object.
      content:
        application/json:
          schema:
            $ref: ../schemas/machineaccount.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
