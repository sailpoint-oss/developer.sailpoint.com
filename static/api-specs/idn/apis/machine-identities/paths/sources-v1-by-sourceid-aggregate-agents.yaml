post:
  operationId: startMachineIdentityAggregationV1
  tags:
  - Machine Identities
  summary: Start machine identity aggregation
  security:
  - userAuth:
    - idn:mis-agents:aggregate
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  - HELPDESK
  description: Starts a machine identity (AI Agents) aggregation on the specified source.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/machineidentityaggregationrequest.yaml
  responses:
    '200':
      description: Machine Identity Aggregation was started successfully.
      content:
        application/json:
          schema:
            $ref: ../schemas/machineidentityaggregationresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  parameters:
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    description: Source ID.
    example: ef38f94347e94562b5bb8424a56397d8
    x-sailpoint-resource-operation-id: listSourcesV1
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
