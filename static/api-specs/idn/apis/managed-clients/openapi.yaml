openapi: 3.0.1
info:
  title: Identity Security Cloud API - Managed Clients
  description: >-
    Use these APIs to interact with the Identity Security Cloud platform to achieve repeatable, automated processes with
    greater scalability. We encourage you to join the SailPoint Developer Community forum at
    https://developer.sailpoint.com/discuss to connect with other developers using our APIs.
  termsOfService: https://developer.sailpoint.com/discuss/tos
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: v1
servers:
  - url: https://{tenant}.api.identitynow.com
    description: This is the production API server.
    variables:
      tenant:
        default: sailpoint
        description: This is the name of your tenant, typically your company's name.
  - url: https://{apiUrl}
    description: This is the versioned API server.
    variables:
      apiUrl:
        default: sailpoint.api.identitynow.com
        description: This is the api url of your tenant
tags:
  - name: Managed Clients
    description: >
      Use this API to implement managed client functionality. 

      With this functionality in place, administrators can modify and delete existing managed clients, create new ones,
      and view and make changes to their log configurations.
paths:
  /managed-clients/v1:
    $ref: ./paths/managed-clients-v1.yaml
  /managed-clients/v1/{id}:
    $ref: ./paths/managed-clients-v1-by-id.yaml
  /managed-clients/v1/{id}/status:
    $ref: ./paths/managed-clients-v1-by-id-status.yaml
  /managed-clients/v1/{id}/health-indicators:
    $ref: ./paths/managed-clients-v1-by-id-health-indicators.yaml
security:
  - userAuth:
      - sp:scopes:all
