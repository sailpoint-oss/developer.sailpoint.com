get:
  tags:
  - Managed Clients
  summary: Get managed client status
  description: Get a managed client's status, using its ID.
  operationId: getManagedClientStatusV1
  parameters:
  - name: id
    in: path
    description: Managed client ID to get status for.
    required: true
    x-sailpoint-resource-operation-id: getManagedClientsV1
    schema:
      type: string
      example: aClientId
  - name: type
    in: query
    description: Managed client type to get status for.
    required: true
    schema:
      $ref: ../schemas/managedclienttype.yaml
      example: VA
  responses:
    '200':
      description: Response with the managed client status, with the given ID and type.
      content:
        application/json:
          schema:
            $ref: ../schemas/managedclientstatus.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:managed-client-status:read
  - applicationAuth:
    - idn:managed-client-status:read
