get:
  tags:
  - Managed Cluster Types
  summary: Get a managed cluster type
  description: Get a Managed Cluster Type.
  operationId: getManagedClusterTypeV1
  parameters:
  - name: id
    in: path
    description: The Managed Cluster Type ID
    required: true
    x-sailpoint-resource-operation-id: getManagedClusterTypesV1
    schema:
      type: string
    example: aClusterTypeId
  responses:
    '200':
      description: Responds with a ManagedClusterType
      content:
        application/json:
          schema:
            $ref: ../schemas/managedclustertype.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:managed-cluster-types:read
    - idn:managed-cluster-types:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
patch:
  tags:
  - Managed Cluster Types
  summary: Update a managed cluster type
  description: Update an existing Managed Cluster Type.
  operationId: updateManagedClusterTypeV1
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: getManagedClusterTypesV1
    description: The Managed Cluster Type ID
    example: aClusterTypeId
  requestBody:
    required: true
    description: The JSONPatch payload used to update the schema.
    content:
      application/json-patch+json:
        schema:
          $ref: ../../shared/schemas/jsonpatch.yaml
  responses:
    '200':
      description: The updated ManagedClusterType
      content:
        application/json:
          schema:
            $ref: ../schemas/managedclustertype.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:managed-cluster-types:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
delete:
  operationId: deleteManagedClusterTypeV1
  tags:
  - Managed Cluster Types
  summary: Delete a managed cluster type
  description: Delete an existing Managed Cluster Type.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: getManagedClusterTypesV1
    description: The Managed Cluster Type ID
    example: aClusterTypeId
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
      description: The Managed Cluster Type was successfully deleted.
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:managed-cluster-types:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
