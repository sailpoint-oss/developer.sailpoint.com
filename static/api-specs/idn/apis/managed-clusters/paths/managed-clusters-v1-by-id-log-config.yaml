get:
  tags:
  - Managed Clusters
  summary: Get managed cluster log configuration
  description: Get a managed cluster's log configuration.
  operationId: getClientLogConfigurationV1
  parameters:
  - name: id
    in: path
    description: ID of managed cluster to get log configuration for.
    required: true
    x-sailpoint-resource-operation-id: getManagedClustersV1
    schema:
      type: string
      format: uuid
    example: 2b838de9-db9b-abcf-e646-d4f274ad4238
  responses:
    '200':
      description: Log configuration of managed cluster for given cluster ID.
      content:
        application/json:
          schema:
            $ref: ../schemas/clientlogconfiguration.yaml
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:remote-client:read
    - idn:remote-client:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
put:
  tags:
  - Managed Clusters
  summary: Update managed cluster log configuration
  description: >-
    Update a managed cluster's log configuration. You may only specify one of `durationMinutes` or `expiration`, up to
    1440 minutes (24 hours) in the future. If neither is specified, the default value for `durationMinutes` is 240.
  operationId: putClientLogConfigurationV1
  parameters:
  - name: id
    in: path
    description: ID of the managed cluster to update the log configuration for.
    required: true
    x-sailpoint-resource-operation-id: getManagedClustersV1
    schema:
      type: string
      format: uuid
    example: 2b838de9-db9b-abcf-e646-d4f274ad4238
  requestBody:
    description: Client log configuration for the given managed cluster.
    content:
      application/json:
        schema:
          oneOf:
          - $ref: ../schemas/clientlogconfigurationdurationminutes.yaml
          - $ref: ../schemas/clientlogconfigurationexpiration.yaml
        examples:
          Duration Minutes:
            $ref: ../examples/client-log-configuration-duration-minutes.yaml
          Expiration:
            $ref: ../examples/client-log-configuration-expiration.yaml
    required: true
  responses:
    '200':
      description: Response with updated client log configuration for the given managed cluster.
      content:
        application/json:
          schema:
            $ref: ../schemas/clientlogconfiguration.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:remote-client:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
