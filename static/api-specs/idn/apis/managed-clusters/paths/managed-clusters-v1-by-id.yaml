get:
  tags:
  - Managed Clusters
  summary: Get managed cluster
  description: Get a managed cluster by ID.
  operationId: getManagedClusterV1
  parameters:
  - name: id
    in: path
    description: Managed cluster ID.
    required: true
    x-sailpoint-resource-operation-id: getManagedClustersV1
    example: 2c9180897de347a2017de8859e8c5039
    style: simple
    explode: false
    schema:
      type: string
  responses:
    '200':
      description: Response with managed cluster for the given ID.
      content:
        application/json:
          schema:
            $ref: ../schemas/managedcluster.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:remote-client:read
    - idn:remote-client:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
patch:
  tags:
  - Managed Clusters
  summary: Update managed cluster
  description: Update an existing managed cluster.
  operationId: updateManagedClusterV1
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: getManagedClustersV1
    description: Managed cluster ID.
    example: 2c9180897de347a2017de8859e8c5039
  requestBody:
    required: true
    description: JSONPatch payload used to update the object.
    content:
      application/json-patch+json:
        schema:
          type: array
          items:
            $ref: ../../shared/schemas/jsonpatchoperation.yaml
  responses:
    '200':
      description: Updated managed cluster.
      content:
        application/json:
          schema:
            $ref: ../schemas/managedcluster.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:remote-client:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
delete:
  operationId: deleteManagedClusterV1
  tags:
  - Managed Clusters
  summary: Delete managed cluster
  description: Delete an existing managed cluster.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: getManagedClustersV1
    description: Managed cluster ID.
    example: 2c9180897de347a2017de8859e8c5039
  - in: query
    name: removeClients
    schema:
      type: boolean
      default: false
    required: false
    description: Flag to determine the need to delete a cluster with clients.
    example: false
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
      description: Managed cluster was successfully deleted.
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:remote-client:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
