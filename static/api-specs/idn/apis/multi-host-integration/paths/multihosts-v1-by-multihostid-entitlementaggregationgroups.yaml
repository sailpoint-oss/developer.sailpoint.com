get:
  tags:
  - Multi-Host Integration
  summary: List entitlement-aggregation-groups by integration id
  description: |-
    This API will return array of aggregation groups within provided Multi-Host Integration ID.  

    A token with Org Admin or Multi-Host Admin authority is required to access this endpoint.
  operationId: getEntitlementAggregationGroupsV1
  parameters:
  - name: multiHostId
    in: path
    description: ID of the Multi-Host Integration to update
    required: true
    x-sailpoint-resource-operation-id: getMultiHostIntegrations
    style: simple
    explode: false
    schema:
      type: string
      example: aMultiHostId
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/limit.yaml
  responses:
    '200':
      description: OK. Returned if the request was successfully accepted into the system.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/multihostintegrationsaggscheduleupdate.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:multihosts-admin:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
