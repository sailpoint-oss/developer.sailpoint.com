get:
  tags:
  - Multi-Host Integration
  summary: List multi-host source creation errors
  description: |-
    Get a list of sources creation errors within Multi-Host Integration ID.  

    A token with Org Admin or Multi-Host Admin authority is required to access this endpoint.
  operationId: getMultiHostSourceCreationErrorsV1
  parameters:
  - name: multiHostId
    in: path
    description: ID of the Multi-Host Integration
    required: true
    x-sailpoint-resource-operation-id: getMultiHostIntegrations
    style: simple
    explode: false
    schema:
      type: string
      example: 004091cb79b04636b88662afa50a4440
  responses:
    '200':
      description: OK. Returned if the request was successfully accepted into the system.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/sourcecreationerrors.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:sources:read
    - idn:multihosts-admin:manage
  - applicationAuth:
    - idn:sources:read
    - idn:multihosts-admin:manage
