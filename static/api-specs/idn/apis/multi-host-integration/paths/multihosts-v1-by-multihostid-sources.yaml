get:
  tags:
  - Multi-Host Integration
  summary: List sources within multi-host integration
  description: |-
    Get a list of sources within Multi-Host Integration ID.  

    A token with Org Admin or Multi-Host Admin authority is required to access this endpoint.
  operationId: getSourcesWithinMultiHostV1
  parameters:
  - name: multihostId
    in: path
    description: ID of the Multi-Host Integration to update
    required: true
    x-sailpoint-resource-operation-id: getMultiHostIntegrationsV1
    style: simple
    explode: false
    schema:
      type: string
      example: aMultiHostId
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/limit.yaml
  - name: sorters
    in: query
    required: false
    style: form
    explode: true
    schema:
      type: string
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **name**
    example: name
  - name: filters
    in: query
    required: false
    style: form
    explode: true
    schema:
      type: string
      format: comma-separated
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **id**: *in*
    example: id eq 2c91808b6ef1d43e016efba0ce470904
  - $ref: ../../shared/parameters/count.yaml
  responses:
    '200':
      description: OK. Returned if the request was successfully accepted into the system.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/multihostsources.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:sources:read
    - idn:multihosts-admin:manage
  - applicationAuth:
    - idn:sources:read
    - idn:multihosts-admin:manage
