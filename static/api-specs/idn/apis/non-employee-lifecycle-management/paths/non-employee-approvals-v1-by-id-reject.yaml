post:
  operationId: rejectNonEmployeeRequestV1
  security:
  - userAuth:
    - idn:nelm:manage
  tags:
  - Non-Employee Lifecycle Management
  summary: Reject a non-employee request
  description: This endpoint will reject an approval item request and notify user. The current user must be the requested approver.
  parameters:
  - in: path
    name: id
    description: Non-Employee approval item id (UUID)
    required: true
    x-sailpoint-resource-operation-id: listNonEmployeeApprovalsV1
    schema:
      type: string
    example: e136567de87e4d029e60b3c3c55db56d
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/nonemployeerejectapprovaldecision.yaml
  responses:
    '200':
      description: Non-Employee approval item object.
      content:
        application/json:
          schema:
            $ref: ../schemas/nonemployeeapprovalitem.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
