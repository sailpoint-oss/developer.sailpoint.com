get:
  operationId: listNonEmployeeApprovalsV1
  security:
  - userAuth:
    - idn:nelm:read
  - applicationAuth:
    - idn:nelm:read
  tags:
  - Non-Employee Lifecycle Management
  summary: Get list of non-employee approval requests
  description: |-
    This gets a list of non-employee approval requests.
    There are two contextual uses for this endpoint:
      1. The user has the role context of `idn:nesr:read`, in which case they
    can list the approvals for any approver.
      2. The user owns the requested approval.
  parameters:
  - in: query
    name: requested-for
    schema:
      type: string
    description: The identity for whom the request was made. *me* indicates the current user.
    required: false
    example: 2c91808280430dfb0180431a59440460
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: filters
    schema:
      type: string
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **approvalStatus**: *eq*
    example: approvalStatus eq "Pending"
    required: false
  - in: query
    name: sorters
    schema:
      type: string
      format: comma-separated
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **created, modified**
    required: false
    example: created
  responses:
    '200':
      description: List of approval items.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/nonemployeeapprovalitem.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
