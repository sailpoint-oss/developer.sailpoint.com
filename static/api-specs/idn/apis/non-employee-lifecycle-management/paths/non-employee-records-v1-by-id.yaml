get:
  operationId: getNonEmployeeRecordV1
  tags:
  - Non-Employee Lifecycle Management
  summary: Get a non-employee record
  description: |-
    This gets a non-employee record.
    Requires role context of `idn:nesr:read`
  parameters:
  - in: path
    name: id
    description: Non-Employee record id (UUID)
    required: true
    x-sailpoint-resource-operation-id: listNonEmployeeRecordsV1
    example: ef38f94347e94562b5bb8424a56397d8
    schema:
      type: string
  responses:
    '200':
      description: Non-Employee record object
      content:
        application/json:
          schema:
            $ref: ../schemas/nonemployeerecord.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:nelm:read
  - applicationAuth:
    - idn:nelm:read
put:
  operationId: updateNonEmployeeRecordV1
  security:
  - userAuth:
    - idn:nelm:manage
  tags:
  - Non-Employee Lifecycle Management
  summary: Update non-employee record
  description: |-
    This request will update a non-employee record. There are two contextual uses for this endpoint:
      1. The user has the role context of `idn:nesr:update`, in which case they
    update all available fields.
      2. The user is owner of the source, in this case they can only update the
    end date.
  parameters:
  - in: path
    name: id
    description: Non-employee record id (UUID)
    example: ef38f94347e94562b5bb8424a56397d8
    required: true
    x-sailpoint-resource-operation-id: listNonEmployeeRecordsV1
    schema:
      type: string
  requestBody:
    description: >-
      Non-employee record creation request body. Attributes are restricted by user type. Owner of source can update end
      date. Organization admins can update all available fields.
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/nonemployeerequestbody.yaml
  responses:
    '200':
      description: An updated non-employee record.
      content:
        application/json:
          schema:
            $ref: ../schemas/nonemployeerecord.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
patch:
  operationId: patchNonEmployeeRecordV1
  security:
  - userAuth:
    - idn:nelm:manage
  tags:
  - Non-Employee Lifecycle Management
  summary: Patch non-employee record
  description: |-
    This request will patch a non-employee record. There are two contextual uses for this endpoint:
      1. The user has the role context of `idn:nesr:update`, in which case they
    update all available fields.
      2. The user is owner of the source, in this case they can only update the
    end date.
  parameters:
  - in: path
    name: id
    description: Non-employee record id (UUID)
    example: ef38f94347e94562b5bb8424a56397d8
    required: true
    x-sailpoint-resource-operation-id: listNonEmployeeRecordsV1
    schema:
      type: string
  requestBody:
    description: >-
      A list of non-employee update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902)
      standard. Attributes are restricted by user type. Owner of source can update end date. Organization admins can
      update all available fields.
    required: true
    content:
      application/json-patch+json:
        schema:
          type: array
          items:
            $ref: ../../shared/schemas/jsonpatchoperation.yaml
        example:
        - op: replace
          path: /endDate
          value: '2019-08-23T18:40:35.772Z'
  responses:
    '200':
      description: A patched non-employee record.
      content:
        application/json:
          schema:
            $ref: ../schemas/nonemployeerecord.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
delete:
  operationId: deleteNonEmployeeRecordV1
  tags:
  - Non-Employee Lifecycle Management
  summary: Delete non-employee record
  description: |-
    This request will delete a non-employee record.
    Requires role context of `idn:nesr:delete`
  parameters:
  - in: path
    name: id
    description: Non-Employee record id (UUID)
    example: ef38f94347e94562b5bb8424a56397d8
    required: true
    x-sailpoint-resource-operation-id: listNonEmployeeRecordsV1
    schema:
      type: string
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:nelm:manage
  - applicationAuth:
    - idn:nelm:manage
