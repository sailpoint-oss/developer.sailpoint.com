post:
  operationId: createNonEmployeeRecordV1
  tags:
  - Non-Employee Lifecycle Management
  summary: Create non-employee record
  description: |-
    This request will create a non-employee record.
    Requires role context of `idn:nesr:create`
  requestBody:
    description: Non-Employee record creation request body.
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/nonemployeerequestbody.yaml
  responses:
    '200':
      description: Created non-employee record.
      content:
        application/json:
          schema:
            $ref: ../schemas/nonemployeerecord.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:nelm:manage
  - applicationAuth:
    - idn:nelm:manage
get:
  operationId: listNonEmployeeRecordsV1
  security:
  - userAuth:
    - idn:nelm:read
  - applicationAuth:
    - idn:nelm:read
  tags:
  - Non-Employee Lifecycle Management
  summary: List non-employee records
  description: |-
    This gets a list of non-employee records. There are two contextual uses for this endpoint:
      1. The user has the role context of `idn:nesr:read`, in which case they can get a list of all of the non-employees.
      2. The user is an account manager, in which case they can get a list of the non-employees that they manage.
  parameters:
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: sorters
    required: false
    schema:
      type: string
      format: comma-separated
    example: accountName,sourceId
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **id, accountName, sourceId, manager, firstName, lastName, email,
      phone, startDate, endDate, created, modified**
  - in: query
    name: filters
    required: false
    schema:
      type: string
    example: sourceId eq "2c91808568c529c60168cca6f90c1313"
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **sourceId**: *eq*
  responses:
    '200':
      description: Non-Employee record objects
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/nonemployeerecord.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
