get:
  operationId: getNonEmployeeBulkUploadStatusV1
  tags:
  - Non-Employee Lifecycle Management
  summary: Obtain the status of bulk upload on the source
  description: |
    The nonEmployeeBulkUploadStatus API returns the status of the newest bulk upload job for the specified source.
    Requires role context of `idn:nesr:read`
  parameters:
  - in: path
    name: id
    description: Source ID (UUID)
    required: true
    x-sailpoint-resource-operation-id: listNonEmployeeSourcesV1
    schema:
      type: string
    example: e136567de87e4d029e60b3c3c55db56d
  responses:
    '200':
      description: Status of the newest bulk-upload job, if any.
      content:
        application/json:
          schema:
            $ref: ../schemas/nonemployeebulkuploadstatus.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:nelm:read
  - applicationAuth:
    - idn:nelm:read
