get:
  operationId: getNonEmployeeSourceV1
  security:
  - userAuth:
    - idn:nelm:read
  - applicationAuth:
    - idn:nelm:read
  tags:
  - Non-Employee Lifecycle Management
  summary: Get a non-employee source
  description: |-
    This gets a non-employee source. There are two contextual uses for the requested-for path parameter: 
      1. The user has the role context of `idn:nesr:read`, in which case he or
    she may request any source.
      2. The current user is an account manager, in which case the user can only
    request sources that they own.
  parameters:
  - in: path
    name: sourceId
    description: Source Id
    example: 2c91808b7c28b350017c2a2ec5790aa1
    required: true
    x-sailpoint-resource-operation-id: listNonEmployeeSources
    schema:
      type: string
  responses:
    '200':
      description: Non-Employee source object.
      content:
        application/json:
          schema:
            $ref: ../schemas/nonemployeesource.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
patch:
  operationId: patchNonEmployeeSourceV1
  tags:
  - Non-Employee Lifecycle Management
  summary: Patch a non-employee source
  description: >-
    patch a non-employee source. (partial update) <br/> Patchable field: **name, description, approvers,
    accountManagers** Requires role context of `idn:nesr:update`.
  parameters:
  - in: path
    name: sourceId
    description: Source Id
    required: true
    x-sailpoint-resource-operation-id: listNonEmployeeSources
    schema:
      type: string
    example: e136567de87e4d029e60b3c3c55db56d
  requestBody:
    description: >-
      A list of non-employee source update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902)
      standard.
    required: true
    content:
      application/json-patch+json:
        schema:
          type: array
          items:
            $ref: ../../shared/schemas/jsonpatchoperation.yaml
        example:
        - op: replace
          path: /name
          value:
            new name:
        - op: replace
          path: /approvers
          value:
          - 2c91809f703bb37a017040a2fe8748c7
          - 48b1f463c9e8427db5a5071bd81914b8
  responses:
    '200':
      description: A patched non-employee source object.
      content:
        application/json:
          schema:
            $ref: ../schemas/nonemployeesource.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:nelm:manage
  - applicationAuth:
    - idn:nelm:manage
delete:
  operationId: deleteNonEmployeeSourceV1
  tags:
  - Non-Employee Lifecycle Management
  summary: Delete non-employee source
  description: This request will delete a non-employee source. Requires role context of `idn:nesr:delete`.
  parameters:
  - in: path
    name: sourceId
    description: Source Id
    required: true
    x-sailpoint-resource-operation-id: listNonEmployeeSources
    schema:
      type: string
    example: e136567de87e4d029e60b3c3c55db56d
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:nelm:manage
  - applicationAuth:
    - idn:nelm:manage
