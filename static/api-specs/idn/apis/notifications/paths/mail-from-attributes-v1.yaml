put:
  security:
  - userAuth:
    - sp:notification-mail-from-attributes:write
  x-sailpoint-userLevels:
  - ORG_ADMIN
  operationId: putMailFromAttributesV1
  tags:
  - Notifications
  summary: Change mail from domain
  description: >-
    Change the MAIL FROM domain of an AWS SES email identity and provide the MX and TXT records to be placed in the
    caller's DNS
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/mailfromattributesdto.yaml
        example:
          identity: BobSmith@sailpoint.com
          mailFromDomain: example.sailpoint.com
  responses:
    '200':
      description: MAIL FROM Attributes required to verify the change
      content:
        application/json:
          schema:
            $ref: ../schemas/mailfromattributes.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
