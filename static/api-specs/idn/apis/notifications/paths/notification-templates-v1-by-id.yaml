get:
  security:
  - userAuth:
    - idn:notification-templates:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  operationId: getNotificationTemplateV1
  tags:
  - Notifications
  summary: Get notification template by id
  description: This gets a template that you have modified for your site by Id.
  parameters:
  - name: id
    in: path
    description: Id of the Notification Template
    required: true
    x-sailpoint-resource-operation-id: listNotificationTemplatesV1
    style: simple
    explode: false
    schema:
      type: string
      example: c17bea3a-574d-453c-9e04-4365fbf5af0b
  responses:
    '200':
      description: A template object for your site
      content:
        application/json:
          schema:
            $ref: ../schemas/templatedto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
