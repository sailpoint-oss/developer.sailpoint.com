post:
  security:
  - userAuth:
    - idn:notification-templates:create
  x-sailpoint-userLevels:
  - ORG_ADMIN
  operationId: sendTestNotificationV1
  tags:
  - Notifications
  summary: Send test notification
  description: Send a Test Notification
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/sendtestnotificationrequestdto.yaml
        example:
          key: cloud_manual_work_item_summary
          medium: EMAIL
          context:
            numberOfPendingTasks: '4'
            ownerId: 201327fda1c44704ac01181e963d463c
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
