get:
  security:
  - userAuth:
    - sp:notification-dkim-attributes:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  operationId: getDkimAttributesV1
  tags:
  - Notifications
  summary: Get dkim attributes
  description: >-
    Retrieve DKIM (DomainKeys Identified Mail) attributes for all your tenants' AWS SES identities. Limits retrieval to
    100 identities per call.
  parameters:
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  responses:
    '200':
      description: List of DKIM Attributes
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/dkimattributes.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  security:
  - userAuth:
    - sp:notification-verify-domain-dkim:write
  x-sailpoint-userLevels:
  - ORG_ADMIN
  operationId: createDomainDkimV1
  tags:
  - Notifications
  summary: Verify domain address via dkim
  description: Create a domain to be verified via DKIM (DomainKeys Identified Mail)
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/domainaddress.yaml
  responses:
    '200':
      description: List of DKIM tokens required for the verification process.
      content:
        application/json:
          schema:
            $ref: ../schemas/domainstatusdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '405':
      $ref: ../responses/405.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
