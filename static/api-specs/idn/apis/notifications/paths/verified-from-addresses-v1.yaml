get:
  security:
  - userAuth:
    - idn:notification-templates:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  operationId: listFromAddressesV1
  tags:
  - Notifications
  summary: List from addresses
  description: Retrieve a list of sender email addresses and their verification statuses
  parameters:
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: filters
    required: false
    schema:
      type: string
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **email**: *eq, ge, le, gt, lt*
    example: email eq "john.doe@company.com"
  - in: query
    name: sorters
    required: false
    schema:
      type: string
      format: comma-separated
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **email**
    example: email
  responses:
    '200':
      description: List of Email Status
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/emailstatusdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  security:
  - userAuth:
    - idn:notification-templates:create
  x-sailpoint-userLevels:
  - ORG_ADMIN
  operationId: createVerifiedFromAddressV1
  tags:
  - Notifications
  summary: Create verified from address
  description: Create a new sender email address and initiate verification process.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/emailstatusdto.yaml
        example:
          email: sender@example.com
  responses:
    '201':
      description: New Verified Email Status
      content:
        application/json:
          schema:
            $ref: ../schemas/emailstatusdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
