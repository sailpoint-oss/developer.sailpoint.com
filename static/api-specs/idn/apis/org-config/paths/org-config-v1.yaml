get:
  operationId: getOrgConfigV1
  tags:
  - Org Config
  summary: Get org config settings
  security:
  - userAuth:
    - idn:org-configs:read
    - idn:org-configs:manage
  - applicationAuth:
    - idn:org-configs:read
    - idn:org-configs:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  description: Get the current organization's configuration settings, only external accessible properties.
  responses:
    '200':
      description: Request succeeded.
      content:
        application/json:
          schema:
            $ref: ../schemas/orgconfig.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
patch:
  operationId: patchOrgConfigV1
  tags:
  - Org Config
  summary: Patch org config
  security:
  - userAuth:
    - idn:org-configs:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  description: >-
    Patch the current organization's configuration, using http://jsonpatch.com/ syntax. This is commonly used to
    changing an organization's time zone.
  requestBody:
    description: >-
      A list of schema attribute update operations according to the [JSON Patch](https://tools.ietf.org/html/rfc6902)
      standard.
    content:
      application/json-patch+json:
        schema:
          type: array
          items:
            $ref: ../../shared/schemas/jsonpatchoperation.yaml
        example:
        - op: replace
          path: /timeZone
          value: America/Toronto
    required: true
  responses:
    '200':
      description: Successfully patched org config.
      content:
        application/json:
          schema:
            $ref: ../schemas/orgconfig.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
