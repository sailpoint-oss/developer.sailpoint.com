get:
  summary: Get specifications for parameter types.
  description: Get the specifications for all parameter types. All parameters must conform to this specification document.
  operationId: getParameterStorageSpecificationV1
  security:
  - userAuth:
    - sp:parameter-storage:read
    - sp:parameter-storage:manage
  parameters:
  - name: Accept-Language
    in: header
    required: false
    example: en
    description: The i18n internationalization code for the language that the spec is in. Defaults to english.
    schema:
      type: string
      default: en
  tags:
  - Parameter Storage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  x-audience:
  - external-public
  responses:
    '200':
      description: Returns the JSON spec in the language chosen.
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
