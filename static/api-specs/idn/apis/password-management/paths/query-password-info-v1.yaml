post:
  operationId: queryPasswordInfoV1
  tags:
  - Password Management
  summary: Query password info
  security:
  - userAuth:
    - idn:password-info:read
  - applicationAuth:
    - idn:password-info:read
  description: |
    This API is used to query password related information. 
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/passwordinfoquerydto.yaml
  responses:
    '200':
      description: Reference to the password info.
      content:
        application/json:
          schema:
            $ref: ../schemas/passwordinfo.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
