get:
  operationId: getPasswordSyncGroupsV1
  tags:
  - Password Sync Groups
  summary: Get password sync group list
  description: This API returns a list of password sync groups.
  security:
  - userAuth:
    - idn:password-sync-group:read
    - idn:password-sync-group:manage
  - applicationAuth:
    - idn:password-sync-group:read
    - idn:password-sync-group:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  responses:
    '200':
      description: A list of password sync groups.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/passwordsyncgroup.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  operationId: createPasswordSyncGroupV1
  tags:
  - Password Sync Groups
  summary: Create password sync group
  description: This API creates a password sync group based on the specifications provided.
  security:
  - userAuth:
    - idn:password-sync-group:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/passwordsyncgroup.yaml
        example:
          name: Password Sync Group 2
          passwordPolicyId: 2c91808d744ba0ce01746f93b6204501
          sourceIds:
          - 2c918084660f45d6016617daa9210584
          - 2c918084660f45d6016617daa9210500
  responses:
    '200':
      description: Reference to the password sync group.
      content:
        application/json:
          schema:
            $ref: ../schemas/passwordsyncgroup.yaml
          example:
            id: 6881f631-3bd5-4213-9c75-8e05cc3e35dd
            name: Password Sync Group 2
            passwordPolicyId: 2c91808d744ba0ce01746f93b6204501
            sourceIds:
            - 2c918084660f45d6016617daa9210584
            - 2c918084660f45d6016617daa9210500
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
