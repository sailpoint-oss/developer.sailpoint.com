get:
  tags:
  - Prompt Insights
  operationId: getPromptInsightsMetricsV1
  summary: Get prompt insights metrics
  description: Returns aggregate prompt insights metrics for the requested time window.
  parameters:
  - in: query
    name: interval
    required: true
    description: Relative lookback window for metrics aggregation.
    example: '-7d'
    schema:
      type: string
      enum:
      - '-1h'
      - '-1d'
      - '-7d'
      - '-30d'
  responses:
    '200':
      description: Aggregate prompt insights metrics for the requested interval.
      content:
        application/json:
          schema:
            $ref: ../schemas/promptinsightsmetrics.yaml
          example:
            promptsScanned: 125000
            promptsRedacted: 89
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:prompt-insights:read
  - applicationAuth:
    - idn:prompt-insights:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
