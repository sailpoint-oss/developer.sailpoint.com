openapi: 3.0.1
info:
  title: Identity Security Cloud API - Public Identities Config
  description: >-
    Use these APIs to interact with the Identity Security Cloud platform to achieve repeatable, automated processes with
    greater scalability. We encourage you to join the SailPoint Developer Community forum at
    https://developer.sailpoint.com/discuss to connect with other developers using our APIs.
  termsOfService: https://developer.sailpoint.com/discuss/tos
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: v1
servers:
  - url: https://{tenant}.api.identitynow.com
    description: This is the production API server.
    variables:
      tenant:
        default: sailpoint
        description: This is the name of your tenant, typically your company's name.
  - url: https://{apiUrl}
    description: This is the versioned API server.
    variables:
      apiUrl:
        default: sailpoint.api.identitynow.com
        description: This is the api url of your tenant
tags:
  - name: Public Identities Config
    description: >
      Use this API to implement public identity configuration functionality. 

      With this functionality in place, administrators can make up to 5 identity attributes publicly visible so other
      non-administrator users can see the relevant information they need to make decisions. 

      This can be helpful for approvers making approvals, certification reviewers, managers viewing their direct
      reports' access, and source owners viewing their tasks.


      By default, non-administrators can select an identity and view the following attributes: email, lifecycle state,
      and manager. 

      However, it may be helpful for a non-administrator reviewer to see other identity attributes like department,
      region, title, etc.

      Administrators can use this API to make those necessary identity attributes public to non-administrators. 


      For example, a non-administrator deciding whether to approve another identity's request for access to the Workday
      application, whose access may be restricted to members of the HR department, would want to know whether the
      identity is a member of the HR department. 

      If an administrator has used [Update Public Identity
      Config](https://developer.sailpoint.com/docs/api/v2025/update-public-identity-config/) to make the "department"
      attribute public, the approver can see the department and make a decision without requesting any more information.
paths:
  /public-identities-config/v1:
    $ref: ./paths/public-identities-config-v1.yaml
security:
  - userAuth:
      - sp:scopes:all
