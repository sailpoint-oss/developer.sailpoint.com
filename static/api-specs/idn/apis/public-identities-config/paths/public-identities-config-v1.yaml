get:
  operationId: getPublicIdentityConfigV1
  tags:
  - Public Identities Config
  summary: Get the public identities configuration
  description: >-
    Returns the publicly visible attributes of an identity available to request approvers for Access Requests and
    Certification Campaigns.
  security:
  - userAuth:
    - idn:public-identity-config:read
    - idn:public-identity-config:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  responses:
    '200':
      description: Request succeeded.
      content:
        application/json:
          schema:
            $ref: ../schemas/publicidentityconfig.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
put:
  operationId: updatePublicIdentityConfigV1
  tags:
  - Public Identities Config
  summary: Update the public identities configuration
  description: >-
    Updates the publicly visible attributes of an identity available to request approvers for Access Requests and
    Certification Campaigns.
  security:
  - userAuth:
    - idn:public-identity-config:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/publicidentityconfig.yaml
  responses:
    '200':
      description: Request succeeded.
      content:
        application/json:
          schema:
            $ref: ../schemas/publicidentityconfig.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
