post:
  tags:
  - Reports Data Extraction
  description: Cancels a running report.
  operationId: cancelReportV1
  summary: Cancel report
  security:
  - userAuth:
    - sp:report:manage
  parameters:
  - name: id
    in: path
    description: ID of the running Report to cancel
    required: true
    x-sailpoint-resource-operation-id: startReportV1
    style: simple
    explode: false
    schema:
      type: string
      example: a1ed223247144cc29d23c632624b4767
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
