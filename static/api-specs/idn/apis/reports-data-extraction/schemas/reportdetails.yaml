type: object
description: Details about report to be processed.
properties:
  reportType:
    type: string
    enum:
      - ACCOUNTS
      - IDENTITIES_DETAILS
      - IDENTITIES
      - IDENTITY_PROFILE_IDENTITY_ERROR
      - ORPHAN_IDENTITIES
      - SEARCH_EXPORT
      - UNCORRELATED_ACCOUNTS
    description: Use this property to define what report should be processed in the RDE service.
    example: ACCOUNTS
  arguments:
    anyOf:
      - $ref: ./accounts-export-report-arguments.yaml
      - $ref: ./identities-details-report-arguments.yaml
      - $ref: ./identities-report-arguments.yaml
      - $ref: ./identity-profile-identity-error-report-arguments.yaml
      - $ref: ./orphan-identities-report-arguments.yaml
      - $ref: ./search-export-report-arguments.yaml
      - $ref: ./uncorrelated-accounts-report-arguments.yaml
    example:
      application: 2c9180897e7742b2017e781782f705b9
      sourceName: Active Directory
    description: The string-object map(dictionary) with the arguments needed for report processing.
