post:
  operationId: createRoleInsightRequestsV1
  summary: Generate insights for roles
  deprecated: true
  tags:
  - Role Insights
  description: >-
    Submits a create role insights request to the role insights application. At this time there are no parameters. All
    business roles will be processed for the customer.
  responses:
    '201':
      description: Submitted a role insights generation request
      content:
        application/json:
          schema:
            $ref: ../schemas/roleinsightsresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  parameters:
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  security:
  - userAuth:
    - iai:role-insights
  - applicationAuth:
    - iai:role-insights
