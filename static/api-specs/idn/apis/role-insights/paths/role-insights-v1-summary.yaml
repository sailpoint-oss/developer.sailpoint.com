get:
  operationId: getRoleInsightsSummaryV1
  summary: Get role insights summary information
  tags:
  - Role Insights
  description: This method returns high level summary information for role insights for a customer.
  responses:
    '200':
      description: Succeeded. Returns high level counts.
      content:
        application/json:
          schema:
            $ref: ../schemas/roleinsightssummary.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  parameters:
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  security:
  - userAuth:
    - iai:role-insights
  - applicationAuth:
    - iai:role-insights
