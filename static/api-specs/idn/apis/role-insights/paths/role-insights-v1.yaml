get:
  operationId: getRoleInsightsV1
  summary: Get role insights
  tags:
  - Role Insights
  description: This method returns detailed role insights for each role.
  parameters:
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/count.yaml
  - name: sorters
    in: query
    description: >-
      Sort results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#sorting-results)


      Sorting is supported for the following fields: **numberOfUpdates, identitiesWithAccess,
      totalNumberOfIdentities**
    example: numberOfUpdates
    required: false
    style: form
    explode: true
    schema:
      type: string
  - name: filters
    in: query
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **name**: *sw*


      **ownerName**: *sw*


      **description**: *sw*
    required: false
    style: form
    explode: true
    example: name sw "John"
    schema:
      type: string
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  responses:
    '200':
      description: Succeeded. Returns a list of roles with information about insights for each role.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/roleinsight.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - iai:role-insights
  - applicationAuth:
    - iai:role-insights
