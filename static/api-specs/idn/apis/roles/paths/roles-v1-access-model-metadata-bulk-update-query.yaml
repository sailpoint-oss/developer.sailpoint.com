post:
  operationId: updateRolesMetadataByQueryV1
  summary: Bulk-update roles' metadata by query
  description: |-
    This API initiates a bulk update of metadata for one or more Roles by query.
    A token with ORG_ADMIN, ROLE_ADMIN ROLE_SUBADMIN authority is required to call this API.
    The maximum metadata value count for a single role is 25.
    Custom metadata update, including add, replace need suit licensed.
  tags:
  - Roles
  security:
  - UserContextAuth:
    - idn:role:update
    - idn:role-checked:update
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/rolemetadatabulkupdatebyqueryrequest.yaml
        example:
          example of a success update:
            query:
              indices:
              - roles
              queryType: TEXT
              textQuery:
                terms:
                - test123
                fields:
                - id
                matchAny: false
                contains: true
              includeNested: false
            operation: REPLACE
            replaceScope: ALL
            values:
            - attribute: iscFederalClassifications
              values:
              - secret
  responses:
    '202':
      description: Returned if bulk update request created
      content:
        application/json:
          schema:
            $ref: ../schemas/rolebulkupdateresponse.yaml
          examples:
            Update request created successfully:
              value:
                id: 2d82ac17-eb0d-4ba6-9918-dcad6ee0294d
                type: ROLE
                status: CREATED
                created: '2024-09-16T18:59:06.871594Z'
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
