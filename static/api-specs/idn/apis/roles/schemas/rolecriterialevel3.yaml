type: object
description: Defines STANDARD type Role membership
properties:
  operation:
    $ref: ./rolecriteriaoperation.yaml
  key:
    $ref: ./rolecriteriakey.yaml
  stringValue:
    type: string
    nullable: true
    description: >-
      String value to test the Identity attribute, Account attribute, or Entitlement specified in the key w/r/t the
      specified operation. If this criteria is a leaf node, that is, if the operation is one of EQUALS, NOT_EQUALS,
      CONTAINS, DOES_NOT_CONTAIN, STARTS_WITH, or ENDS_WITH, this field is required. Otherwise, specifying it is an
      error.
    example: carlee.cert1c9f9b6fd@mailinator.com
