post:
  tags:
  - Saved Search
  description: |
    Executes the specified saved search.
  summary: Execute a saved search by id
  operationId: executeSavedSearchV1
  parameters:
  - $ref: ../../shared/parameters/id.yaml
  requestBody:
    description: >
      When saved search execution is triggered by a scheduled search, *scheduleId* will specify the ID of the triggering
      scheduled search.


      If *scheduleId* is not specified (when execution is triggered by a UI test), the *owner* and *recipients*
      arguments must be provided.
    content:
      application/json:
        schema:
          $ref: ../schemas/searcharguments.yaml
        examples:
          scheduled:
            $ref: ../examples/execute-scheduled.yaml
          test:
            $ref: ../examples/execute-test.yaml
    required: true
  responses:
    '202':
      description: Accepted - Returned if the request was successfully accepted into the system.
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - sp:saved-search:manage
