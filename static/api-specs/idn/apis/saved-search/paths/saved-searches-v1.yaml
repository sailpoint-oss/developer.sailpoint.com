post:
  security:
  - userAuth:
    - sp:saved-search:manage
  tags:
  - Saved Search
  description: |
    Creates a new saved search.
  summary: Create a saved search
  operationId: createSavedSearchV1
  requestBody:
    description: The saved search to persist.
    content:
      application/json:
        schema:
          allOf:
          - $ref: ../schemas/savedsearchname.yaml
          - $ref: ../schemas/savedsearchdetail.yaml
    required: true
  responses:
    '201':
      description: The persisted saved search.
      content:
        application/json:
          schema:
            $ref: ../schemas/savedsearch.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
get:
  security:
  - userAuth:
    - sp:saved-search:read
  tags:
  - Saved Search
  description: |
    Returns a list of saved searches.
  summary: A list of saved searches
  operationId: listSavedSearchesV1
  parameters:
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/count.yaml
  - name: filters
    in: query
    schema:
      type: string
    description: >-
      Filter results using the standard syntax described in [V3 API Standard Collection
      Parameters](https://developer.sailpoint.com/idn/api/standard-collection-parameters#filtering-results)


      Filtering is supported for the following fields and operators:


      **owner.id**: *eq*
    example: owner.id eq "7a724640-0c17-4ce9-a8c3-4a89738459c8"
  responses:
    '200':
      description: The list of requested saved searches.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/savedsearch.yaml
      headers:
        X-Total-Count:
          description: The total result count (returned only if the *count* parameter is specified as *true*).
          schema:
            type: integer
          example: 5
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
