put:
  tags:
  - Scheduled Search
  description: |
    Updates an existing scheduled search.
  summary: Update an existing scheduled search
  operationId: updateScheduledSearchV1
  parameters:
  - in: path
    name: id
    description: ID of the requested document.
    schema:
      type: string
    required: true
    example: 2c91808568c529c60168cca6f90c1313
    x-sailpoint-resource-operation-id: listScheduledSearchV1
  requestBody:
    description: The scheduled search to persist.
    content:
      application/json:
        schema:
          $ref: ../schemas/scheduledsearch.yaml
    required: true
  responses:
    '200':
      description: The persisted scheduled search.
      content:
        application/json:
          schema:
            $ref: ../schemas/scheduledsearch.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - sp:scheduled-search:manage
get:
  tags:
  - Scheduled Search
  description: Returns the specified scheduled search.
  summary: Get a scheduled search
  operationId: getScheduledSearchV1
  parameters:
  - in: path
    name: id
    description: ID of the requested document.
    schema:
      type: string
    required: true
    example: 2c91808568c529c60168cca6f90c1313
    x-sailpoint-resource-operation-id: listScheduledSearchV1
  responses:
    '200':
      description: The requested scheduled search.
      content:
        application/json:
          schema:
            $ref: ../schemas/scheduledsearch.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security: []
delete:
  tags:
  - Scheduled Search
  description: |
    Deletes the specified scheduled search.
  operationId: deleteScheduledSearchV1
  summary: Delete a scheduled search
  parameters:
  - in: path
    name: id
    description: ID of the requested document.
    schema:
      type: string
    required: true
    example: 2c91808568c529c60168cca6f90c1313
    x-sailpoint-resource-operation-id: listScheduledSearchV1
  responses:
    '204':
      description: No Content - Indicates the request was successful but there is no content to be returned in the response.
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - sp:scheduled-search:manage
