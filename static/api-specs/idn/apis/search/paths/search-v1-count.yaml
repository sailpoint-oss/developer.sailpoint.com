post:
  tags:
  - Search
  description: Performs a search with a provided query and returns the count of results in the X-Total-Count header.
  operationId: searchCountV1
  security:
  - userAuth:
    - sp:search:read
  - applicationAuth:
    - sp:search:read
  summary: Count documents satisfying a query
  requestBody:
    content:
      application/json:
        schema:
          $ref: ../../shared/schemas/search.yaml
        examples:
          query-timeZone:
            $ref: ../examples/query-timezone.yaml
    required: true
  responses:
    '204':
      description: No content - indicates the request was successful but there is no content to be returned in the response.
      headers:
        X-Total-Count:
          description: The total result count.
          schema:
            type: integer
          example: 5
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
