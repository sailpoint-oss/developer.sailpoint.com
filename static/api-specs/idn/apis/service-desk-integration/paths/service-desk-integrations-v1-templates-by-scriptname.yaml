get:
  tags:
  - Service Desk Integration
  summary: Service desk integration template by scriptname
  description: This API endpoint returns an existing Service Desk integration template by scriptName.
  operationId: getServiceDeskIntegrationTemplateV1
  parameters:
  - name: scriptName
    in: path
    description: The scriptName value of the Service Desk integration template to get
    required: true
    x-sailpoint-resource-operation-id: getServiceDeskIntegrationsV1
    style: simple
    explode: false
    schema:
      type: string
      example: aScriptName
  responses:
    '200':
      description: Responds with the ServiceDeskIntegrationTemplateDto with the specified scriptName.
      content:
        application/json:
          schema:
            $ref: ../schemas/servicedeskintegrationtemplatedto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:service-desk-integration:read
    - idn:service-desk-integration:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
