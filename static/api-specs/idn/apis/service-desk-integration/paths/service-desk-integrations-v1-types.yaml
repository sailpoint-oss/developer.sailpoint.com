get:
  tags:
  - Service Desk Integration
  summary: List service desk integration types
  description: This API endpoint returns the current list of supported Service Desk integration types.
  operationId: getServiceDeskIntegrationTypesV1
  responses:
    '200':
      description: Responds with an array of the currently supported Service Desk integration types.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/servicedeskintegrationtemplatetype.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:service-desk-integration:read
    - idn:service-desk-integration:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
