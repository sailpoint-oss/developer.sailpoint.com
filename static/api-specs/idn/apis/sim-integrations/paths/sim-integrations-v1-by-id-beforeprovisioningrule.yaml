patch:
  tags:
  - SIM Integrations
  summary: Patch a sim beforeprovisioningrule attribute.
  description: Patch a SIM beforeProvisioningRule attribute given a JsonPatch object.
  operationId: patchBeforeProvisioningRuleV1
  requestBody:
    required: true
    description: The JsonPatch object that describes the changes of SIM beforeProvisioningRule.
    content:
      application/json-patch+json:
        schema:
          $ref: ../../shared/schemas/jsonpatch.yaml
  parameters:
  - name: id
    in: path
    description: SIM integration id
    schema:
      type: string
    example: 12345
    required: true
    x-sailpoint-resource-operation-id: getSIMIntegrationsV1
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  responses:
    '200':
      description: The updated DTO containing the details of the SIM integration.
      content:
        application/json:
          schema:
            $ref: ../schemas/servicedeskintegrationdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:service-desk-integration:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
