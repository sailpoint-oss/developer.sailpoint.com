get:
  security:
  - userAuth:
    - idn:sod-violation:read
    - idn:sod-violation:manage
  - applicationAuth:
    - idn:sod-violation:read
    - idn:sod-violation:manage
  operationId: getSodViolationReportStatusV1
  tags:
  - SOD Policies
  summary: Get sod violation report status
  description: This gets the status for a violation report run task that has already been invoked.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: startSodPolicyV1
    description: The ID of the violation report to retrieve status for.
    example: ef38f943-47e9-4562-b5bb-8424a56397d8
  responses:
    '200':
      description: Status of the violation report run task.
      content:
        application/json:
          schema:
            $ref: ../schemas/reportresultreference.yaml
          example:
            status: SUCCESS
            type: REPORT_RESULT
            id: 2e8d8180-24bc-4d21-91c6-7affdb473b0d
            name: policy-xyz
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
