get:
  security:
  - userAuth:
    - idn:sod-violation:read
    - idn:sod-violation:manage
  - applicationAuth:
    - idn:sod-violation:read
    - idn:sod-violation:manage
  operationId: getDefaultViolationReportV1
  tags:
  - SOD Policies
  summary: Download violation report
  description: This allows to download a violation report for a given report reference.
  parameters:
  - in: path
    name: reportResultId
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: startSodPolicy
    description: The ID of the report reference to download.
    example: ef38f94347e94562b5bb8424a56397d8
  responses:
    '200':
      description: Returns the PolicyReport.zip that contains the violation report file.
      content:
        application/zip:
          schema:
            type: string
            format: binary
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
