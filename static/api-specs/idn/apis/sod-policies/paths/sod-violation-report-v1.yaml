get:
  security:
  - userAuth:
    - idn:sod-violation:read
    - idn:sod-violation:manage
  - applicationAuth:
    - idn:sod-violation:read
    - idn:sod-violation:manage
  operationId: getSodAllReportRunStatusV1
  tags:
  - SOD Policies
  summary: Get multi-report run task status
  description: This endpoint gets the status for a violation report for all policy run.
  responses:
    '200':
      description: Status of the violation report run task for all policy run.
      content:
        application/json:
          schema:
            $ref: ../schemas/reportresultreference.yaml
          example:
            status: SUCCESS
            type: REPORT_RESULT
            id: 37b3b32a-f394-46f8-acad-b5223969fa68
            name: Multi Query Report
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
