post:
  security:
  - userAuth:
    - idn:sod-violation:read
    - idn:sod-violation:manage
  - applicationAuth:
    - idn:sod-violation:read
    - idn:sod-violation:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  operationId: startViolationCheckV1
  tags:
  - SOD Violations
  summary: Check sod violations
  description: This API initiates a SOD policy verification asynchronously.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/identitywithnewaccess.yaml
        example:
          identityId: 2c91808568c529c60168cca6f90c1313
          accessRefs:
          - type: ENTITLEMENT
            id: 2c918087682f9a86016839c050861ab1
          - type: ENTITLEMENT
            id: 2c918087682f9a86016839c0509c1ab2
          clientMetadata:
            additionalProp1: string
            additionalProp2: string
            additionalProp3: string
  responses:
    '202':
      description: Request ID with a timestamp.
      content:
        application/json:
          schema:
            $ref: ../schemas/sodviolationcheck.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
