get:
  tags:
  - Source Usages
  summary: Finds status of source usage
  description: This API returns the status of the source usage insights setup by IDN source ID.
  operationId: getStatusBySourceIdV1
  parameters:
  - name: sourceId
    in: path
    description: ID of IDN source
    required: true
    x-sailpoint-resource-operation-id: listSources
    schema:
      type: string
    example: 2c9180835d191a86015d28455b4a2329
  security:
  - userAuth:
    - idn:identity-history:manage
  - applicationAuth:
    - idn:identity-history:manage
  responses:
    '200':
      description: Status of the source usage insights setup by IDN source ID.
      content:
        application/json:
          schema:
            $ref: ../schemas/sourceusagestatus.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
