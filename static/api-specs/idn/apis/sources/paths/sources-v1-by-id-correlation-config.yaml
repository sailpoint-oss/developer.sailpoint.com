get:
  operationId: getCorrelationConfigV1
  tags:
  - Sources
  summary: Get source correlation configuration
  security:
  - userAuth:
    - idn:sources:read
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:read
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  description: This API returns the existing correlation configuration for a source specified by the given ID.
  parameters:
  - in: path
    name: id
    required: true
    x-sailpoint-resource-operation-id: listSources
    schema:
      type: string
    description: The source id
    example: 2c9180835d191a86015d28455b4a2329
  responses:
    '200':
      description: Correlation configuration for a source
      content:
        application/json:
          schema:
            $ref: ../schemas/correlationconfig.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
put:
  operationId: putCorrelationConfigV1
  tags:
  - Sources
  summary: Update source correlation configuration
  security:
  - userAuth:
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  description: >-
    Replaces the correlation configuration for the source specified by the given ID with the configuration provided in
    the request body.
  parameters:
  - in: path
    name: id
    required: true
    x-sailpoint-resource-operation-id: listSources
    schema:
      type: string
    description: The source id
    example: 2c9180835d191a86015d28455b4a2329
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/correlationconfig.yaml
  responses:
    '200':
      description: Updated correlation configuration for a source
      content:
        application/json:
          schema:
            $ref: ../schemas/correlationconfig.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
