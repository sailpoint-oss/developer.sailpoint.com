post:
  tags:
  - Sources
  summary: Process uncorrelated accounts
  operationId: importUncorrelatedAccountsV1
  description: File is required for upload. You will also need to set the Content-Type header to `multipart/form-data`
  security:
  - userAuth:
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listSources
    description: Source Id
    example: 75dbec1ebe154d5785da27b95e1dd5d7
  requestBody:
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            file:
              type: string
              format: binary
  responses:
    '202':
      description: Uncorrelated Accounts Task
      content:
        application/json:
          schema:
            $ref: ../schemas/loaduncorrelatedaccountstask.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
