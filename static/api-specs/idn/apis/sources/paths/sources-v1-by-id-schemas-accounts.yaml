get:
  tags:
  - Sources
  summary: Downloads source accounts schema template
  description: |-
    This API downloads the CSV schema that defines the account attributes on a source.
    >**NOTE: This API is designated only for Delimited File sources.**
  operationId: getAccountsSchemaV1
  parameters:
  - in: path
    name: id
    required: true
    x-sailpoint-resource-operation-id: listSourcesV1
    schema:
      type: string
    description: The Source id
    example: 8c190e6787aa4ed9a90bd9d5344523fb
  responses:
    '200':
      description: Successfully downloaded the file
      content:
        text/csv:
          example: id,name,givenName,familyName,e-mail,location,manager,groups,startDate,endDate
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:source-schema:read
    - idn:source-schema:manage
post:
  tags:
  - Sources
  summary: Uploads source accounts schema template
  description: >-
    This API uploads a source schema template file to configure a source's account attributes.


    To retrieve the file to modify and upload, log into Identity Now. 


    Click **Admin** -> **Connections** -> **Sources** -> **`{SourceName}`** -> **Import Data** -> **Account Schema** ->
    **Options** -> **Download Schema**


    >**NOTE: This API is designated only for Delimited File sources.**
  operationId: importAccountsSchemaV1
  parameters:
  - in: path
    name: id
    required: true
    x-sailpoint-resource-operation-id: listSourcesV1
    schema:
      type: string
    description: The Source id
    example: 8c190e6787aa4ed9a90bd9d5344523fb
  requestBody:
    required: true
    content:
      multipart/form-data:
        schema:
          type: object
          properties:
            file:
              type: string
              format: binary
  responses:
    '200':
      description: Successfully uploaded the file
      content:
        application/json:
          schema:
            $ref: ../schemas/schema.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:source-schema:manage
