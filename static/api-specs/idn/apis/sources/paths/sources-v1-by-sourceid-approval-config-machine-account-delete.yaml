get:
  tags:
  - Sources
  summary: Machine Account Deletion Approval Config
  operationId: getMachineAccountDeletionApprovalConfigBySourceV1
  description: >-
    Retrieves the machine account deletion approval configuration for a specific source. This endpoint returns details
    about the approval requirements, approvers, and comment settings that govern the deletion of machine accounts
    associated with the given source ID.
  security:
  - userAuth:
    - idn:source-config:read
    - idn:source-config:write
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  parameters:
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    description: source id.
    example: gt38f94347e94562b5bb8424a56498d8
    x-sailpoint-resource-operation-id: listSourcesV1
  responses:
    '200':
      description: Responds with a AccountDeleteConfigDto for machine account deletion approval config by sourceId.
      content:
        application/json:
          schema:
            $ref: ../schemas/accountdeleteconfigdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
patch:
  operationId: updateMachineAccountDeletionApprovalConfigV1
  tags:
  - Sources
  summary: Machine Account Deletion Approval Config
  description: >
    Use this endpoint to update the machine account deletion approval configuration for a specific source.

    The update is performed using a JSON Patch payload, which allows partial modifications to the approval config.

    This operation is typically used to change approval requirements, approvers, or comments settings for machine
    account deletion.

    The endpoint expects the source ID as a path parameter and a valid JSON Patch array in the request body.
  security:
  - userAuth:
    - idn:source-config:read
    - idn:source-config:write
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  parameters:
  - in: path
    name: sourceId
    schema:
      type: string
    description: machine account source ID.
    required: true
    example: 00eebcf881994e419d72e757fd30dc0e
    x-sailpoint-resource-operation-id: listSourcesV1
  requestBody:
    required: true
    description: The JSONPatch payload used to update the object.
    content:
      application/json-patch+json:
        schema:
          type: array
          items:
            $ref: ../../shared/schemas/jsonpatchoperation.yaml
          example:
          - op: replace
            path: /approvalConfig/comments
            value: ALL
  responses:
    '200':
      description: >-
        This response indicates the PATCH operation succeeded and the API returns the updated AccountDeleteConfigDto
        object.
      content:
        application/json:
          schema:
            $ref: ../schemas/accountdeleteconfigdto.yaml
          example:
            approvalRequired: false
            approvalConfig:
              approvers: sourceOwner
              comments: ALL
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
