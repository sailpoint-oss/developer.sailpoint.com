post:
  operationId: testSourceConnectionV1
  tags:
  - Sources
  summary: Check connection for source connector.
  description: >-
    This endpoint validates that the configured credentials are valid and will properly authenticate with the source
    identified by the sourceId path parameter.
  security:
  - userAuth:
    - idn:source-connector:manage
  - applicationAuth:
    - idn:source-connector:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listSources
    description: The ID of the Source.
    example: cef3ee201db947c5912551015ba0c679
  responses:
    '200':
      description: The result of checking connection to the source connector with response from it.
      content:
        application/json:
          schema:
            $ref: ../schemas/statusresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
