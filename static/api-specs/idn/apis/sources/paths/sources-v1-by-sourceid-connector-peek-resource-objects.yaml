post:
  operationId: searchResourceObjectsV1
  tags:
  - Sources
  summary: Peek source connector's resource objects
  description: Retrieves a sample of data returned from account and group aggregation requests.
  security:
  - userAuth:
    - idn:source-connector:manage
  - applicationAuth:
    - idn:source-connector:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listSourcesV1
    description: The ID of the Source
    example: cef3ee201db947c5912551015ba0c679
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/resourceobjectsrequest.yaml
          example:
            objectType: resource
            maxCount: 50
  responses:
    '200':
      description: List of resource objects that was fetched from the source connector.
      content:
        application/json:
          schema:
            $ref: ../schemas/resourceobjectsresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
