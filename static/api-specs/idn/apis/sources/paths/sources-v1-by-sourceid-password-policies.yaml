get:
  operationId: listPasswordPolicyHoldersOnSourceV1
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  - ROLE_SUBADMIN
  tags:
  - Sources
  summary: Get Password Policy for source
  description: |
    This API can be used to get Password Policy in IdentityNow for the specified Source.
    Source must support PASSWORD feature.
  parameters:
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    description: The Source id
    example: 8c190e6787aa4ed9a90bd9d5344523fb
    x-sailpoint-resource-operation-id: listSourcesV1
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/count.yaml
  responses:
    '200':
      description: Password Policies
      content:
        application/json:
          schema:
            $ref: ../schemas/passwordpolicyholdersdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:password-policy:read
patch:
  operationId: updatePasswordPolicyHoldersV1
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  - ROLE_SUBADMIN
  tags:
  - Sources
  summary: Update password policy
  description: |
    This API can be used to set up or update Password Policy in IdentityNow for the specified Source.
    Source must support PASSWORD feature.
  parameters:
  - in: path
    name: sourceId
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listSourcesV1
    description: The Source id
    example: 8c190e6787aa4ed9a90bd9d5344523fb
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/passwordpolicyholdersdto.yaml
  responses:
    '200':
      description: Updated Password Policies
      content:
        application/json:
          schema:
            $ref: ../schemas/passwordpolicyholdersdto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:manage
