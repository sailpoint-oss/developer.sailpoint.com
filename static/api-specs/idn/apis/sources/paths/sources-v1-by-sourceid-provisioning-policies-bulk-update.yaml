post:
  operationId: updateProvisioningPoliciesInBulkV1
  tags:
  - Sources
  summary: Bulk update provisioning policies
  description: This end-point updates a list of provisioning policies on the specified source in IdentityNow.
  security:
  - userAuth:
    - idn:provisioning-policy:manage
  - applicationAuth:
    - idn:provisioning-policy:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  parameters:
  - in: path
    name: sourceId
    required: true
    x-sailpoint-resource-operation-id: listSourcesV1
    schema:
      type: string
    description: The Source id.
    example: 2c9180835d191a86015d28455b4a2329
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: array
          items:
            $ref: ../schemas/provisioningpolicydto.yaml
  responses:
    '200':
      description: A list of the ProvisioningPolicyDto was successfully replaced.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/provisioningpolicydto.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
