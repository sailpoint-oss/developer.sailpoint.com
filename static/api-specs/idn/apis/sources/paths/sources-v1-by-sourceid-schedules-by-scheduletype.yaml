get:
  operationId: getSourceScheduleV1
  security:
  - userAuth:
    - idn:sources:read
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:read
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  tags:
  - Sources
  summary: Get source schedule by type
  description: |
    Get the source schedule by type in Identity Security Cloud (ISC).
  parameters:
  - in: path
    name: sourceId
    required: true
    x-sailpoint-resource-operation-id: listSourcesV1
    schema:
      type: string
    description: The Source id.
    example: 2c9180835d191a86015d28455b4a2329
  - in: path
    name: scheduleType
    schema:
      type: string
      enum:
      - ACCOUNT_AGGREGATION
      - GROUP_AGGREGATION
    required: true
    description: The Schedule type.
    example: ACCOUNT_AGGREGATION
  responses:
    '200':
      description: The requested Schedule was successfully retrieved.
      content:
        application/json:
          schema:
            $ref: ../schemas/schedule-3.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
patch:
  operationId: updateSourceScheduleV1
  security:
  - userAuth:
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  tags:
  - Sources
  summary: Update source schedule (partial)
  description: |
    Use this API to selectively update an existing Schedule using a JSONPatch payload. 

    The following schedule fields are immutable and cannot be updated:

    - type
  parameters:
  - in: path
    name: sourceId
    required: true
    x-sailpoint-resource-operation-id: listSourcesV1
    schema:
      type: string
    description: The Source id.
    example: 2c9180835d191a86015d28455b4a2329
  - in: path
    name: scheduleType
    schema:
      type: string
      enum:
      - ACCOUNT_AGGREGATION
      - GROUP_AGGREGATION
    required: true
    description: The Schedule type.
    example: ACCOUNT_AGGREGATION
  requestBody:
    required: true
    description: The JSONPatch payload used to update the schedule.
    content:
      application/json-patch+json:
        schema:
          type: array
          items:
            $ref: ../../shared/schemas/jsonpatchoperation.yaml
        examples:
          add-attribute:
            summary: Replace an attribute of the schedule
            value:
            - op: replace
              path: /cronExpression
              value: 0 0 6 * * ?
  responses:
    '200':
      description: The Schedule was successfully updated.
      content:
        application/json:
          schema:
            $ref: ../schemas/schedule-3.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
delete:
  operationId: deleteSourceScheduleV1
  security:
  - userAuth:
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  tags:
  - Sources
  summary: Delete source schedule by type.
  parameters:
  - in: path
    name: sourceId
    required: true
    x-sailpoint-resource-operation-id: listSourcesV1
    schema:
      type: string
    description: The Source id.
    example: 2c9180835d191a86015d28455b4a2329
  - in: path
    name: scheduleType
    schema:
      type: string
      enum:
      - ACCOUNT_AGGREGATION
      - GROUP_AGGREGATION
    required: true
    description: The Schedule type.
    example: ACCOUNT_AGGREGATION
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
      description: The Schedule was successfully deleted.
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
