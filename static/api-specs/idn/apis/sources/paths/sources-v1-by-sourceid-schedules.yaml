get:
  operationId: getSourceSchedulesV1
  security:
  - userAuth:
    - idn:sources:read
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:read
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  tags:
  - Sources
  summary: List schedules on source
  description: |
    Use this API to list the schedules that exist on the specified source in Identity Security Cloud (ISC).
    :::info
    This endpoint uses a **cron expression** to schedule a task, following standard **cron job syntax**.

    For example, `0 0 12 1/1 * ? *` runs the task **daily at 12:00 PM**.

    **Days of the week are represented as 1-7 (Sunday-Saturday).**
    :::
  parameters:
  - in: path
    name: sourceId
    required: true
    x-sailpoint-resource-operation-id: listSources
    schema:
      type: string
    description: Source ID.
    example: 2c9180835d191a86015d28455b4a2329
  responses:
    '200':
      description: The schedules were successfully retrieved.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/schedule-3.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  operationId: createSourceScheduleV1
  security:
  - userAuth:
    - idn:sources:manage
  - applicationAuth:
    - idn:sources:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  tags:
  - Sources
  summary: Create schedule on source
  description: |
    Use this API to create a new schedule for a type on the specified source in Identity Security Cloud (ISC).
  parameters:
  - in: path
    name: sourceId
    required: true
    x-sailpoint-resource-operation-id: listSources
    schema:
      type: string
    description: Source ID.
    example: 2c9180835d191a86015d28455b4a2329
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/schedule-3.yaml
  responses:
    '201':
      description: The schedule was successfully created on the specified source.
      content:
        application/json:
          schema:
            $ref: ../schemas/schedule-3.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
