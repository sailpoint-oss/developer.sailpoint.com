title: indexOf
type: object
required:
  - substring
properties:
  substring:
    type: string
    description: >-
      A substring to search for, searches the entire calling string, and returns the index of the first occurrence of
      the specified substring.
    example: admin_
  requiresPeriodicRefresh:
    $ref: ./requiresperiodicrefresh.yaml
  input:
    $ref: ./input.yaml
