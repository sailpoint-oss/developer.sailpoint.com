post:
  tags:
  - Suggested Entitlement Description
  summary: Submit bulk approval request
  description: |-
    Submit Bulk Approval Request for SED.
    Request body takes list of SED Ids. API responses with list of SED Approval Status
  operationId: submitSedApprovalV1
  requestBody:
    description: Sed Approval
    content:
      application/json-patch+json:
        schema:
          items:
            $ref: ../schemas/sedapproval.yaml
          type: array
    required: true
  responses:
    '200':
      description: List of SED Approval Status
      content:
        application/json:
          schema:
            items:
              $ref: ../schemas/sedapprovalstatus.yaml
            type: array
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:sed:write
  - applicationAuth:
    - idn:sed:write
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - SOURCE_ADMIN
