post:
  operationId: deleteTagsToManyObjectV1
  security:
  - userAuth:
    - idn:tag:manage
  - applicationAuth:
    - idn:tag:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  - CERT_ADMIN
  - REPORT_ADMIN
  - ROLE_ADMIN
  - ROLE_SUBADMIN
  - SOURCE_ADMIN
  - SOURCE_SUBADMIN
  tags:
  - Tagged Objects
  summary: Remove tags from multiple objects
  description: This API removes tags from multiple objects.
  requestBody:
    description: Supported object types are ACCESS_PROFILE, APPLICATION, CAMPAIGN, ENTITLEMENT, IDENTITY, ROLE, SOD_POLICY, SOURCE.
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/bulkremovetaggedobject.yaml
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
