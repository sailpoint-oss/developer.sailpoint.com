delete:
  operationId: deleteTaggedObjectV1
  security:
  - userAuth:
    - idn:tag:manage
  - applicationAuth:
    - idn:tag:manage
  tags:
  - Tagged Objects
  summary: Delete object tags
  description: Delete all tags from a tagged object.
  parameters:
  - in: path
    name: type
    schema:
      type: string
      enum:
      - ACCESS_PROFILE
      - APPLICATION
      - CAMPAIGN
      - ENTITLEMENT
      - IDENTITY
      - ROLE
      - SOD_POLICY
      - SOURCE
    required: true
    description: The type of object to delete tags from.
    example: ROLE
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listTaggedObjectsV1
    description: The ID of the object to delete tags from.
    example: ef38f94347e94562b5bb8424a56397d8
  responses:
    '204':
      description: No content.
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
