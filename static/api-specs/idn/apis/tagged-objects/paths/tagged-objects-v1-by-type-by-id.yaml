get:
  operationId: getTaggedObjectV1
  security:
  - userAuth:
    - idn:tag:read
    - idn:tag:manage
  - applicationAuth:
    - idn:tag:read
    - idn:tag:manage
  tags:
  - Tagged Objects
  summary: Get tagged object
  description: This gets a tagged object for the specified type.
  parameters:
  - in: path
    name: type
    schema:
      type: string
      enum:
      - ACCESS_PROFILE
      - APPLICATION
      - CAMPAIGN
      - ENTITLEMENT
      - IDENTITY
      - ROLE
      - SOD_POLICY
      - SOURCE
    required: true
    description: The type of tagged object to retrieve.
    example: ROLE
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listTaggedObjectsV1
    description: The ID of the object reference to retrieve.
    example: ef38f94347e94562b5bb8424a56397d8
  responses:
    '200':
      description: Tagged object by type and ID.
      content:
        application/json:
          schema:
            $ref: ../schemas/taggedobject.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
