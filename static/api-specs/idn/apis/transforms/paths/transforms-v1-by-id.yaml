get:
  tags:
  - Transforms
  summary: Transform by id
  description: This API returns the transform specified by the given ID.
  operationId: getTransformV1
  parameters:
  - name: id
    in: path
    description: ID of the transform to retrieve
    required: true
    x-sailpoint-resource-operation-id: listTransforms
    style: simple
    explode: false
    example: 2cd78adghjkja34jh2b1hkjhasuecd
    schema:
      type: string
  responses:
    '200':
      description: Transform with the given ID
      content:
        application/json:
          schema:
            $ref: ../schemas/transformread.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:transform:read
    - idn:transform:manage
  - applicationAuth:
    - idn:transform:read
    - idn:transform:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
put:
  tags:
  - Transforms
  summary: Update a transform
  description: >-
    Replaces the transform specified by the given ID with the transform provided in the request body. Only the
    "attributes" field is mutable. Attempting to change other properties (ex. "name" and "type") will result in an
    error.
  operationId: updateTransformV1
  parameters:
  - name: id
    in: path
    description: ID of the transform to update
    required: true
    x-sailpoint-resource-operation-id: listTransforms
    style: simple
    explode: false
    schema:
      type: string
    example: 2cd78adghjkja34jh2b1hkjhasuecd
  requestBody:
    description: >-
      The updated transform object. Must include "name", "type", and "attributes" fields, but "name" and "type" must not
      be modified.
    content:
      application/json:
        schema:
          $ref: ../schemas/transform.yaml
        example:
          name: Timestamp To Date
          type: dateFormat
          attributes:
            inputFormat: MMM-dd-yyyy, HH:mm:ss.SSS
            outputFormat: yyyy/dd/MM
  responses:
    '200':
      description: Indicates the transform was successfully updated and returns its new representation.
      content:
        application/json:
          schema:
            $ref: ../schemas/transformread.yaml
          example:
            id: 2cd78adghjkja34jh2b1hkjhasuecd
            name: Timestamp To Date
            type: dateFormat
            attributes:
              inputFormat: MMM-dd-yyyy, HH:mm:ss.SSS
              outputFormat: yyyy/dd/MM
            internal: false
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:transform:manage
  - applicationAuth:
    - idn:transform:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
delete:
  tags:
  - Transforms
  summary: Delete a transform
  description: >-
    Deletes the transform specified by the given ID. Attempting to delete a transform that is used in one or more
    Identity Profile mappings will result in an error. If this occurs, you must first remove the transform from all
    mappings before deleting the transform.
  operationId: deleteTransformV1
  parameters:
  - name: id
    in: path
    description: ID of the transform to delete
    required: true
    x-sailpoint-resource-operation-id: listTransforms
    style: simple
    explode: false
    schema:
      type: string
    example: 2cd78adghjkja34jh2b1hkjhasuecd
  responses:
    '204':
      $ref: ../../shared/responses/204.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - idn:transform:manage
  - applicationAuth:
    - idn:transform:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
