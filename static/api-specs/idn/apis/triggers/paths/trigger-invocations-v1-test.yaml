post:
  operationId: startTestTriggerInvocationV1
  tags:
  - Triggers
  summary: Start a test invocation
  description: >-
    Initiate a test event for all subscribers of the specified event trigger.  If there are no subscribers to the
    specified trigger in the tenant, then no test event will be sent.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/testinvocation.yaml
        examples:
          Test Trigger with Mock Input:
            value:
              triggerId: idn:access-requested
              input:
                identityId: 201327fda1c44704ac01181e963d463c
              contentJson:
                workflowId: 1234
          Send Test to only One Subscriber:
            value:
              triggerId: idn:access-requested
              contentJson:
                workflowId: 1234
              subscriptionIds:
              - 0f11f2a4-7c94-4bf3-a2bd-742580fe3bde
  responses:
    '200':
      description: Test trigger invocations that have been started for specified subscription(s).
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/invocation.yaml
    '204':
      $ref: ../../shared/responses/204.yaml
      description: Trigger invocation is skipped, because tenant has not subscribed to the specified trigger.
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  security:
  - userAuth:
    - sp:trigger-service-invocation-status:manage
  - applicationAuth:
    - sp:trigger-service-invocation-status:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
