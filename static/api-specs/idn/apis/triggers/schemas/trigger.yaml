    type: string
    description: >-
      The JSON schema of the response that will be sent by the subscribed service to the trigger in response to an
      event.  This only applies to a trigger type of `REQUEST_RESPONSE`.
    nullable: true
    example: >-
      {"definitions":{"record:AccessRequestDynamicApproverOutput":{"type":["null","object"],"required":["id","name","type"],"additionalProperties":true,"properties":{"id":{"type":"string"},"name":{"type":"string"},"type":{"type":"string"}}}},"$ref":"#/definitions/record:AccessRequestDynamicApproverOutput"}
