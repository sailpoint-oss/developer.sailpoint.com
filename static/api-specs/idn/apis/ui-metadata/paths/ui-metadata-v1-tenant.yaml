get:
  operationId: getTenantUiMetadataV1
  tags:
  - UI Metadata
  summary: Get a tenant ui metadata
  description: This API endpoint retrieves UI metadata configured for your tenant.
  security:
  - userAuth:
    - idn:ui-access-metadata-page:read
  - applicationAuth:
    - idn:ui-access-metadata-page:read
  x-sailpoint-userLevels:
  - ORG_ADMIN
  responses:
    '200':
      description: A tenant UI metadata object
      content:
        application/json:
          schema:
            $ref: ../schemas/tenantuimetadataitemresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  parameters:
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
put:
  operationId: setTenantUiMetadataV1
  tags:
  - UI Metadata
  summary: Update tenant ui metadata
  description: >-
    This API endpoint updates UI metadata for your tenant. These changes may require up to 5 minutes to take effect on
    the UI.
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/tenantuimetadataitemupdaterequest.yaml
  security:
  - userAuth:
    - idn:ui-access-metadata-page:manage
  x-sailpoint-userLevels:
  - ORG_ADMIN
  responses:
    '200':
      description: A tenant UI metadata object
      content:
        application/json:
          schema:
            $ref: ../schemas/tenantuimetadataitemresponse.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
  parameters:
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
