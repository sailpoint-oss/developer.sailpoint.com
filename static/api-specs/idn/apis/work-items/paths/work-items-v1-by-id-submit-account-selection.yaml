post:
  operationId: submitAccountSelectionV1
  tags:
  - Work Items
  summary: Submit account selections
  description: This API submits account selections. Either an admin, or the owning/current user must make this request.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listWorkItems
    description: The ID of the work item
    example: ef38f94347e94562b5bb8424a56397d8
  requestBody:
    required: true
    content:
      application/json:
        schema:
          type: object
          additionalProperties: true
        example:
          fieldName: fieldValue
    description: Account Selection Data map, keyed on fieldName
  responses:
    '200':
      description: A work items details object.
      content:
        application/json:
          schema:
            $ref: ../schemas/workitems.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
