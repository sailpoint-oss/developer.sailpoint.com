get:
  operationId: getWorkItemV1
  tags:
  - Work Items
  summary: Get a work item
  description: This gets the details of a Work Item belonging to either the specified user(admin required), or the current user.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listWorkItemsV1
    description: ID of the work item.
    example: 2c9180835d191a86015d28455b4a2329
  responses:
    '200':
      description: The work item with the given ID.
      content:
        application/json:
          schema:
            $ref: ../schemas/workitems.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
post:
  operationId: completeWorkItemV1
  tags:
  - Work Items
  summary: Complete a work item
  description: This API completes a work item. Either an admin, or the owning/current user must make this request.
  parameters:
  - in: path
    name: id
    schema:
      type: string
    required: true
    x-sailpoint-resource-operation-id: listWorkItemsV1
    description: The ID of the work item
    example: ef38f94347e94562b5bb8424a56397d8
  requestBody:
    description: Body is the request payload to create form definition request
    content:
      application/json:
        schema:
          type: string
          nullable: true
  responses:
    '200':
      description: A WorkItems object
      content:
        application/json:
          schema:
            $ref: ../schemas/workitems.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
