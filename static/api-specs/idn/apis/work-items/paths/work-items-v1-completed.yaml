get:
  operationId: getCompletedWorkItemsV1
  tags:
  - Work Items
  summary: Completed work items
  description: >-
    This gets a collection of completed work items belonging to either the specified user(admin required), or the
    current user.
  parameters:
  - in: query
    name: ownerId
    schema:
      type: string
    description: >-
      The id of the owner of the work item list being requested.  Either an admin, or the owning/current user must
      make this request.
    required: false
    example: 1211bcaa32112bcef6122adb21cef1ac
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  responses:
    '200':
      description: List of completed work items.
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/workitems.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
