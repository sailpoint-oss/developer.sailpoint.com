get:
  operationId: listWorkItemsV1
  tags:
  - Work Items
  summary: List work items
  description: This gets a collection of work items belonging to either the specified user(admin required), or the current user.
  parameters:
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  - $ref: ../../shared/parameters/count.yaml
  - in: query
    name: ownerId
    schema:
      type: string
    description: ID of the work item owner.
    required: false
    example: 1211bcaa32112bcef6122adb21cef1ac
  responses:
    '200':
      description: List of work items
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/workitems.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '404':
      $ref: ../../shared/responses/404.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
