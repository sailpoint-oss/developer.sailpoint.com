delete:
  operationId: deleteReassignmentConfigurationV1
  tags:
  - Work Reassignment
  summary: Delete reassignment configuration
  description: Deletes a single reassignment configuration for the specified identity
  security:
  - userAuth:
    - idn:reassignment-configuration:manage
  parameters:
  - in: path
    name: identityId
    schema:
      type: string
    description: unique identity id
    required: true
    x-sailpoint-resource-operation-id: listIdentitiesV1
    example: 2c91808781a71ddb0181b9090b5c504e
  - in: path
    name: configType
    schema:
      $ref: ../schemas/configtypeenum.yaml
    required: true
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  responses:
    '204':
      description: Reassignment Configuration deleted
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
