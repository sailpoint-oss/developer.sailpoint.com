get:
  operationId: getEvaluateReassignmentConfigurationV1
  tags:
  - Work Reassignment
  summary: Evaluate reassignment configuration
  description: >-
    Evaluates the Reassignment Configuration for an `Identity` to determine if work items for the specified type should
    be reassigned. If a valid Reassignment Configuration is found for the identity & work type, then a lookup is
    initiated which recursively fetches the Reassignment Configuration for the next `TargetIdentity` until no more
    results are found or a max depth of 5. That lookup trail is provided in the response and the final reassigned
    identity in the lookup list is returned as the `reassignToId` property. If no Reassignment Configuration is found
    for the specified identity & config type then the requested Identity ID will be used as the `reassignToId` value and
    the lookupTrail node will be empty.
  security:
  - userAuth:
    - idn:reassignment-configuration:manage
  parameters:
  - in: path
    name: identityId
    required: true
    x-sailpoint-resource-operation-id: listIdentities
    schema:
      type: string
    description: unique identity id
    example: 2c91808781a71ddb0181b9090b5c504e
  - in: path
    name: configType
    required: true
    schema:
      $ref: ../schemas/configtypeenum.yaml
    description: Reassignment work type
    example: accessRequests
  - in: query
    name: exclusionFilters
    required: false
    schema:
      type: array
      items:
        type: string
    description: >-
      Exclusion filters that disable parts of the reassignment evaluation. Possible values are listed below: -
      `SELF_REVIEW_DELEGATION`: This will exclude delegations of self-review reassignments
    example: SELF_REVIEW_DELEGATION
  - name: X-SailPoint-Experimental
    in: header
    description: Use this header to enable this experimental API.
    example: true
    schema:
      type: string
      default: true
    required: true
  responses:
    '200':
      description: Evaluated Reassignment Configuration
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/evaluateresponse.yaml
          examples:
            empty:
              $ref: ../examples/evaluateempty.yaml
            longTrail:
              $ref: ../examples/evaluatelong.yaml
            selfReview:
              $ref: ../examples/evaluateselfreview.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
