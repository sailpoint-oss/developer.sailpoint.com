get:
  operationId: listWorkflowLibraryOperatorsV1
  tags:
  - Workflows
  summary: List workflow library operators
  description: This lists the workflow operators available to you
  security:
  - userAuth:
    - sp:workflow:read
    - sp:workflow:manage
  responses:
    '200':
      description: List of workflow operators
      content:
        application/json:
          schema:
            type: array
            items:
              $ref: ../schemas/workflowlibraryoperator.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
