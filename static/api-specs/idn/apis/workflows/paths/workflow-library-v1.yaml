get:
  operationId: listCompleteWorkflowLibraryV1
  tags:
  - Workflows
  summary: List complete workflow library
  description: This lists all triggers, actions, and operators in the library
  externalDocs:
    description: Additional documentation for workflows
    url: https://documentation.sailpoint.com/saas/help/workflows/index.html
  parameters:
  - $ref: ../../shared/parameters/limit.yaml
  - $ref: ../../shared/parameters/offset.yaml
  security:
  - userAuth:
    - sp:workflow:read
    - sp:workflow:manage
  responses:
    '200':
      description: List of workflow steps
      content:
        application/json:
          schema:
            type: array
            items:
              anyOf:
              - $ref: ../schemas/workflowlibraryaction.yaml
              - $ref: ../schemas/workflowlibrarytrigger.yaml
              - $ref: ../schemas/workflowlibraryoperator.yaml
    '400':
      $ref: ../../shared/responses/400.yaml
    '401':
      $ref: ../../shared/responses/401.yaml
    '403':
      $ref: ../../shared/responses/403.yaml
    '429':
      $ref: ../../shared/responses/429.yaml
    '500':
      $ref: ../../shared/responses/500.yaml
