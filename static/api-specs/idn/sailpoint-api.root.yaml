openapi: 3.0.1
info:
  title: Identity Security Cloud API
  description: Use these APIs to interact with the Identity Security Cloud platform to achieve repeatable, automated processes with greater scalability. We encourage you to join the SailPoint Developer Community forum at https://developer.sailpoint.com/discuss to connect with other developers using our APIs.
  termsOfService: https://developer.sailpoint.com/discuss/tos
  contact:
    name: Developer Relations
    url: https://developer.sailpoint.com/discuss/api-help
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT
  version: v1
servers:
- url: https://{tenant}.api.identitynow.com
  description: This is the production API server.
  variables:
    tenant:
      default: sailpoint
      description: This is the name of your tenant, typically your company's name.
- url: https://{apiUrl}
  description: This is the versioned API server.
  variables:
    apiUrl:
      default: sailpoint.api.identitynow.com
      description: This is the api url of your tenant
security:
- userAuth:
  - "sp:scopes:all"
tags:
- name: Access Model Metadata
  description: >
    Use this API to create and manage metadata attributes for your Access Model.

    Access Model Metadata allows you to add contextual information to your ISC Access Model items using pre-defined
    metadata for risk, regulations, privacy levels, etc., or by creating your own metadata attributes to reflect the
    unique needs of your organization. This release of the API includes support for entitlement metadata. Support for
    role and access profile metadata will be introduced in a subsequent release.


    Common usages for Access Model metadata include:


    - Organizing and categorizing access items to make it easier for your users to search for and find the access
    rights they want to request, certify, or manage.


    - Providing richer information about access that is being acted on to allow stakeholders to make better decisions
    when approving, certifying, or managing access rights.


    - Identifying access that may requires additional approval requirements or be subject to more frequent review.
- name: Access Profiles
  description: >
    Use this API to implement and customize access profile functionality. 

    With this functionality in place, administrators can create access profiles and configure them for use throughout
    Identity Security Cloud, enabling users to get the access they need quickly and securely.


    Access profiles group entitlements, which represent access rights on sources. 


    For example, an Active Directory source in Identity Security Cloud can have multiple entitlements: the first,
    'Employees,' may represent the access all employees have at the organization, and a second, 'Developers,' may
    represent the access all developers have at the organization.


    An administrator can then create a broader set of access in the form of an access profile, 'AD Developers'
    grouping the 'Employees' entitlement with the 'Developers' entitlement.


    When users only need Active Directory employee access, they can request access to the 'Employees' entitlement.


    When users need both Active Directory employee and developer access, they can request access to the 'AD
    Developers' access profile.


    Identity Security Cloud uses access profiles in many features, including the following:


    - Provisioning: When you use the Provisioning Service, lifecycle states and roles both grant access to users in
    the form of access profiles.


    - Certifications: You can approve or revoke access profiles in certification campaigns, just like entitlements. 


    - Access Requests: You can assign access profiles to applications, and when a user requests access to the app
    associated with an access profile and someone approves the request, access is granted to both the application and
    its associated access profile.


    - Roles: You can group one or more access profiles into a role to quickly assign access items based on an
    identity's role. 


    In Identity Security Cloud, administrators can use the Access drop-down menu and select Access Profiles to view,
    configure, and delete existing access profiles, as well as create new ones. 

    Administrators can enable and disable an access profile, and they can also make the following configurations: 


    - Manage Entitlements: Manage the profile's access by adding and removing entitlements. 


    - Access Requests: Configure access profiles to be requestable and establish an approval process for any requests
    that the access profile be granted or revoked. 

    Do not configure an access profile to be requestable without first establishing a secure access request approval
    process for the access profile.


    - Multiple Account Options: Define the logic Identity Security Cloud uses to provision access to an identity with
    multiple accounts on the source. 


    Refer to [Managing Access Profiles](https://documentation.sailpoint.com/saas/help/access/access-profiles.html) for
    more information about access profiles.
- name: Access Request Approvals
  description: >
    Use this API to implement and customize access request approval functionality. 

    With this functionality in place, administrators can delegate qualified users to review users' requests for access
    or managers' requests to revoke team members' access to applications, entitlements, or roles.      

    This enables more qualified users to review access requests and the others to spend their time on other tasks.  


    In Identity Security Cloud, users can request access to applications, entitlements, and roles, and managers can
    request that team members' access be revoked.   

    For applications and entitlements, administrators can set access profiles to require approval from the access
    profile owner, the application owner, the source owner, the requesting user's manager, or a governance group for
    access to be granted or revoked.   

    For roles, administrators can also set roles to allow access requests and require approval from the role owner,
    the requesting user's manager, or a governance group for access to be granted or revoked.   

    If the administrator designates a governance group as the required approver, any governance group member can
    approve the requests.


    When a user submits an access request, Identity Security Cloud sends the first required approver in the queue an
    email notification, based on the access request configuration's approval and reminder escalation configuration.


    In Approvals in Identity Security Cloud, required approvers can view pending access requests under the Requested
    tab and approve or deny them, or the approvers can reassign the requests to different reviewers for approval.   

    If the required approver approves the request and is the only reviewer required, Identity Security Cloud grants or
    revokes access, based on the request.   

    If multiple reviewers are required, Identity Security Cloud sends the request to the next reviewer in the queue,
    based on the access request configuration's approval reminder and escalation configuration.   

    The required approver can then view any completed access requests under the Reviewed tab.   


    Refer to [Access Requests](https://documentation.sailpoint.com/saas/help/requests/index.html) for more information
    about access request approvals.
- name: Access Request Identity Metrics
  description: >
    Use this API to implement access request identity metrics functionality.

    With this functionality in place, access request reviewers can see relevant details about the requested access
    item and associated source activity. 

    This allows reviewers to see how many of the identities who share a manager with the access requester have this
    same type of access and how many of them have had activity in the related source. 

    This additional context about whether the access has been granted before and how often it has been used can help
    those approving access requests make more informed decisions.
- name: Access Requests
- name: Account Activities
  description: >
    Use this API to implement account activity tracking functionality.

    With this functionality in place, users can track source account activity in Identity Security Cloud, which
    greatly improves traceability in the system. 


    An account activity refers to a log of each action performed on a source account. This is useful for auditing the
    changes performed on an account throughout its life. 

    In Identity Security Cloud's Search, users can search for account activities and select the activity's row to get
    an overview of the activity's account action and view its progress, its involved sources, and its most basic
    metadata, such as the identity requesting the option and the recipient. 


    Account activity includes most actions Identity Security Cloud completes on source accounts. Users can search in
    Identity Security Cloud for the following account action types: 


    - Access Request: These include any access requests the source account is involved in. 


    - Account Attribute Updates: These include updates to a single attribute on an account on a source. 


    - Account State Update: These include locking or unlocking actions on an account on a source. 


    - Certification: These include actions removing an entitlement from an account on a source as a result of the
    entitlement's revocation during a certification.


    - Cloud Automated `Lifecyclestate`: These include automated lifecycle state changes that result in a source
    account's correlated identity being assigned to a different lifecycle state. 

    Identity Security Cloud replaces the `Lifecyclestate` variable with the name of the lifecycle state it has moved
    the account's identity to. 


    - Identity Attribute Update: These include updates to a source account's correlated identity attributes as the
    result of a provisioning action. 

    When you update an identity attribute that also updates an identity's lifecycle state, the cloud automated
    `Lifecyclestate` event also displays.

    Account Activity does not include attribute updates that occur as a result of aggregation.


    - Identity Refresh: These include correlated identity refreshes that occur for an account on a source whenever the
    account's correlated identity profile gets a new role or updates. 

    These also include refreshes that occur whenever Identity Security Cloud assigns an application to the account's
    correlated identity based on the application's being assigned to All Users From Source or Specific Users From
    Source. 


    - Lifecycle State Refresh: These include the actions that took place when a lifecycle state changed. This event
    only occurs after a cloud automated `Lifecyclestate` change or a lifecycle state change. 


    - Lifecycle State Change: These include the account activities that result from an identity's manual assignment to
    a null lifecycle state.


    - Password Change: These include password changes on sources.


    Refer to [Account Activity](https://documentation.sailpoint.com/saas/help/search/index.html#account-activity) for
    more information about account activities.
- name: Account Aggregations
  description: >
    Use this API to implement account aggregation progress tracking functionality.

    With this functionality in place, administrators can view in-progress account aggregations, their statuses, and
    their relevant details.


    An account aggregation refers to the process Identity Security Cloud uses to gather and load account data from a
    source into Identity Security Cloud.


    Whenever Identity Security Cloud is in the process of aggregating a source, it adds an entry to the Aggregation
    Activity Log, along with its relevant details.

    To view aggregation activity, administrators can select the Connections drop-down menu, select Sources, and select
    the relevant source, select its Import Data tab, and select Account Aggregation.

    In Account Aggregation, administrators can view the account aggregations' statuses and details in the Account
    Activity Log.


    Refer to [Loading Account Data](https://documentation.sailpoint.com/saas/help/accounts/loading_data.html) for more
    information about account aggregations.


    If you are looking for the endpoint for account aggregations in a source, [click
    here](https://developer.sailpoint.com/docs/api/v2025/import-accounts)
- name: Account Deletion Requests
- name: Account Usages
  description: >
    Use this API to implement account usage insight functionality.

    With this functionality in place, administrators can gather information and insights about how their tenants'
    source accounts are being used.

    This allows organizations to get the information they need to start optimizing and securing source account usage.
- name: Accounts
  description: >
    Use this API to implement and customize account functionality.

    With this functionality in place, administrators can manage users' access across sources in Identity Security
    Cloud. 


    In Identity Security Cloud, an account refers to a user's account on a supported source.

    This typically includes a unique identifier for the user, a unique password, a set of permissions associated with
    the source and a set of attributes. Identity Security Cloud loads accounts through the creation of sources in
    Identity Security Cloud.


    Administrators can correlate users' identities with the users' accounts on the different sources they use. 

    This allows Identity Security Cloud to govern the access of identities and all their correlated accounts securely
    and cohesively. 


    To view the accounts on a source and their correlated identities, administrators can use the Connections drop-down
    menu, select Sources, select the relevant source, and select its Account tab. 


    To view and edit source account statuses for an identity in Identity Security Cloud, administrators can use the
    Identities drop-down menu, select Identity List, select the relevant identity, and select its Accounts tab. 

    Administrators can toggle an account's Actions to aggregate the account, enable/disable it, unlock it, or remove
    it from the identity. 


    Accounts can have the following statuses: 


    - Enabled: The account is enabled. The user can access it.


    - Disabled: The account is disabled, and the user cannot access it, but the identity is not disabled in Identity
    Security Cloud. This can occur when an administrator disables the account or when the user's lifecycle state
    changes. 


    - Locked: The account is locked. This may occur when someone has entered an incorrect password for the account too
    many times.


    - Pending: The account is currently updating. This status typically lasts seconds. 


    Administrators can select the source account to view its attributes, entitlements, and the last time the account's
    password was changed.


    Refer to [Managing User
    Accounts](https://documentation.sailpoint.com/saas/help/accounts/identities.html?h=disabling+identities#managing-access)
    for more information about accounts.
- name: Api Usage
  description: >
    Use this API to retrieve metrics about an org's API usage.

    With this functionality in place, administrators can monitor the usage of APIs within a specified timespan, as
    well as a breakdown of commonly-used APIs sorted by number of requests.
- name: Application Discovery
  description: >
    Use this API to implement application discovery functionality. 

    With this functionality in place, you can discover applications within your Okta connector and receive connector
    recommendations by manually uploading application names.
- name: Approvals
  description: >
    Use this API to implement approval functionality. With this functionality in place, you can get generic approvals
    and modify them. 


    The main advantages this API has vs [Access Request
    Approvals](https://developer.sailpoint.com/docs/api/v2025/access-request-approvals) are that you can use it to get
    generic approvals individually or in batches and make changes to those approvals. 
- name: Apps
  description: |
    Use this API to implement source application functionality. 
    With this functionality in place, you can create, customize, and manage applications within sources.
- name: Auth Profile
  description: >
    Use this API to implement Auth Profile functionality. 

    With this functionality in place, users can read authentication profiles and make changes to them. 


    An authentication profile represents an identity profile's authentication configuration. 

    When the identity profile is created, its authentication profile is also created. 

    An authentication profile includes information like its authentication profile type (`BLOCK`, `MFA`, `NON_PTA`,
    PTA`) and settings controlling whether or not it blocks access from off network or untrusted geographies. 
- name: Auth Users
  description: >
    Use this API to implement user authentication system functionality. 

    With this functionality in place, users can get a user's authentication system details, including their
    capabilities, and modify those capabilities. 

    The user's capabilities refer to their access to different systems, or authorization, within the tenant, like
    access to certifications (CERT_ADMIN) or reports (REPORT_ADMIN). 

    These capabilities also determine a user's access to the different APIs. 

    This API provides users with a way to determine a user's access and make quick and easy changes to that access. 
- name: Branding
  description: >
    Use this API to implement and customize branding functionality. 

    With this functionality in place, administrators can get and manage existing branding items, and they can also
    create new branding items and configure them for use throughout Identity Security Cloud. 

    The Branding APIs provide administrators with a way to customize branding items. 

    This customization includes details like their colors, logos, and other information. 

    Refer to [Certifications](https://documentation.sailpoint.com/saas/user-help/certs/reviewing/index.html) for more
    information about certifications.
- name: Certification Campaign Filters
  description: >
    Use this API to implement the certification campaign filter functionality. These filters can be used to create a
    certification campaign that includes a subset of your entitlements or users to certify.


    For example, if for a certification campaign an organization wants to certify only specific users or entitlements,
    then those can be included/excluded on the basis of campaign filters.


    For more information about creating a campaign filter, refer to [Creating a Campaign
    Filter](https://documentation.sailpoint.com/saas/help/certs/campaign_filters.html#creating-a-campaign-filter)


    You can create campaign filters using any of the following criteria types:


    - Access Profile : This criteria type includes or excludes access profiles from a campaign.


    - Account Attribute : This criteria type includes or excludes certification items that match a specified value in
    an account attribute.


    - Entitlement : This criteria type includes or excludes entitlements from a campaign.


    - Identity : This criteria type includes or excludes specific identities from your campaign.


    - Identity Attribute : This criteria type includes or excludes identities based on whether they have an identity
    attribute that matches criteria you've chosen.


    - Role : This criteria type includes or excludes roles, as opposed to identities.


    - Source : This criteria type includes or excludes entitlements from a source you select.


    For more information about these criteria types, refer to [Types of Campaign
    Filters](https://documentation.sailpoint.com/saas/help/certs/campaign_filters.html#types-of-campaign-filters)


    Once the campaign filter is created, it can be linked while creating the campaign. The generated campaign will
    have the items to review as per the campaign filter.


    For example, An inclusion campaign filter is created with a source of Source 1, an operation of Equals, and an
    entitlement of Entitlement 1. When this filter is selected, only users who have Entitlement 1 are included in the
    campaign, and only Entitlement 1 is shown in the certification.
- name: Certification Campaigns
  description: >
    Use this API to implement certification campaign functionality.

    With this functionality in place, administrators can create, customize, and manage certification campaigns for
    their organizations' use. 

    Certification campaigns provide Identity Security Cloud users with an interactive review process they can use to
    identify and verify access to systems. 

    Campaigns help organizations reduce risk of inappropriate access and satisfy audit requirements. 


    A certification refers to Identity Security Cloud's mechanism for reviewing a user's access to entitlements (sets
    of permissions) and approving or removing that access. 

    These certifications serve as a way of showing that a user's access has been reviewed and approved. 

    Multiple certifications by different reviewers are often required to approve a user's access. 

    A set of multiple certifications is called a certification campaign. 


    For example, an organization may use a Manager Certification campaign as a way of showing that a user's access has
    been reviewed and approved by multiple managers. 

    Once this campaign has been completed, Identity Security Cloud would provision all the access the user needs,
    nothing more. 


    Identity Security Cloud provides two simple campaign types users can create without using search queries, Manager
    and Source Owner campaigns:


    You can create these types of campaigns without using any search queries in Identity Security Cloud: 


    - ManagerCampaign: Identity Security Cloud provides this campaign type as a way to ensure that an identity's
    access is certified by their managers. 

    You only need to provide a name and description to create one. 


    - Source Owner Campaign: Identity Security Cloud provides this campaign type as a way to ensure that an identity's
    access to a source is certified by its source owners. 

    You only need to provide a name and description to create one. 

    You can specify the sources whose owners you want involved or just run it across all sources. 


    For more information about these campaign types, refer to [Starting a Manager or Source Owner
    Campaign](https://documentation.sailpoint.com/saas/help/certs/starting_campaign.html).


    One useful way to create certification campaigns in Identity Security Cloud is to use a specific search and then
    run a campaign on the results returned by that search. 

    This allows you to be much more specific about whom you are certifying in your campaigns and what access you are
    certifying in your campaigns. 

    For example, you can search for all identities who are managed by "Amanda.Ross" and also have the access to the
    "Accounting" role and then run a certification campaign based on that search to ensure that the returned
    identities are appropriately certified. 


    You can use Identity Security Cloud search queries to create these types of campaigns: 


    - Identities: Use this campaign type to review and revoke access items for specific identities. 

    You can either build a search query and create a campaign certifying all identities returned by that query, or you
    can search for individual identities and add those identities to the certification campaign. 


    - Access Items: Use this campaign type to review and revoke a set of roles, access profiles, or entitlements from
    the identities that have them. 

    You can either build a search query and create a campaign certifying all access items returned by that query, or
    you can search for individual access items and add those items to the certification campaign. 


    - Role Composition: Use this campaign type to review a role's composition, including its title, description, and
    membership criteria. 

    You can either build a search query and create a campaign certifying all roles returned by that query, or you can
    search for individual roles and add those roles to the certification campaign. 


    - Uncorrelated Accounts: Use this campaign type to certify source accounts that aren't linked to an authoritative
    identity in Identity Security Cloud. 

    You can use this campaign type to view all the uncorrelated accounts for a source and certify them. 


    For more information about search-based campaigns, refer to [Starting a Campaign from
    Search](https://documentation.sailpoint.com/saas/help/certs/starting_search_campaign.html).


    Once you have generated your campaign, it becomes available for preview. 

    An administrator can review the campaign and make changes, or if it's ready and accurate, activate it. 


    Once the campaign is active, organization administrators or certification administrators can designate other
    Identity Security Cloud users as certification reviewers. 

    Those reviewers can view any of the certifications they either need to review (active) or have already reviewed
    (completed).


    When a certification campaign is in progress, certification reviewers see the listed active certifications whose
    involved identities they can review. 

    Reviewers can then make decisions to grant or revoke access, as well as reassign the certification to another
    reviewer. If the reviewer chooses this option, they must provide a reason for reassignment in the form of a
    comment.


    Once a reviewer has made decisions on all the certification's involved access items, he or she must "Sign Off" to
    complete the review process.

    Doing so converts the certification into read-only status, preventing any further changes to the review decisions
    and deleting the work item (task) from the reviewer's list of work items. 


    Once all the reviewers have signed off, the certification campaign either completes or, if any reviewers decided
    to revoke access for any of the involved identities, it moves into a remediation phase. 

    In the remediation phase, identities' entitlements are altered to remove any entitlements marked for revocation.

    In this situation, the certification campaign completes once all the remediation requests are completed. 


    The end of a certification campaign is determined by its deadline, its completion status, or by an administrator's
    decision. 


    For more information about certifications and certification campaigns, refer to
    [Certifications](https://documentation.sailpoint.com/saas/user-help/certs/reviewing/index.html).
- name: Certification Summaries
  description: >
    Use this API to implement certification summary functionality. 

    With this functionality in place, administrators and designated certification reviewers can review summaries of
    identity certification campaigns and draw conclusions about the campaigns' scope, security, and effectiveness. 

    Implementing certification summary functionality improves organizations' ability to review their
    [certifications](https://documentation.sailpoint.com/saas/user-help/certs/reviewing/index.html) and helps them
    satisfy audit and regulatory requirements by enabling them to trace access changes and the decisions made in their
    review processes. 


    A certification refers to Identity Security Cloud's mechanism for reviewing a user's access to entitlements (sets
    of permissions) and approving or removing that access. 

    These certifications serve as a way of showing that a user's access has been reviewed and approved. 

    Multiple certifications by different reviewers are often required to approve a user's access. 

    A set of multiple certifications is called a certification campaign. 


    For example, an organization may use a Manager Certification as a way of showing that a user's access has been
    reviewed and approved by their manager, or if the certification is part of a campaign, that the user's access has
    been reviewed and approved by multiple managers. 

    Once this certification has been completed, Identity Security Cloud  would provision all the access the user
    needs, nothing more. 


    Certification summaries provide information about identity certification campaigns such as the identities
    involved, the number of decisions made, and the access changed. 

    For example, an administrator or designated certification reviewer can examine the Manager Certification campaign
    to get an overview of how many entitlement decisions are made in that campaign as opposed to role decisions, which
    identities would be affected by changes to the campaign, and how those identities' access would be affected.
- name: Certifications
  description: >
    Use this API to implement certification functionality. 

    With this functionality in place, administrators and designated certification reviewers can review users' access
    certifications and decide whether to approve access, revoke it, or reassign the review to another reviewer. 

    Implementing certifications improves organizations' data security by reducing inappropriate access through a
    distributed review process and helping them satisfy audit and regulatory requirements. 


    A certification refers to Identity Security Cloud's mechanism for reviewing a user's access to entitlements (sets
    of permissions) and approving or removing that access. 

    These serve as a way of showing that a user's access has been reviewed and approved. 

    Multiple certifications by different reviewers are often required to approve a user's access. 

    A set of multiple certifications is called a certification campaign.


    For example, an organization may use a Manager Certification as a way of showing that a user's access has been
    reviewed and approved by their manager, or if the certification is part of a campaign, that the user's access has
    been reviewed and approved by multiple managers. 

    Once this certification has been completed, Identity Security Cloud  would provision all the access the user
    needs, nothing more. 


    Organization administrators or certification administrators can designate other Identity Security Cloud users as
    certification reviewers. 

    Those reviewers can select the 'Certifications' tab to view any of the certifications they either need to review
    or have already reviewed under the 'Active' and 'Completed' tabs, respectively. 


    When a certification campaign is in progress, certification reviewers will see certifications listed under
    'Active,' where they can review the involved identities. 

    Under the 'Decision' column on the right, next to each access item, reviewers can select the checkmark to approve
    access, select the 'X' to revoke access, or they can toggle the 'More Options' menu to reassign the certification
    to another reviewer and provide a reason for reassignment in the form of a comment. 


    Once a reviewer has made decisions on all the certification's involved access items, he or she must select 'Sign
    Off' to complete the review process.

    Doing so converts the certification into read-only status, preventing any further changes to the review decisions
    and deleting the work item (task) from the reviewer's list of work items. 


    Once all the reviewers have signed off, the certification campaign either completes or, if any reviewers decided
    to revoke access for any of the involved identities, it moves into a remediation phase. In the remediation phase,
    identities' entitlements are altered to remove any entitlements marked for revocation.

    In this situation, the certification campaign completes once all the remediation requests are completed.
- name: Classify Source
- name: Configuration Hub
  description: >
    Use this API to implement and customize configuration settings management. With this functionality, you can access
    the Configuration Hub actions and build your own automated pipeline for Identity Security Cloud configuration
    change delivery and deployment.


    Common usages for Configuration Hub includes:


    - Upload configuration file - Configuration files can be managed and deployed using Configuration Hub by uploading
    a JSON file which contains configuration data.

    - Manage object mapping - Create rules to map and substitute attributes when migrating configurations.

    - Manage backups for configuration settings

    - Manage configuration drafts

    - Upload configurations and manage object mappings between tenants.


    Refer to [Using the SailPoint Configuration
    Hub](https://documentation.sailpoint.com/saas/help/confighub/config_hub.html) for more information about
    Configuration Hub.
- name: Connector Customizers
  description: >
    Saas Connectivity Customizers are cloud-based connector customizers. The customizers allow you to customize the
    out of the box connectors in a similar way to how you can use rules to customize VA (virtual appliance) based
    connectors.


    Use these APIs to implement connector customizers functionality.
- name: Connector Rule Management
  description: >
    Use this API to implement connector rule management functionality. 

    With this functionality in place, administrators can implement connector-executed rules in a programmatic,
    scalable way. 


    In Identity Security Cloud (ISC), [rules](https://developer.sailpoint.com/docs/extensibility/rules) serve as a
    flexible configuration framework you can leverage to perform complex or advanced configurations. 

    [Connector-executed rules](https://developer.sailpoint.com/docs/extensibility/rules/connector-rules) are rules
    that are executed in the ISC virtual appliance (VA), usually extensions of the
    [connector](https://documentation.sailpoint.com/connectors/isc/landingpages/help/landingpages/isc_landing.html)
    itself, the bridge between the data source and ISC. 


    This API allows administrators to view existing connector-executed rules, make changes to them, delete them, and
    create new ones from the available types.
- name: Connectors
  description: >
    Use this API to implement connector functionality.

    With this functionality in place, administrators can view available connectors.


    Connectors are the bridges Identity Security Cloud uses to communicate with and aggregate data from sources.

    For example, if it is necessary to set up a connection between Identity Security Cloud and the Active Directory
    source, a connector can bridge the two and enable Identity Security Cloud to synchronize data between the systems.

    This ensures account entitlements and states are correct throughout the organization.


    In Identity Security Cloud, administrators can use the Connections drop-down menu and select Sources to view the
    available source connectors.


    Refer to [Identity Security Cloud
    Connectors](https://documentation.sailpoint.com/connectors/identitynow/landingpages/help/landingpages/identitynow_connectivity_landing.html)
    for more information about the connectors available in Identity Security Cloud.


    Refer to [SaaS Connectivity](https://developer.sailpoint.com/docs/connectivity/saas-connectivity/) for more
    information about the SaaS custom connectors that do not need VAs (virtual appliances) to communicate with their
    sources.


    Refer to [Managing Sources](https://documentation.sailpoint.com/saas/help/sources/index.html) for more information
    about using connectors in Identity Security Cloud.
- name: Custom Forms
  description: >
    Use this API to build and manage custom forms.

    With this functionality in place, administrators can create and view form definitions and form instances.


    Forms are composed of sections and fields. Sections split the form into logical groups of fields and fields are
    the data collection points within the form. Configure conditions to modify elements of the form as the responder
    provides input. Create form inputs to pass information from a calling feature, like a workflow, to your form.


    Forms can be used within workflows as an action or as a trigger. The Form Action allows you to assign a form as a
    step in a running workflow, suspending the workflow until the form is submitted or times out, and the workflow
    resumes. The Form Submitted Trigger initiates a workflow when a form is submitted. The trigger can be configured
    to initiate on submission of a full form, a form element with any value, or a form element with a particular
    value.


    Refer to [Forms](https://documentation.sailpoint.com/saas/help/forms/index.html) for more information about using
    forms in Identity Security Cloud.
- name: Custom Password Instructions
  description: >
    Use this API to implement custom password instruction functionality.

    With this functionality in place, administrators can create custom password instructions to help users reset their
    passwords, change them, unlock their accounts, or recover their usernames.

    This allows administrators to emphasize password policies or provide organization-specific instructions.


    Administrators must first use [Update Password Org
    Config](https://developer.sailpoint.com/docs/api/v2025/put-password-org-config/) to set
    `customInstructionsEnabled` to `true`.


    Once they have enabled custom instructions, they can use [Create Custom Password
    Instructions](https://developer.sailpoint.com/docs/api/v2025/create-custom-password-instructions/) to create
    custom page content for the specific pageId they select.


    For example, an administrator can use the pageId forget-username:user-email to set the custom text for the case
    when users forget their usernames and must enter their emails.


    Refer to [Creating Custom Instruction
    Text](https://documentation.sailpoint.com/saas/help/pwd/pwd_reset.html#creating-custom-instruction-text) for more
    information about creating custom password instructions.
- name: Custom User Levels
  description: >
    Use this API to implement custom user level functionality.

    With this functionality in place, administrators can create custom user levels and configure them for use
    throughout Identity Security Cloud.


    Custom user levels allow administrators to create custom user levels that can be used to control access to
    Identity Security Cloud features and APIs.


    Refer to [User Levels](https://documentation.sailpoint.com/saas/help/common/users/index.html) for more information
    about User Levels.
- name: Data Access Security
  description: >
    Use this API to enable data ownership election campaigns, assign resource owners, and respond to identity
    lifecycle events to maintain continuous accountability.

    This API can also trigger and manage DAS tasks such as scans-starting them on demand, updating configurations or
    schedules, and retrieving statuses. Additionally, you can onboard and manage applications at scale by creating and
    configuring them, setting scanning schedules, retrieving metadata, and associating them with Virtual Appliances
    and Identity Collectors.
- name: Data Segmentation
  description: |
    This service is responsible for creating segments that will determine how access is delegated to identities
    withing the organization.
- name: Declassify Source
- name: Dimensions
  description: >-
    Use this API to implement and customize dynamic role functionality. With this functionality in place,
    administrators can create dimensions and configure them for use throughout Identity Security Cloud. Identity
    Security Cloud can use established criteria to automatically assign the dimensions to qualified users. This
    enables users to get all the access they need quickly and securely and administrators to spend their time on other
    tasks. Entitlements represent the most granular level of access in Identity Security Cloud.

    Access profiles represent the next level and often group entitlements. Dimension represent access selectively
    based on the evaluation of contextual information that is available or provided. Each Dimension include context
    attributes and access selection expressions which map criteria to access right assignments. Each dimension can
    contain up to 5 context attributes. Dynamic Access Roles represent the broadest level of access and often group
    access profiles ,entitlements and dimensions.Each Dynamic Access Role may contain one or more Dimensions.
- name: Entitlements
- name: Global Tenant Security Settings
  description: |
    Use this API to implement and customize global tenant security settings.
    With this functionality in place, administrators can manage the global security settings that a tenant/org has.
    This API can be used to configure the networks and Geographies allowed to access Identity Security Cloud URLs.
- name: Governance Groups
  description: >
    Use this API to implement and customize Governance Group functionality. With this functionality in place,
    administrators can create Governance Groups and configure them for use throughout Identity Security Cloud.


    A governance group is a group of users that can make governance decisions about access. If your organization has
    the Access Request or Certifications service, you can configure governance groups to review access requests or
    certifications. A governance group can determine whether specific access is appropriate for a user.


    Refer to [Creating and Managing Governance
    Groups](https://documentation.sailpoint.com/saas/help/common/users/governance_groups.html) for more information
    about how to build Governance Groups in the visual builder in the Identity Security Cloud UI.
- name: IAI Access Request Recommendations
- name: IAI Common Access
- name: IAI Outliers
- name: IAI Peer Group Strategies
- name: IAI Recommendations
- name: IAI Role Mining
- name: Icons
  description: >
    Use this API to implement functionality related to object icons (application icons for example). 

    With this functionality in place, administrators can set or remove an icon for specific object type for use
    throughout Identity Security Cloud.
- name: Identities
  description: >
    Use this API to implement identity functionality.

    With this functionality in place, administrators can synchronize an identity's attributes with its various source
    attributes.


    Identity Security Cloud uses identities as users' authoritative accounts. Identities can own other accounts,
    entitlements, and attributes.


    An identity has a variety of attributes, such as an account name, an email address, a job title, and more.

    These identity attributes can be correlated with different attributes on different sources.

    For example, the identity John.Smith can own an account in the GitHub source with the account name John-Smith-Org,
    and Identity Security Cloud knows they are the same person with the same access and attributes.


    In Identity Security Cloud, administrators often set up these synchronizations to get triggered automatically with
    a change or to run on a schedule.

    To manually synchronize attributes for an identity, administrators can use the Identities drop-down menu and
    select Identity List to view the list of identities.

    They can then select the identity they want to manually synchronize and use the hamburger menu to select
    'Synchronize Attributes.'

    Doing so immediately begins the attribute synchronization and analyzes all accounts for the selected identity.


    Refer to [Synchronizing Attributes](https://documentation.sailpoint.com/saas/help/provisioning/attr_sync.html) for
    more information about synchronizing attributes.
- name: Identity Attributes
- name: Identity History
- name: Identity Profiles
  description: >
    Use this API to implement identity profile functionality. 

    With this functionality in place, administrators can view identity profiles and their configurations. 


    Identity profiles represent the configurations that can be applied to identities as a way of granting them a set
    of security and access, as well as defining the mappings between their identity attributes and their source
    attributes.  


    In Identity Security Cloud, administrators can use the Identities drop-down menu and select Identity Profiles to
    view the list of identity profiles. 

    This list shows some details about each identity profile, along with its status. 

    They can select an identity profile to view its settings, its mappings between identity attributes and correlating
    source account attributes, and its provisioning settings. 


    Refer to [Creating Identity Profiles](https://documentation.sailpoint.com/saas/help/setup/identity_profiles.html)
    for more information about identity profiles.
- name: Intelligence Package
  description: |
    Read-only HTTP API that returns the Intelligence Package (identity context)
    for SecOps enrichment use cases (SIEM/SOAR connectors, MCP, browser
    extension). Backed by Atlas internal-REST calls to MICE, Shelby List Accounts,
    SDS Search, IDA-outliers, and identity-history.
- name: JIT Access
  description: >
    Use these APIs to configure JIT provisioning activation policy for the tenant.

    OAuth scopes: **idn:jit-policy:read** and **idn:jit-policy:manage** (get config), **idn:jit-policy:update** and
    **idn:jit-policy:manage** (update config). JIT activation workflow APIs use **idn:jit-activation-workflow:***
    scopes (activate, extend, deactivate, manage, and **idn:jit-activation-workflow-internal:manage**).

    For REST contract details, use the JIT Access operations in this specification and the [SailPoint API
    documentation](https://developer.sailpoint.com/idn/api/).
- name: JIT Activations
  description: |
    Use this API to start and manage Just-In-Time (JIT) Privileged activation workflows for entitlement connections.
- name: Lifecycle States
  description: >
    Use this API to implement and customize lifecycle state functionality.

    With this functionality in place, administrators can create and configure custom lifecycle states for use across
    their organizations, which is key to controlling which users have access, when they have access, and the access
    they have.


    A lifecycle state describes a user's status in a company. For example, two lifecycle states come by default with
    Identity Security Cloud: 'Active' and 'Inactive.' 

    When an active employee takes an extended leave of absence from a company, his or her lifecycle state may change
    to 'Inactive,' for security purposes. 

    The inactive employee would lose access to all the applications, sources, and sensitive data during the leave of
    absence, but when the employee returns and becomes active again, all that access would be restored. 

    This saves administrators the time that would otherwise be spent provisioning the employee's access to each
    individual tool, reviewing the employee's certification history, etc. 


    Administrators can create a variety of custom lifecycle states. Refer to [Planning New Lifecycle
    States](https://documentation.sailpoint.com/saas/help/provisioning/lifecycle.html#planning-new-lifecycle-states)
    for some custom lifecycle state ideas.


    Administrators must define the criteria for being in each lifecycle state, and they must define how Identity
    Security Cloud manages users' access to apps and sources for each lifecycle state.


    In Identity Security Cloud, administrators can manage lifecycle states by going to Admin > Identities > Identity
    Profile, selecting the identity profile whose lifecycle states they want to manage, selecting the 'Provisioning'
    tab, and using the left panel to either select the lifecycle state they want to modify or create a new lifecycle
    state. 


    In the 'Provisioning' tab, administrators can make the following access changes to an identity profile's lifecycle
    state: 


    - Enable/disable the lifecycle state for the identity profile.


    - Enable/disable source accounts for the identity profile's lifecycle state.


    - Add existing access profiles to grant to the identity profiles in that lifecycle state.


    - Create a new access profile to grant to the identity profile in that lifecycle state.


    Access profiles granted in a previous lifecycle state are automatically revoked when the identity moves to a new
    lifecycle state. 

    To maintain access across multiple lifecycle states, administrators must grant the access profiles in each
    lifecycle state. 

    For example, if an administrator wants users with the 'HR Employee' identity profile to maintain their building
    access in both the 'Active' and 'Leave of Absence' lifecycle states, the administrator must grant the access
    profile for that building access to both lifecycle states.


    During scheduled refreshes, Identity Security Cloud evaluates lifecycle states to determine whether their assigned
    identities have the access defined in the lifecycle states' access profiles. 

    If the identities are missing access, Identity Security Cloud provisions that access. 


    Administrators can also use the 'Provisioning' tab to configure email notifications for Identity Security Cloud to
    send whenever an identity with that identity profile has a lifecycle state change. 

    Refer to [Configuring Lifecycle State
    Notifications](https://documentation.sailpoint.com/saas/help/provisioning/lifecycle.html#configuring-lifecycle-state-notifications)
    for more information on how to do so.


    An identity's lifecycle state can have four different statuses: the lifecycle state's status can be 'Active,' it
    can be 'Not Set,' it can be 'Not Valid,' or it 'Does Not Match Technical Name Case.' 

    Refer to [Moving Identities into Lifecycle
    States](https://documentation.sailpoint.com/saas/help/provisioning/lifecycle.html#moving-identities-into-lifecycle-states)
    for more information about these different lifecycle state statuses. 


    Refer to [Setting Up Lifecycle States](https://documentation.sailpoint.com/saas/help/provisioning/lifecycle.html)
    for more information about lifecycle states.
- name: Machine Account Classify
- name: Machine Account Creation Request
  description: |
    Use this API to submit and retrieve machine account creation requests.
- name: Machine Account Mappings
- name: Machine Account Subtypes
  description: |
    Use this API to get, update, and delete machine account subtype for sources.
