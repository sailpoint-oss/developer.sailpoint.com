- name: Machine Classification Config
- name: Machine Identities
- name: Managed Clients
  description: >
    Use this API to implement managed client functionality. 

    With this functionality in place, administrators can modify and delete existing managed clients, create new ones,
    and view and make changes to their log configurations.
- name: Managed Cluster Types
  description: >
    Use this API to implement managed cluster types functionality. 

    With this functionality in place, administrators can modify and delete existing managed cluster types and create
    new ones.
- name: Managed Clusters
  description: >
    Use this API to implement managed cluster functionality. 

    With this functionality in place, administrators can modify and delete existing managed clients, get their
    statuses, and create new ones. 
- name: MFA Configuration
  description: Configure and test multifactor authentication (MFA) methods
- name: Multi-Host Integration
  description: >
    Use this API to build a Multi-Host Integration.

    Multi-Host Integration will help customers to configure and manage similar type of target system in Identity
    Security Cloud.

    In Identity Security Cloud, administrators can create a Multi-Host Integration by going to Admin > Connections >
    Multi-Host Sources and selecting 'Create.'
- name: Non-Employee Lifecycle Management
  description: >
    Use this API to implement non-employee lifecycle management functionality. 

    With this functionality in place, administrators can create non-employee records and configure them for use in
    their organizations. 

    This allows organizations to provide secure access to non-employees and control that access. 


    The 'non-employee' term refers to any consultant, contractor, intern, or other user in an organization who is not
    a full-time permanent employee. 

    Organizations can track non-employees' access and activity in Identity Security Cloud by creating and maintaining
    non-employee sources. 

    Organizations can have a maximum of 50 non-employee sources. 


    By using SailPoint's Non-Employee Lifecycle Management functionality, you agree to the following:


    - SailPoint is not responsible for storing sensitive data. 

    You may only add account attributes to non-employee identities that are necessary for business operations and are
    consistent with your contractual limitations on data that may be sent or stored in Identity Security Cloud.


    - You are responsible for regularly downloading your list of non-employee accounts for all the sources you create
    and storing this list of accounts in a managed location to maintain an authoritative system of record and backup
    data for these accounts.


    To manage non-employees in Identity Security Cloud, administrators must create a non-employee source and add
    accounts to the source. 


    To create a non-employee source in Identity Security Cloud, administrators must use the Admin panel to go to
    Connections > Sources.

    They must then specify 'Non-Employee' in the 'Source Type' field. 

    Refer to [Creating a Non-Employee
    Source](https://documentation.sailpoint.com/saas/help/common/non-employee-mgmt.html#creating-a-non-employee-source)
    for more details about how to create non-employee sources.


    To add accounts to a non-employee source in Identity Security Cloud, administrators can select the non-employee
    source and add the accounts. 

    They can also use the 'Manage Non-Employees' widget on their user dashboards to reach the list of sources and then
    select the non-employee source they want to add the accounts to. 


    Administrators can either add accounts individually or in bulk. Each non-employee source can have a maximum of
    20,000 accounts. 

    To add accounts in bulk, they must select the 'Bulk Upload' option and upload a CSV file. 

    Refer to [Adding
    Accounts](https://documentation.sailpoint.com/saas/help/common/non-employee-mgmt.html#adding-accounts) for more
    details about how to add accounts to non-employee sources.


    Once administrators have created the non-employee source and added accounts to it, they can create identity
    profiles to generate identities for the non-employee accounts and manage the non-employee identities the same way
    they would any other identities. 


    Refer to [Managing Non-Employee Sources and
    Accounts](https://documentation.sailpoint.com/saas/help/common/non-employee-mgmt.html) for more information about
    non-employee lifecycle management.
- name: Notifications
- name: OAuth Clients
  description: >
    Use this API to implement OAuth client functionality.   

    With this functionality in place, users with the appropriate security scopes can create and configure OAuth
    clients to use as a way to obtain authorization to use the Identity Security Cloud REST API.

    Refer to [Authentication](https://developer.sailpoint.com/docs/api/authentication/) for more information about
    OAuth and how it works with the Identity Security Cloud REST API.
- name: Org Config
  description: |
    Use this API to implement organization configuration functionality. 
    Administrators can use this functionality to manage organization settings, such as time zones. 
- name: Parameter Storage
  description: >
    The Parameter Storage is SailPoint's centralized repository for authentication, authorization, and connection
    configurations, stored as typed Parameters.


    The APIs can be used to input Parameters, which can then be referenced by other services, such as Workflow
    configurations. When these services are executed, the relevant values are fetched via an internal API (not
    documented here).


    The usage of Parameters can be monitored via References managed by Parameter Storage. References provide an
    indirect mapping between a Parameter and its usage (e.g., within a Workflow), allowing for reports such as
    "Parameter X is used in Workflow Y" via APIs.


    A Parameter is a named instance of typed configuration, where the state is stored as Fields. These Fields are
    either Public (cleartext, searchable) or Private (encrypted).


    Parameter Types are grouped and fall into three Categories: Authentication, Authorization, and Connection.


    Parameters are strongly typed; each Type's fields are named and exposed to the consumer. This means that if a
    service states that it expects a Credential Type, it will receive a Parameter with a Username and Password.


    Fields are named, typed variables within a Parameter; the Fields on a Parameter depend on the Parameter's Type.
    Fields contain customer-provided data that will be referenced by another service, and their typing determines
    whether they're stored in cleartext or encrypted.


    The Specification documents the supported Categories, Types, Fields, Field Names, and their relationships.


    A Reference is an indirect pointer to a Parameter, where each usage of a Parameter has a corresponding Reference.
    This allows for usage tracking and safe deletion.
- name: Password Configuration
  description: >
    Use this API to implement organization password configuration functionality. 

    With this functionality in place, organization administrators can create organization-specific password
    configurations. 


    These configurations include details like custom password instructions, as well as digit token length and
    duration. 


    Refer to [Configuring User Authentication for Password
    Resets](https://documentation.sailpoint.com/saas/help/pwd/pwd_reset.html) for more information about organization
    password configuration functionality.
- name: Password Dictionary
  description: >
    Use this API to implement password dictionary functionality.  

    With this functionality in place, administrators can create password dictionaries to prevent users from using
    certain words or characters in their passwords. 


    A password dictionary is a list of words or characters that users are prevented from including in their
    passwords. 

    This can help protect users from themselves and force them to create passwords that are not easy to break. 


    A password dictionary must meet the following requirements to for the API to handle them correctly: 


    - It must be in .txt format.


    - All characters must be UTF-8 characters. 


    - Each line must contain a single word or character with no spaces or whitespace characters.


    - It must contain at least one line other than the locale string.


    - Each line must not exceed 128 characters.


    - The file must not exceed 2500 lines. 


    Administrators should also consider the following when they create their dictionaries: 


    - Lines starting with a # represent comments.


    - All words in the password dictionary are case-insensitive. 

    For example, adding the word "password" to the dictionary also disallows the following: PASSWORD, Password, and
    PassWord.


    - The dictionary uses substring matching. 

    For example, adding the word "spring" to the dictionary also disallows the following: Spring124, 345SprinG, and
    8spring.

    Users can then select 'Change Password' to update their passwords. 


    Administrators must do the following to create a password dictionary: 


    - Create the text file that will contain the prohibited password values.


    - If the dictionary is not in English, they must add a locale string to the top line:
    locale:`languageCode`_`countryCode`


    The languageCode value refers to the language's 2-letter ISO 639-1 code.

    The countryCode value refers to the country's 2-letter ISO 3166-1 code.


    Refer to this list https://docs.oracle.com/cd/E13214_01/wli/docs92/xref/xqisocodes.html to see all the available
    ISO 639-1 language codes and ISO 3166-1 country codes.


    - Upload the .txt file to Identity Security Cloud with [Update Password
    Dictionary](https://developer.sailpoint.com/docs/api/v2025/put-password-dictionary). Uploading a new file always
    overwrites the previous dictionary file.


    Administrators can then specify which password policies check new passwords against the password dictionary by
    doing the following: In the Admin panel, they can use the Password Mgmt dropdown menu to select Policies, select
    the policy, and select the 'Prevent use of words in this site's password dictionary' checkbox beside it.


    Refer to [Configuring Advanced Password Management
    Options](https://documentation.sailpoint.com/saas/help/pwd/adv_config.html) for more information about password
    dictionaries.
- name: Password Management
  description: >
    Use this API to implement password management functionality.  

    With this functionality in place, users can manage their identity passwords for all their applications.


    In Identity Security Cloud, users can select their names in the upper right corner of the page and use the
    drop-down menu to select Password Manager. 

    Password Manager lists the user's identity's applications, possibly grouped to share passwords. 

    Users can then select 'Change Password' to update their passwords. 


    Grouping passwords allows users to update their passwords more broadly, rather than requiring them to update each
    password individually. 

    Password Manager may list the applications and sources in the following groups:


    - Password Group: This refers to a group of applications that share a password. 

    For example, a user can use the same password for Google Drive, Google Mail, and YouTube. 

    Updating the password for the password group updates the password for all its included applications.


    - Multi-Application Source: This refers to a source with multiple applications that share a password. 

    For example, a user can have a source, G Suite, that includes the Google Calendar, Google Drive, and Google Mail
    applications. 

    Updating the password for the multi-application source updates the password for all its included applications. 


    - Applications: These are applications that do not share passwords with other applications.


    An organization may require some authentication for users to update their passwords. 

    Users may be required to answer security questions or use a third-party authenticator before they can confirm
    their updates. 


    Refer to [Managing Passwords](https://documentation.sailpoint.com/saas/user-help/accounts/passwords.html) for more
    information about password management.
- name: Password Policies
  description: >
    Use these APIs to implement password policies functionality.

    These APIs allow you to define the policy parameters for choosing passwords.


    IdentityNow comes with a default policy that you can modify to define the password requirements your users must
    meet to log in to IdentityNow, such as requiring a minimum password length, including special characters, and
    disallowing certain patterns.

    If you have licensed Password Management, you can create additional password policies beyond the default one to
    manage passwords for supported sources in your org.


    In the Identity Security Cloud Admin panel, administrators can use the Password Mgmt dropdown menu to select Sync
    Groups.

    Refer to [Managing Password
    Policies](https://documentation.sailpoint.com/saas/help/pwd/pwd_policies/pwd_policies.html) for more information
    about password policies.
- name: Password Sync Groups
  description: >
    Use this API to implement password sync group functionality. 

    With this functionality in place, administrators can group sources into password sync groups so that all their
    applications share the same password. 

    This allows users to update the password for all the applications in a sync group if they want, rather than
    updating each password individually. 


    A password sync group is a group of applications that shares a password. 

    Administrators create these groups by grouping the applications' sources. 

    For example, an administrator can group the ActiveDirectory, GitHub, and G Suite sources together so that all
    those sources' applications can also be grouped to share a password. 

    A user can then update his or her password for ActiveDirectory, GitHub, Gmail, Google Drive, and Google Calendar
    all at once, rather then updating each one individually.


    The following are required for administrators to create a password sync group in Identity Security Cloud: 


    - At least two direct connect sources connected to Identity Security Cloud and configured for Password Management.


    - Each authentication source in a sync group must have at least one application. Refer to [Adding and Resetting
    Application
    Passwords](https://documentation.sailpoint.com/saas/help/pwd/adv_config.html#adding-and-resetting-application-passwords)
    for more information about adding applications to sources.


    - At least one password policy. Refer to [Managing Password
    Policies](https://documentation.sailpoint.com/saas/help/pwd/pwd_policies/index.html) for more information about
    password policies. 


    In the Admin panel in Identity Security Cloud, administrators can use the Password Mgmt dropdown menu to select
    Sync Groups. 

    To create a sync group, administrators must provide a name, choose a password policy to be enforced across the
    sources in the sync group, and select the sources to include in the sync group. 


    Administrators can also delete sync groups in Identity Security Cloud, but they should know the following before
    they do: 


    - Passwords related to the associated sources will become independent, so changing one will not change the others
    anymore. 


    - Passwords for the sources' connected applications will also become independent. 


    - Password policies assigned to the sync group are then assigned directly to the associated sources. 

    To change the password policy for a source, administrators must edit it directly. 


    Once the password sync group has been created, users can update the password for the group in Password Manager.


    Refer to [Managing Password Sync Groups](https://documentation.sailpoint.com/saas/help/pwd/sync_grps.html) for
    more information about password sync groups.
- name: Personal Access Tokens
  description: >
    Use this API to implement personal access token (PAT) functionality. 

    With this functionality in place, users can use PATs as an alternative to passwords for authentication in Identity
    Security Cloud. 


    PATs embed user information into the client ID and secret. 

    This replaces the API clients' need to store and provide a username and password to establish a connection,
    improving Identity Security Cloud organizations' integration security. 


    In Identity Security Cloud, users can do the following to create and manage their PATs: Select the dropdown menu
    under their names, select Preferences, and then select Personal Access Tokens. 

    They must then provide a description about the token's purpose. 

    They can then select 'Create Token' at the bottom of the page to generate and view the Secret and Client ID. 


    Refer to [Managing Personal Access
    Tokens](https://documentation.sailpoint.com/saas/help/common/api_keys.html?h=token#generating-a-personal-access-token)
    for more information about PATs.
- name: Privilege Criteria
  description: |
    Use this API to create, retrieve, update, and delete privilege criteria.
- name: Privilege Criteria Configuration
  description: >
    Use this API to manage the configuration of privilege criteria.


    **globalPrivilegeLevelEnabled**: Boolean flag indicating whether privilege classification is enabled.



    **privilegeClassificationMode**: Enum specifying the mode (CRITERIA_PRIVILEGE_LEVEL, SINGLE_PRIVILEGE_LEVEL) to
    use for privilege classification. CRITERIA_PRIVILEGE_LEVEL mode uses criteria to determine privilege levels, while
    SINGLE_PRIVILEGE_LEVEL assigns the same privilege level to all enititlements based on the value of
    singlePrivilegeLevel.privilegeLevel.



    **singlePrivilegeLevel.privilegeLevel**: Enum specifying the privilege level (HIGH, MEDIUM, LOW) to assign to all
    privileges when the privilege classification mode is SINGLE_PRIVILEGE_LEVEL.



    **criteriaPrivilegeLevel.connectorHighEnabled**: Boolean flag indicating whether HIGH level connector criteria is
    used for privilege classification.



    **criteriaPrivilegeLevel.connectorMediumEnabled**: Boolean flag indicating whether MEDIUM level connector criteria
    is used for privilege classification.



    **criteriaPrivilegeLevel.connectorLowEnabled**: Boolean flag indicating whether LOW level connector criteria is
    used for privilege classification.



    **criteriaPrivilegeLevel.customHighEnabled**: Boolean flag indicating whether HIGH level custom criteria is used
    for privilege classification.



    **criteriaPrivilegeLevel.customMediumEnabled**: Boolean flag indicating whether MEDIUM level custom criteria is
    used for privilege classification.



    **criteriaPrivilegeLevel.customLowEnabled**: Boolean flag indicating whether LOW level custom criteria is used for
    privilege classification.
- name: Prompt Insights
  description: |
    Use this API to retrieve prompt security insights and aggregate metrics for AI agent prompt activity.
    With this functionality in place, administrators can review prompt events and their policy decisions,
    filter insights by policy decision, category, severity, and other attributes, and view summary metrics
    for scanned and redacted prompts over configurable time windows.

    Policy decisions indicate whether a prompt was allowed or redacted. Insight categories include anomalies,
    data uploads, and MCP tool calls. Supported filter fields include policy decision, category, severity,
    user, agent, reason, rule, and policy.
- name: Public Identities
  description: >
    Use this API in conjunction with [Public Identites
    Config](https://developer.sailpoint.com/docs/api/v2025/public-identities-config/) to enable non-administrators to
    view identities' publicly visible attributes. 

    With this functionality in place, non-administrators can view identity attributes other than the default
    attributes (email, lifecycle state, and manager), depending on which identity attributes their organization
    administrators have made public. 

    This can be helpful for access approvers, certification reviewers, managers viewing their direct reports' access,
    and source owners viewing their tasks.
- name: Public Identities Config
  description: >
    Use this API to implement public identity configuration functionality. 

    With this functionality in place, administrators can make up to 5 identity attributes publicly visible so other
    non-administrator users can see the relevant information they need to make decisions. 

    This can be helpful for approvers making approvals, certification reviewers, managers viewing their direct
    reports' access, and source owners viewing their tasks.


    By default, non-administrators can select an identity and view the following attributes: email, lifecycle state,
    and manager. 

    However, it may be helpful for a non-administrator reviewer to see other identity attributes like department,
    region, title, etc.

    Administrators can use this API to make those necessary identity attributes public to non-administrators. 


    For example, a non-administrator deciding whether to approve another identity's request for access to the Workday
    application, whose access may be restricted to members of the HR department, would want to know whether the
    identity is a member of the HR department. 

    If an administrator has used [Update Public Identity
    Config](https://developer.sailpoint.com/docs/api/v2025/update-public-identity-config/) to make the "department"
    attribute public, the approver can see the department and make a decision without requesting any more information.
- name: Reports Data Extraction
  description: |
    Use this API to implement reports lifecycle managing and monitoring.
    With this functionality in place, users can run reports, view their results, and cancel reports in progress. 
    This can be potentially helpful for auditing purposes. 
- name: Requestable Objects
  description: >
    Use this API to implement requestable object functionality. 

    With this functionality in place, administrators can determine which access items can be requested with the
    [Access Request APIs](https://developer.sailpoint.com/docs/api/v2025/access-requests/), along with their
    statuses. 

    This can be helpful for administrators who are implementing and customizing access request functionality as a way
    of checking which items are requestable as they are created, assigned, and made available.
- name: Role Insights
- name: Role Propagation
  description: |
    Role Change Propagation ensures that any changes to the composition of a role’s access objects 
    (entitlements, access profiles, or dimensions) are applied to all member identities. 
    For example: If an entitlement is removed from a role, all identities assigned to that role 
    should lose access to that entitlement as part of this process.
- name: Roles
  description: >
    Use this API to implement and customize role functionality.

    With this functionality in place, administrators can create roles and configure them for use throughout Identity
    Security Cloud. 

    Identity Security Cloud can use established criteria to automatically assign the roles to qualified users. This
    enables users to get all the access they need quickly and securely and administrators to spend their time on other
    tasks.


    Entitlements represent the most granular level of access in Identity Security Cloud. 

    Access profiles represent the next level and often group entitlements. 

    Roles represent the broadest level of access and often group access profiles. 


    For example, an Active Directory source in Identity Security Cloud can have multiple entitlements: the first,
    'Employees,' may represent the access all employees have at the organization, and a second, 'Developers,' may
    represent the access all developers have at the organization.


    An administrator can then create a broader set of access in the form of an access profile, 'AD Developers'
    grouping the 'Employees' entitlement with the 'Developers' entitlement.


    An administrator can then create an even broader set of access in the form of a role grouping the 'AD Developers'
    access profile with another profile, 'GitHub Developers,' grouping entitlements for the GitHub source.


    When users only need Active Directory employee access, they can request access to the 'Employees' entitlement.


    When users need both Active Directory employee and developer access, they can request access to the 'AD
    Developers' access profile.


    When users need both the 'AD Developers' access profile and the 'GitHub Developers' access profile, they can
    request access to the role grouping both. 


    Roles often represent positions within organizations. 

    For example, an organization's accountant can access all the tools the organization's accountants need with the
    'Accountant' role. 

    If the accountant switches to engineering, a qualified member of the organization can quickly revoke the
    accountant's 'Accountant' access and grant access to the 'Engineer' role instead, granting access to all the tools
    the organization's engineers need.


    In Identity Security Cloud, adminstrators can use the Access drop-down menu and select Roles to view, configure,
    and delete existing roles, as well as create new ones. 

    Administrators can enable and disable the role, and they can also make the following configurations: 


    - Manage Access: Manage the role's access by adding or removing access profiles.


    - Define Assignment: Define the criteria Identity Security Cloud uses to assign the role to identities. 

    Use the first option, 'Standard Criteria,' to provide specific criteria for assignment like specific account
    attributes, entitlements, or identity attributes. 

    Use the second, 'Identity List,' to specify the identities for assignment.


    - Access Requests: Configure roles to be requestable and establish an approval process for any requests that the
    role be granted or revoked. 

    Do not configure a role to be requestable without establishing a secure access request approval process for that
    role first. 


    Refer to [Working with Roles](https://documentation.sailpoint.com/saas/help/access/roles.html) for more
    information about roles.
- name: Saved Search
  description: >
    Use this API to implement saved search functionality. 

    With saved search functionality in place, users can save search queries and then view those saved searches, as
    well as rerun them. 


    Search queries in Identity Security Cloud can grow very long and specific, which can make reconstructing them
    difficult or tedious, so it can be especially helpful to save search queries. 

    It also opens the possibility to configure Identity Security Cloud to run the saved queries on a schedule, which
    is essential to detecting user information and access changes throughout an organization's tenant and across all
    its sources. 

    Refer to [Scheduled Search](https://developer.sailpoint.com/docs/api/v2025/scheduled-search/) for more information
    about running saved searches on a schedule. 


    In Identity Security Cloud, users can save searches under a name, and then they can access that saved search and
    run it again when they want. 


    Refer to [Managing Saved Searches](https://documentation.sailpoint.com/saas/help/search/saved-searches.html) for
    more information about saving searches and using them.
- name: Scheduled Search
  description: >
    Use this API to implement scheduled search functionality. 

    With scheduled search functionality in place, users can run saved search queries on their tenants on a schedule,
    and Identity Security Cloud emails them the search results. 

    Users can also share these search results with other users by email by adding those users as subscribers, or those
    users can subscribe themselves. 


    One of the greatest benefits of saving searches is the ability to run those searches on a schedule. 

    This is essential for organizations to constantly detect any changes to user information or access throughout
    their tenants and across all their sources. 

    For example, the manager Amanda Ross can schedule a saved search "manager.name:amanda.ross AND
    attributes.location:austin" on a schedule to regularly stay aware of changes with the Austin employees reporting
    to her.

    Identity Security Cloud emails her the search results when the search runs, so she can work on other tasks instead
    of actively running this search.


    In Identity Security Cloud, scheduling a search involves a subscription. 

    Users can create a subscription for a saved search and schedule it to run daily, weekly, or monthly (you can only
    use one schedule option at a time). 

    The user can add other identities as subscribers so when the scheduled search runs, the subscribers and the user
    all receive emails. 


    By default, subscriptions exclude detailed results from the emails, for security purposes. 

    Including detailed results about user access in an email may expose sensitive information.

    However, the subscription creator can choose to include the information in the emails.  


    By default, Identity Security Cloud sends emails to the subscribers even when the searches do not return new
    results. 

    However, the subscription creator can choose to suppress these empty emails. 


    Users can also subscribe to saved searches that already have existing subscriptions so they receive emails when
    the searches run. 

    A saved search can have up to 10 subscriptions configured at a time. 


    The subscription creator can enable, disable, or delete the subscription. 


    Refer to [Subscribing to Saved
    Searches](https://documentation.sailpoint.com/saas/help/search/saved-searches.html#subscribing-to-saved-searches)
    for more information about scheduling searches and subscribing to them.
- name: Search
  description: >
    Use this API to implement search functionality. 

    With search functionality in place, users can search their tenants for nearly any information from throughout
    their organizations. 


    Identity Security Cloud enables organizations to store user data from across all their connected sources and
    manage the users' access, so the ability to query and filter that data is essential.  

    Its search goes through all those sources and finds the results quickly and specifically. 


    The search query is flexible - it can be very broad or very narrow. 

    The search only returns results for searchable objects it is filtering for. 

    The following objects are searchable: identities, roles, access profiles, entitlements, events, and account
    activities. 

    By default, no filter is applied, so a search for "Ad" returns both the identity "Adam.Archer" as well as the role
    "Administrator."


    Users can further narrow their results by using Identity Security Cloud's specific syntax and punctuation to
    structure their queries. 

    For example, the query "attributes.location:austin AND NOT manager.name:amanda.ross" returns all results
    associated with the Austin location, but it excludes those associated with the manager Amanda Ross.

    Refer to [Building a Search Query](https://documentation.sailpoint.com/saas/help/search/building-query.html) for
    more information about how to construct specific search queries. 


    Refer to [Using Search](https://documentation.sailpoint.com/saas/help/search/index.html) for more information
    about Identity Security Cloud's search and its different possibilities. 


    The search feature uses Elasticsearch as a datastore and query engine. 

    The power of Elasticsearch makes this feature suitable for ad-hoc reporting.

    However, data from the operational databases (ex. identities, roles, events, etc) has to be ingested into
    Elasticsearch. 

    This ingestion process introduces a latency from when the operational data is created to when it is available in
    search. 

    Depending on the system load, this can take a few seconds to a few minutes. 

    Please keep this latency in mind when you use search.
- name: Search Attribute Configuration
  description: >
    Use this API to implement search attribute configuration functionality, along with
    [Search](https://developer.sailpoint.com/docs/api/v2025/search).

    With this functionality in place, administrators can create custom search attributes that and run extended
    searches based on those attributes to further narrow down their searches and get the information and insights they
    want. 


    Identity Security Cloud (ISC) enables organizations to store user data from across all their connected sources and
    manage the users' access, so the ability to query and filter that data is essential.  

    Its search goes through all those sources and finds the results quickly and specifically. 


    The search query is flexible - it can be very broad or very narrow. 

    The search only returns results for searchable objects it is filtering for. 

    The following objects are searchable: identities, roles, access profiles, entitlements, events, and account
    activities. 

    By default, no filter is applied, so a search for "Ad" returns both the identity "Adam.Archer" as well as the role
    "Administrator."


    Users can further narrow their results by using ISC's specific syntax and punctuation to structure their queries. 

    For example, the query "attributes.location:austin AND NOT manager.name:amanda.ross" returns all results
    associated with the Austin location, but it excludes those associated with the manager Amanda Ross.

    Refer to [Building a Search Query](https://documentation.sailpoint.com/saas/help/search/building-query.html) for
    more information about how to construct specific search queries. 


    Refer to [Search Attribute
    Configuration](https://developer.sailpoint.com/docs/extensibility/rules/rule-utility/#configuration-of-search-attributes-within-identity-security-cloud)
    for more information about ISC's search and its different possibilities. 


    With Search Attribute Configuration, administrators can create, manage, and run searches based on the attributes
    they want to search. 
- name: Segments
  description: >
    Use this API to implement and customize access request segment functionality. 

    With this functionality in place, administrators can create and manage access request segments. 

    Segments provide organizations with a way to make the access their users have even more granular - this can simply
    the access request process for the organization's users and improves security by reducing the risk of
    overprovisoning access. 


    Segments represent sets of identities, all grouped by specified identity attributes, who are only able to see and
    access the access items associated with their segments.

    For example, administrators could group all their organization's London office employees into one segment, "London
    Office Employees," by their shared location. 

    The administrators could then define the access items the London employees would need, and the identities in the
    "London Office Employees" would then only be able to see and access those items.


    In Identity Security Cloud, administrators can use the 'Access' drop-down menu and select 'Segments' to reach the
    'Access Requests Segments' page. 

    This page lists all the existing access request segments, along with their statuses, enabled or disabled. 

    Administrators can use this page to create, edit, enable, disable, and delete segments. 

    To create a segment, an administrator must provide a name, define the identities grouped in the segment, and
    define the items the identities in the segment can access.

    These items can be access profiles, roles, or entitlements. 


    When administrators use the API to create and manage segments, they use a JSON expression in the
    `visibilityCriteria` object to define the segment's identities and access items. 


    Refer to [Managing Access Request Segments](https://documentation.sailpoint.com/saas/help/requests/segments.html)
    for more information about segments in Identity Security Cloud.
- name: Service Desk Integration
  description: >
    Use this API to build an integration between Identity Security Cloud and a service desk ITSM (IT service
    management) solution. 

    Once an administrator builds this integration between Identity Security Cloud and a service desk, users can use
    Identity Security Cloud to raise and track tickets that are synchronized between Identity Security Cloud and the
    service desk. 


    In Identity Security Cloud, administrators can create a service desk integration (sometimes also called an SDIM,
    or Service Desk Integration Module) by going to Admin > Connections > Service Desk and selecting 'Create.'


    To create a Generic Service Desk integration, for example, administrators must provide the required information on
    the General Settings page, the Connectivity and Authentication information, Ticket Creation information, Status
    Mapping information, and Requester Source information on the Configure page. 

    Refer to [Integrating SailPoint with Generic Service
    Desk](https://documentation.sailpoint.com/connectors/generic_sd/help/integrating_generic_service_desk/intro.html)
    for more information about the process of setting up a Generic Service Desk in Identity Security Cloud.


    Administrators can create various service desk integrations, all with their own nuances. 

    The following service desk integrations are available: 


    - [Atlassian Cloud Jira Service
    Management](https://documentation.sailpoint.com/connectors/atlassian/jira_cloud/help/integrating_jira_cloud_sd/introduction.html)


    - [Atlassian Server Jira Service
    Management](https://documentation.sailpoint.com/connectors/atlassian/jira_server/help/integrating_jira_server_sd/introduction.html)


    - [BMC Helix ITSM Service
    Desk](https://documentation.sailpoint.com/connectors/bmc/helix_ITSM_sd/help/integrating_bmc_helix_itsm_sd/intro.html)


    - [BMC Helix Remedyforce Service
    Desk](https://documentation.sailpoint.com/connectors/bmc/helix_remedyforce_sd/help/integrating_bmc_helix_remedyforce_sd/intro.html)


    - [Generic Service
    Desk](https://documentation.sailpoint.com/connectors/generic_sd/help/integrating_generic_service_desk/intro.html)


    - [ServiceNow Service
    Desk](https://documentation.sailpoint.com/connectors/servicenow/sdim/help/integrating_servicenow_sdim/intro.html)


    - [Zendesk Service
    Desk](https://documentation.sailpoint.com/connectors/zendesk/help/integrating_zendesk_sd/introduction.html)
- name: Shared Signals Framework (SSF)
  description: >
    The SSF Transmitter Service is a security event notification system that monitors identity attribute changes

    and automatically triggers session revocation events when specific lifecycle conditions are met.


    Use this API to implement transmitter functionality so administrators can discover the transmitter and manage
    streams.

    Transmitters send identity data and events from Identity Security Cloud to external receivers over the Secure Sync
    Framework (SSF).

    The SSF configuration and JWKS endpoints support discovery and verification; the stream management endpoints
    support creating, updating, and managing streams and verifying receivers.

    In Identity Security Cloud, administrators can use the "Connections" > "Shared Signals" area to view and manage
    transmitters and their streams.
- name: SIM Integrations
  description: >
    Use this API to administer IdentityNow's Service Integration Module, or SIM integration with ServiceNow, so that
    it converts IdentityNow provisioning actions into tickets in ServiceNow.


    ServiceNow is a software platform that supports IT service management and automates common business processes for
    requesting and fulfilling service requests across a business enterprise.


    You must have an IdentityNow ServiceNow ServiceDesk license to use this integration. Contact your Customer Success
    Manager for more information.


    Service Desk integration for IdentityNow and in deprecation - not available for new implementation, as of July
    21st, 2021. As per SailPoint's [support
    policy](https://community.sailpoint.com/t5/Connector-Directory/SailPoint-Support-Policy-for-Connectivity/ta-p/79422),
    all existing SailPoint IdentityNow customers using this legacy integration will be supported until July 2022.
- name: SOD Policies
  description: >
    Use this API to implement and manage "separation of duties" (SOD) policies. 

    With SOD policy functionality in place, administrators can organize the access in their tenants to prevent
    individuals from gaining conflicting or excessive access. 


    "Separation of duties" refers to the concept that people shouldn't have conflicting sets of access - all their
    access should be configured in a way that protects your organization's assets and data.  

    For example, people who record monetary transactions shouldn't be able to issue payment for those transactions.

    Any changes to major system configurations should be approved by someone other than the person requesting the
    change. 


    Organizations can use "separation of duties" (SOD) policies to enforce and track their internal security rules
    throughout their tenants.

    These SOD policies limit each user's involvement in important processes and protects the organization from
    individuals gaining excessive access. 


    To create SOD policies in Identity Security Cloud, administrators use 'Search' and then access 'Policies'.

    To create a policy, they must configure two lists of access items. Each access item can only be added to one of
    the two lists.

    They can search for the entitlements they want to add to these access lists.


    >Note: You can have a maximum of 500 policies of any type (including general policies) in your organization. In
    each access-based SOD policy, you can have a maximum of 50 entitlements in each access list.  


    Once a SOD policy is in place, if an identity has access items on both lists, a SOD violation will trigger. 

    These violations are included in SOD violation reports that other users will see in emails at regular intervals if
    they're subscribed to the SOD policy.

    The other users can then better help to enforce these SOD policies. 


    To create a subscription to a SOD policy in Identity Security Cloud, administrators use 'Search' and then access
    'Layers'.

    They can create a subscription to the policy and schedule it to run at a regular interval. 


    Refer to [Managing Policies](https://documentation.sailpoint.com/saas/help/sod/manage-policies.html) for more
    information about SOD policies. 


    Refer to [Subscribe to a SOD
    Policy](https://documentation.sailpoint.com/saas/help/sod/policy-violations.html#subscribe-to-an-sod-policy) for
    more information about SOD policy subscriptions.
- name: SOD Violations
  description: >
    Use this API to check for current "separation of duties" (SOD) policy violations as well as potential future SOD
    policy violations. 

    With SOD violation functionality in place, administrators can get information about current SOD policy violations
    and predict whether an access change will trigger new violations, which helps to prevent them from occurring at
    all. 


    "Separation of duties" refers to the concept that people shouldn't have conflicting sets of access - all their
    access should be configured in a way that protects your organization's assets and data.  

    For example, people who record monetary transactions shouldn't be able to issue payment for those transactions.

    Any changes to major system configurations should be approved by someone other than the person requesting the
    change. 


    Organizations can use "separation of duties" (SOD) policies to enforce and track their internal security rules
    throughout their tenants.

    These SOD policies limit each user's involvement in important processes and protects the organization from
    individuals gaining excessive access. 


    Once a SOD policy is in place, if an identity has conflicting access items, a SOD violation will trigger. 

    These violations are included in SOD violation reports that other users will see in emails at regular intervals if
    they're subscribed to the SOD policy.

    The other users can then better help to enforce these SOD policies.


    Administrators can use the SOD violations APIs to check a set of identities for any current SOD violations, and
    they can use them to check whether adding an access item would potentially trigger a SOD violation. 

    This second option is a good way to prevent SOD violations from triggering at all. 


    Refer to [Handling Policy Violations](https://documentation.sailpoint.com/saas/help/sod/policy-violations.html)
    for more information about SOD policy violations. 
- name: Source Usages
  description: >
    Use this API to implement source usage insight functionality.

    With this functionality in place, administrators can gather information and insights about how their tenants'
    sources are being used.

    This allows organizations to get the information they need to start optimizing and securing source usage.
- name: Sources
  description: >
    Use this API to implement and customize source functionality. 

    With source functionality in place, organizations can use Identity Security Cloud to connect their various sources
    and user data sets and manage access across all those different sources in a secure, scalable way. 


    [Sources](https://documentation.sailpoint.com/saas/help/sources/index.html) refer to the Identity Security Cloud
    representations for external applications, databases, and directory management systems that maintain their own
    sets of users, like Dropbox, GitHub, and Workday, for example.

    Organizations may use hundreds, if not thousands, of different source systems, and any one employee within an
    organization likely has a different user record on each source, often with different permissions on many of those
    records. 

    Connecting these sources to Identity Security Cloud makes it possible to manage user access across them all.

    Then, if a new hire starts at an organization, Identity Security Cloud can grant the new hire access to all the
    sources they need.

    If an employee moves to a new department and needs access to new sources but no longer needs access to others,
    Identity Security Cloud can grant the necessary access and revoke the unnecessary access for all the employee's
    various sources. 

    If an employee leaves the company, Identity Security Cloud can revoke access to all the employee's various source
    accounts immediately. 

    These are just a few examples of the many ways that source functionality makes identity governance easier, more
    efficient, and more secure. 


    In Identity Security Cloud, administrators can create configure, manage, and edit sources, and they can designate
    other users as source admins to be able to do so.

    They can also designate users as source sub-admins, who can perform the same source actions but only on sources
    associated with their governance groups.

    Admins go to Connections > Sources to see a list of the existing source representations in their organizations. 

    They can create new sources or select existing ones. 


    To create a new source, the following must be specified: Source Name, Description, Source Owner, and Connection
    Type.

    Refer to [Configuring a
    Source](https://documentation.sailpoint.com/saas/help/accounts/loading_data.html#configuring-a-source) for more
    information about the source configuration process. 


    Identity Security Cloud connects with its sources either by a direct communication with the source server
    (connection information specific to the source must be provided) or a flat file feed, a CSV file containing all
    the relevant information about the accounts to be loaded in.

    Different sources use different connectors to share data with Identity Security Cloud, and each connector's setup
    process is specific to that connector. 

    SailPoint has built a number of connectors to come out of the box and connect to the most common sources, and
    SailPoint actively maintains these connectors.

    Refer to [Identity Security Cloud
    Connectors](https://documentation.sailpoint.com/connectors/identitynow/landingpages/help/landingpages/identitynow_connectivity_landing.html)
    for more information about these SailPoint supported connectors. 

    Refer to the following links for more information about two useful connectors: 


    - [JDBC Connector](https://documentation.sailpoint.com/connectors/jdbc/help/integrating_jdbc/introduction.html):
    This customizable connector an directly connect to databases that support JDBC (Java Database Connectivity).


    - [Web Services
    Connector](https://documentation.sailpoint.com/connectors/webservices/help/integrating_webservices/introduction.html):
    This connector can directly connect to databases that support Web Services. 


    Refer to [SaaS Connectivity](https://developer.sailpoint.com/docs/connectivity/saas-connectivity/) for more
    information about SailPoint's new connectivity framework that makes it easy to build and manage custom connectors
    to SaaS sources. 


    When admins select existing sources, they can view the following information about the source:


    - Associated connections (any associated identity profiles, apps, or references to the source in a transform).


    - Associated user accounts. These accounts are linked to their identities - this provides a more complete picture
    of each user's access across sources.


    - Associated entitlements (sets of access rights on sources).


    - Associated access profiles (groupings of entitlements). 


    The user account data and the entitlements update with each data aggregation from the source. 

    Organizations generally run scheduled, automated data aggregations to ensure that their data is always in sync
    between their sources and their Identity Security Cloud tenants so an access change on a source is detected
    quickly in Identity Security Cloud.

    Admins can view a history of these aggregations, and they can also run manual imports. 

    Refer to [Loading Account Data](https://documentation.sailpoint.com/saas/help/accounts/loading_data.html) for more
    information about manual and scheduled aggregations. 


    Admins can also make changes to determine which user account data Identity Security Cloud collects from the source
    and how it correlates that account data with identity data. 

    To define which account attributes the source shares with Identity Security Cloud, admins can edit the account
    schema on the source.

    Refer to [Managing Source Account Schemas](https://documentation.sailpoint.com/saas/help/accounts/schema.html) for
    more information about source account schemas and how to edit them. 

    To define the mapping between the source account attributes and their correlating identity attributes, admins can
    edit the correlation configuration on the source. 

    Refer to [Assigning Source Accounts to
    Identities](https://documentation.sailpoint.com/saas/help/accounts/correlation.html) for more information about
    this correlation process between source accounts and identities.


    Admins can also delete sources, but they must first ensure that the sources no longer have any active connections:
    the source must not be associated with any identity profile or any app, and it must not be referenced by any
    transform.

    Refer to [Deleting Sources](https://documentation.sailpoint.com/saas/help/sources/index.html#deleting-sources) for
    more information about deleting sources. 


    Well organized, mapped out connections between sources and Identity Security Cloud are essential to achieving
    comprehensive identity access governance across all the source systems organizations need. 

    Refer to [Managing Sources](https://documentation.sailpoint.com/saas/help/sources/index.html) for more information
    about all the different things admins can do with sources once they are connected.
- name: SP-Config
  description: Import and export configuration for some objects between tenants.
- name: Suggested Entitlement Description
  description: >
    Use this API to implement Suggested Entitlement Description (SED) functionality. 

    SED functionality leverages the power of LLM to generate suggested entitlement descriptions. 

    Refer to [GenAI Entitlement
    Descriptions](https://documentation.sailpoint.com/saas/help/access/entitlements.html#genai-entitlement-descriptions)
    to learn more about SED in Identity Security Cloud (ISC). 
- name: Tagged Objects
  description: >
    Use this API to implement object tagging functionality. 

    With object tagging functionality in place, any user in an organization can use tags as a way to group objects
    together and find them more quickly when the user searches Identity Security Cloud. 


    In Identity Security Cloud, users can search their tenants for information and add tags objects they find.

    Tagging an object provides users with a way of grouping objects together and makes it easier to find these objects
    in the future. 


    For example, if a user is searching for an entitlement that grants a risky level of access to Active Directory,
    it's possible that the user may have to search through hundreds of entitlements to find the correct one. 

    Once the user finds that entitlement, the user can add a tag to the entitlement, "AD_RISKY" to make it easier to
    find the entitlement again.

    The user can add the same tag to multiple objects the user wants to group together for an easy future search, and
    the user can also do so in bulk.

    When the user wants to find that tagged entitlement again, the user can search for "tags:AD_RISKY" to find all
    objects with that tag. 


    With the API, you can tag even more different object types than you can in Identity Security Cloud (access
    profiles, entitlements, identities, and roles). 

    You can use the API to tag all these objects:


    - Access profiles 


    - Applications 


    - Certification campaigns


    - Entitlements


    - Identities 


    - Roles 


    - SOD (separation of duties) policies


    - Sources 


    You can also use the API to directly find, create, and manage tagged objects without using search queries. 


    There are limits to tags: 


    - You can have up to 500 different tags in your tenant.


    - You can apply up to 30 tags to one object. 


    - You can have up to 10,000 tag associations, pairings of 1 tag to 1 object, in your tenant. 


    Because of these limits, it is recommended that you work with your governance experts and security teams to
    establish a list of tags that are most expressive of governance objects and access managed by Identity Security
    Cloud. 


    These are the types of information often expressed in tags: 


    - Affected departments


    - Compliance and regulatory categories 


    - Remediation urgency levels 


    - Risk levels 


    Refer to [Tagging Items in
    Search](https://documentation.sailpoint.com/saas/help/search/index.html?h=tags#tagging-items-in-search) for more
    information about tagging objects in Identity Security Cloud. 
- name: Task Management
- name: Tenant
  description: API for reading tenant details.
- name: Tenant Context
  description: >
    The purpose of this API is to manage key-value pairs specific to a tenant's context, enabling dynamic
    configuration and personalized settings per tenant.

    Context key-value pairs will consist of common terms and acronyms used within your organization.
- name: Transforms
  description: >
    The purpose of this API is to expose functionality for the manipulation of Transform objects.

    Transforms are a form of configurable objects which define an easy way to manipulate attribute data without having

    to write code. 


    Refer to [Transforms](https://developer.sailpoint.com/docs/extensibility/transforms/) for more information about
    transforms.
- name: Triggers
  description: >
    Event Triggers provide real-time updates to changes in Identity Security Cloud so you can take action as soon as
    an event occurs, rather than poll an API endpoint for updates. Identity Security Cloud provides a user interface
    within the admin console to create and manage trigger subscriptions.  These endpoints allow for programatically
    creating and managing trigger subscriptions.


    There are two types of event triggers:
      * `FIRE_AND_FORGET`: This trigger type will send a payload to each subscriber without needing a response.  Each trigger of this type has a limit of **50 subscriptions**.
      * `REQUEST_RESPONSE`: This trigger type will send a payload to a subscriber and expect a response back.  Each trigger of this type may only have **one subscription**.

    ## Available Event Triggers

    Production ready event triggers that are available in all tenants.


    | Name | ID | Type | Trigger condition |

    |-|-|-|-|

    | [Access Request Dynamic
    Approval](https://developer.sailpoint.com/docs/extensibility/event-triggers/triggers/access-request-dynamic-approval/)
    | idn:access-request-dynamic-approver | REQUEST_RESPONSE |After an access request is submitted. Expects the
    subscriber to respond with the ID of an identity or workgroup to add to the approval workflow. |

    | [Access Request
    Decision](https://developer.sailpoint.com/docs/extensibility/event-triggers/triggers/access-request-decision/) |
    idn:access-request-post-approval | FIRE_AND_FORGET | After an access request is approved. |

    | [Access Request
    Submitted](https://developer.sailpoint.com/docs/extensibility/event-triggers/triggers/access-request-submitted/) |
    idn:access-request-pre-approval | REQUEST_RESPONSE | After an access request is submitted. Expects the subscriber
    to respond with an approval decision. |

    | [Account Aggregation
    Completed](https://developer.sailpoint.com/docs/extensibility/event-triggers/triggers/account-aggregation-completed/)
    | idn:account-aggregation-completed | FIRE_AND_FORGET | After an account aggregation completed, terminated,
    failed. |

    | Account Attributes Changed | idn:account-attributes-changed | FIRE_AND_FORGET | After an account aggregation,
    and one or more account attributes have changed. |

    | Account Correlated | idn:account-correlated | FIRE_AND_FORGET | After an account is added to an identity. |

    | Accounts Collected for Aggregation |  idn:aggregation-accounts-collected | FIRE_AND_FORGET | New, changed, and
    deleted accounts have been gathered during an aggregation and are being processed. |

    | Campaign Activated | idn:campaign-activated | FIRE_AND_FORGET | After a campaign is activated. |

    | Campaign Ended | idn:campaign-ended | FIRE_AND_FORGET | After a campaign ends. |

    | Campaign Generated | idn:campaign-generated | FIRE_AND_FORGET | After a campaign finishes generating. |

    | Certification Signed Off | idn:certification-signed-off | FIRE_AND_FORGET | After a certification is signed off
    by its reviewer. |

    | [Identity Attributes
    Changed](https://developer.sailpoint.com/docs/extensibility/event-triggers/triggers/account-aggregation-completed/)
    | idn:identity-attributes-changed | FIRE_AND_FORGET | After One or more identity attributes changed. |

    | [Identity Created](https://developer.sailpoint.com/docs/extensibility/event-triggers/triggers/identity-created/)
    | idn:identity-created | FIRE_AND_FORGET | After an identity is created. |

    | [Provisioning Action
    Completed](https://developer.sailpoint.com/docs/extensibility/event-triggers/triggers/provisioning-completed/) |  idn:post-provisioning | FIRE_AND_FORGET | After a provisioning action completed on a source. |

    | [Scheduled Search](https://developer.sailpoint.com/docs/extensibility/event-triggers/triggers/scheduled-search/)
    |  idn:saved-search-complete | FIRE_AND_FORGET | After a scheduled search completed. |

    | [Source Created](https://developer.sailpoint.com/docs/extensibility/event-triggers/triggers/source-created/) |
    idn:source-created | FIRE_AND_FORGET | After a source is created. |

    | [Source Deleted](https://developer.sailpoint.com/docs/extensibility/event-triggers/triggers/source-deleted/) |
    idn:source-deleted | FIRE_AND_FORGET | After a source is deleted. |

    | [Source Updated](https://developer.sailpoint.com/docs/extensibility/event-triggers/triggers/source-updated/) |
    idn:source-updated | FIRE_AND_FORGET | After configuration changes have been made to a source. |

    | [VA Cluster Status
    Change](https://developer.sailpoint.com/docs/extensibility/event-triggers/triggers/va-cluster-status-change/) |
    idn:va-cluster-status-change | FIRE_AND_FORGET | After the status of a VA cluster has changed. |
- name: UI Metadata
  description: >-
    API for managing UI Metadata. Use this API to manage metadata about your User Interface.

    For example you can set the iFrameWhitelist parameter to permit another domain to encapsulate IDN within an iframe
    or set the usernameEmptyText to change the placeholder text for Username on your tenant's login screen.
- name: Work Items
  description: >
    Use this API to implement work item functionality. 

    With this functionality in place, users can manage their work items (tasks). 


    Work items refer to the tasks users see in Identity Security Cloud's Task Manager. 

    They can see the pending work items they need to complete, as well as the work items they have already completed. 

    Task Manager lists the work items along with the involved sources, identities, accounts, and the timestamp when
    the work item was created. 

    For example, a user may see a pending 'Create an Account' work item for the identity Fred.Astaire in GitHub for
    Fred's GitHub account, fred-astaire-sp. 

    Once the user completes the work item, the work item will be listed with his or her other completed work items. 


    To complete work items, users can use their dashboards and select the 'My Tasks' widget. 

    The widget will list any work items they need to complete, and they can select the work item from the list to
    review its details. 

    When they complete the work item, they can select 'Mark Complete' to add it to their list of completed work
    items. 


    Refer to [Task Manager](https://documentation.sailpoint.com/saas/user-help/task_manager.html) for more information
    about work items, including the different types of work items users may need to complete.
- name: Work Reassignment
  description: >
    Use this API to implement work reassignment functionality.


    Work Reassignment allows access request reviews, certifications, and manual provisioning tasks assigned to a user
    to be reassigned to a different user. This is primarily used for:


    - Temporarily redirecting work for users who are out of office, such as on vacation or sick leave

    - Permanently redirecting work for users who should not be assigned these tasks at all, such as senior executives
    or service identities


    Users can define reassignments for themselves, managers can add them for their team members, and administrators
    can configure them on any user's behalf. Work assigned during the specified reassignment timeframes will be
    automatically reassigned to the designated user as it is created.


    Refer to [Work Reassignment](https://documentation.sailpoint.com/saas/help/users/work_reassignment.html) for more
    information about this topic.
- name: Workflows
  description: >
    Workflows allow administrators to create custom automation scripts directly within Identity Security Cloud.  These
    automation scripts respond to [event
    triggers](https://developer.sailpoint.com/docs/extensibility/event-triggers/#how-to-get-started-with-event-triggers)
    and perform a series of actions to perform tasks that are either too cumbersome or not available in the Identity
    Security Cloud UI.  Workflows can be configured via a graphical user interface within Identity Security Cloud, or
    by creating and uploading a JSON formatted script to the Workflow service.  The Workflows API collection provides
    the necessary functionality to create, manage, and test your workflows via REST.
