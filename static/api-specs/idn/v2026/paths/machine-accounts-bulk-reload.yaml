post:
  operationId: reloadMachineAccountsInBulk
  tags:
    - Machine Accounts
  summary: Bulk reload machine accounts
  description: |-
    Queues a reload for up to 100 machine accounts in one request.

    The response uses HTTP 207 Multi-Status. Each array element reports the result for one requested ID in its **status** field.

    Callers without the **idn:mis-account:reload** right may still reload accounts they own.
  security:
    - userAuth:
        - idn:mis-account:reload
    - applicationAuth:
        - idn:mis-account:reload
  x-sailpoint-userLevels:
    - ORG_ADMIN
    - SOURCE_ADMIN
    - SOURCE_SUBADMIN
  parameters:
    - name: X-SailPoint-Experimental
      in: header
      description: Use this header to enable this experimental API.
      example: true
      schema:
        type: string
        default: true
      required: true
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: ../schemas/MisBulkRequest.yaml
  responses:
    '207':
      description: Per-account bulk reload results.
      content:
        application/json:
          schema:
            $ref: ../schemas/MisBulkResponseList.yaml
    '400':
      $ref: ../responses/400.yaml
    '401':
      $ref: ../responses/401.yaml
    '403':
      $ref: ../responses/403.yaml
    '429':
      $ref: ../responses/429.yaml
    '500':
      $ref: ../responses/500.yaml
