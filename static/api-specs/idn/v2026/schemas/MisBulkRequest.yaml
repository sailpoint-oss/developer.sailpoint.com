type: object
title: Machine Identity Security Bulk Request
description: Request body listing machine identity or machine account IDs for a bulk operation.
properties:
  ids:
    type: array
    description: Machine identity or machine account IDs to include in the bulk operation.
    maxItems: 100
    items:
      type: string
      maxLength: 128
    example:
      - ef38f94347e94562b5bb8424a56397d8
      - 2c91808a7813090a017814121919ecca
required:
  - ids
