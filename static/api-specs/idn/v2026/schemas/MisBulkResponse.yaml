type: object
title: Machine Identity Security Bulk Response Item
description: Per-ID result for a machine identity or machine account bulk operation.
properties:
  id:
    description: Machine identity or machine account ID from the request.
    type: string
    example: ef38f94347e94562b5bb8424a56397d8
  status:
    type: integer
    format: int32
    description: >-
      HTTP status code for this ID. For example, 200 indicates success, 404 indicates the resource was not found
      or is not accessible to the caller, and 409 indicates a conflict such as a duplicate ID in the batch.
    example: 200
  message:
    description: Human-readable detail for this result.
    type: string
    example: Updated successfully.
required:
  - id
  - status
