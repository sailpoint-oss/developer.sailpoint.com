type: object
required:
  - alias
  - email
  - identityStatus
  - isProtected
  - isManager
properties:
  alias:
    type: string
    description: Primary login or account alias for the human identity.
    example: jdoe
  email:
    type: string
    format: email
    description: Primary business email address for the human identity.
    example: john.doe@example.com
  identityStatus:
    type: string
    description: Current identity lifecycle status label from Identity Security Cloud.
    example: Active
  lifecycleState:
    type: string
    nullable: true
    description: Lifecycle state name assigned through provisioning policy when present.
    example: contractor
  processingState:
    type: string
    nullable: true
    description: Processing state for outstanding identity change operations when present.
    example: pending
  isProtected:
    type: boolean
    description: True when the identity is marked protected from automated changes.
    example: false
  manager:
    type: string
    nullable: true
    description: Legacy manager identity identifier or display reference when assigned.
    example: ef38f94347e94562b5bb8424a56397d9
  managerId:
    type: string
    nullable: true
    description: Manager identity identifier when correlated in Identity Security Cloud.
    example: ef38f94347e94562b5bb8424a56397d9
  managerName:
    type: string
    nullable: true
    description: Manager display name when available from identity services.
    example: Alex Manager
  isManager:
    type: boolean
    description: True when the identity is flagged as a people manager in the organization.
    example: true
  lastRefreshAt:
    type: string
    nullable: true
    format: date-time
    description: Timestamp of the last successful identity refresh from sources when known.
    example: "2024-05-01T08:00:00Z"
