type: object
required:
  - accounts
  - privilegedAccessItems
properties:
  accounts:
    type: array
    description: Accounts for the identity in camelCase wire format from Shelby List Accounts.
    items:
      $ref: ./IntelAccessAccountWire.yaml
    example:
      - id: acc-1
        name: example.user
        source:
          id: src-1
          name: Example Directory
        disabled: false
        locked: false
        uncorrelated: false
        authoritative: false
        systemAccount: false
        isMachine: false
        hasEntitlements: true
        manuallyCorrelated: false
        connectionType: direct
        nativeIdentity: CN=example.user,OU=users
        created: "2026-01-01T00:00:00Z"
        modified: "2026-05-01T00:00:00Z"
  privilegedAccessItems:
    type: array
    description: Privileged access items for the identity returned by SDS Search.
    items:
      $ref: ./IntelPrivilegedAccessItemWire.yaml
    example:
      - privileged: true
        displayName: Example_Admin_Access
        name: Example_Admin_Access
        standalone: true
        id: ent-1
        source:
          name: Example HR Source
          id: src-2
        attribute: EXAMPLE_PERMISSION_GROUPS
        type: ENTITLEMENT
        value: Example_Admin_Access
