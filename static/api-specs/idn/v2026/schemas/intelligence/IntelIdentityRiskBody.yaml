type: object
required:
  - outliers
  - outliersTotal
description: Shared response envelope for risk endpoints.
properties:
  outliers:
    type: array
    description: Page of outlier access-items associated with the resolved identity outlier.
    items:
      $ref: ./IntelOutlierAccessItem.yaml
    example:
      - id: outlier-access-001
        displayName: Example_Admin_Access
        description: null
        accessType: ENTITLEMENT
        sourceName: Example SaaS Source
        extremelyRare: false
  outliersTotal:
    type: integer
    format: int64
    nullable: true
    minimum: 0
    description: Total available outlier access-item count from upstream.
    example: 312
  _links:
    type: object
    nullable: true
    description: Continuation links map; omitted when no additional page exists.
    allOf:
      - $ref: ./IntelRiskLinks.yaml
